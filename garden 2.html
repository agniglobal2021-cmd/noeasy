<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'Fixedsys';
  src: url('../fonts/Fixedsys.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:    #e8e0c4;
  --text:  #353535;
  --desk:  #5D5143;
  --tb:    #5D5143;
  --ttxt:  #f6f1da;
  --btn:   #AFA191;
  --blt:   #d4cdc4;
  --bdk:   #3d3830;
  --bsh:   #2a2520;
  /* terminal — left panel bg: #221c14 ≈ #2e2820 darkened ~10% */
  --lbg:   #1e1a12;
  --tbg:   #2e2820;
  --ta:    #c9a472;
  --tdim:  #7a6a52;
  --thl:   #e8d0a0;
  --tbar:  #181410;
  --tsel:  #6a5535;
  --header-titlebar-h: 22px;
  --header-pill-h: 44px;
  --header-total-h: calc(env(safe-area-inset-top, 0px) + var(--header-titlebar-h) + var(--header-pill-h));
}

html { background: #5D5143; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; top: -100vh; left: 0; right: 0;
  height: 100vh; background: #5D5143;
  z-index: 9001; pointer-events: none;
}

body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  color: var(--text);
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: none;
  height: 100vh;
}

/* ── Grain canvas (same as gallery) ── */
#grain {
  position: fixed;
  top: -60px; bottom: -60px; left: -10px; right: -10px;
  z-index: 9998; pointer-events: none;
}

/* ── HEADER (identical to gallery) ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: stretch;
  pointer-events: none;
  opacity: 0; transition: opacity 0.7s ease;
  background: var(--desk);
}
header.visible { opacity: 1; }
header > * { pointer-events: auto; }

.header-safe-top {
  height: env(safe-area-inset-top, 0px);
  background: var(--desk); flex-shrink: 0;
}
.header-inner { display: flex; flex-direction: column; align-items: stretch; width: 100%; }

.header-titlebar-strip {
  width: 100%; height: var(--header-titlebar-h);
  background: #5D5143;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0 0 8px; flex-shrink: 0;
  border-bottom: 1px solid #3e352d;
}
.header-titlebar-strip-text {
  font-family: 'DotGothic16', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  color: #f6f1da; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}

.header-pill {
  display: flex; align-items: center;
  position: relative; width: 100%; height: var(--header-pill-h);
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-bottom: 2px solid #7a7068;
  box-shadow: 0 1px 0 #404040;
  overflow: visible; padding: 0 4px;
}

.pill-divider {
  width: 2px; height: 26px; flex-shrink: 0;
  background: #808080; border-right: 1px solid #d4cdc4;
  align-self: center; margin: 0 2px;
}

.pill-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; pointer-events: none; user-select: none; white-space: nowrap;
}
.pill-section {
  font-family: 'Alkhemikal', serif;
  font-size: 14px; letter-spacing: 0.08em; opacity: 0.9; color: #000;
}

.sword-btn {
  height: calc(100% - 10px); padding: 0 12px; margin: 0 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: none; flex-shrink: 0;
}
.sword-btn:active, .sword-btn.open {
  border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
  border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
  box-shadow: inset 1px 1px 0 #7a7068;
}
.sword-btn .line {
  position: relative; height: 2px; width: 18px; background: #000;
  opacity: 0.8;
  transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.25s, width 0.38s cubic-bezier(0.16,1,0.3,1);
}
.sword-btn.open .line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
.sword-btn.open .line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.burger-wrap { position: relative; height: 100%; display: flex; align-items: center; }

.nav-overlay {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 8999;
  min-width: 160px; padding: 2px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transform-origin: top right;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.nav-overlay a {
  font-family: 'DotGothic16', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #000; text-decoration: none; padding: 8px 12px 8px 8px;
  display: flex; align-items: center;
}
.nav-overlay a::before { content: '/'; margin-right: 7px; font-size: 10px; }
.nav-overlay a:hover { background: #5D5143; color: #f6f1da; }
.nav-overlay a + a { border-top: 1px solid #7a7068; }
.nav-overlay a.current { background: #c8c2ba; }

/* ── Main layout — below header ── */
.page-main {
  padding-top: var(--header-total-h);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.desktop {
  display: flex; gap: 7px;
  padding: 10px 10px 10px;
  flex: 1; overflow: hidden;
}

/* ── Win95 window chrome ── */
.win {
  display: flex; flex-direction: column; overflow: hidden;
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  box-shadow: 2px 2px 0 var(--bsh);
}

.tbar {
  height: 22px; background: var(--btn);
  display: flex; align-items: stretch; padding: 1px; flex-shrink: 0; user-select: none;
}
.tbar-inner {
  flex: 1; background: var(--tb);
  display: flex; align-items: center; padding: 0 1px 0 6px; gap: 2px; overflow: hidden; min-width: 0;
}
.tbar-t {
  flex: 1; font-size: 8px; font-weight: 700; letter-spacing: .12em;
  color: var(--ttxt); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1;
}
.tbbtns { display: flex; gap: 1px; flex-shrink: 0; align-items: stretch; }
.tbbtn {
  width: 16px; background: var(--btn);
  border-top: 1px solid var(--blt); border-left: 1px solid var(--blt);
  border-right: 1px solid var(--bdk); border-bottom: 1px solid var(--bdk);
  display: flex; align-items: center; justify-content: center;
  cursor: default; flex-shrink: 0; padding: 0 0 1px 0;
}
.tbbtn:active {
  border-top: 1px solid var(--bdk); border-left: 1px solid var(--bdk);
  border-right: 1px solid var(--blt); border-bottom: 1px solid var(--blt);
}

.mbar {
  display: flex; padding: 1px 2px; flex-shrink: 0;
  background: var(--tbar); border-bottom: 1px solid var(--tdim);
}
.mi { font-size: 9px; letter-spacing: .06em; padding: 2px 6px; cursor: pointer; color: var(--tdim); }
.mi:hover { color: var(--ta); }

/* scanlines overlay */
.scan {
  position: absolute; inset: 0; pointer-events: none; z-index: 3;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
}

/* ── LEFT PANEL ── */
.win-l { width: 200px; flex-shrink: 0; }

/* entire lbody: uniform dark bg, same as tbar */
.lbody {
  flex: 1; background: var(--lbg);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}

/* text flicker on all left-panel text */
@keyframes flicker {
  0%,100% { opacity: 1; }
  92%      { opacity: 1; }
  93%      { opacity: .82; }
  94%      { opacity: 1; }
  97%      { opacity: .9; }
  98%      { opacity: 1; }
}
.lbody * { animation: flicker 4s step-end infinite; }

/* phosphor text-shadow blur */
.folder-row, .note-row {
  text-shadow: 0 0 6px currentColor;
}

.flist {
  flex: 1; display: flex; flex-direction: column; padding: 8px 0;
  position: relative; z-index: 2; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
}
.flist::-webkit-scrollbar { display: none; }

.folder-row {
  padding: 1px 12px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 11px; line-height: 1.7;
  color: var(--ta); letter-spacing: .03em;
  white-space: nowrap; overflow: hidden;
  transition: color .08s;
}
.folder-row:hover { color: var(--thl); }

.folder-children { display: none; flex-direction: column; margin-bottom: 3px; }
.folder-children.open { display: flex; }

.note-row {
  padding: 0 12px 0 20px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 10px; line-height: 1.75;
  color: var(--tdim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .08s; position: relative;
}
.note-row::before { content: '· '; }
.note-row:hover { color: var(--ta); }
.note-row.act { color: var(--thl); }
.note-row.act::after {
  content: '▌'; margin-left: 2px;
  animation: bl .9s step-end infinite;
}

@keyframes bl { 50% { opacity: 0; } }

/* ── RIGHT PANEL ── */
.win-r { flex: 1; min-width: 0; }

.rbody {
  flex: 1; background: var(--tbg);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}

/* screen flicker on right panel — subtle, slow */
@keyframes screenflicker {
  0%,100% { opacity: 1; }
  85%      { opacity: 1; }
  86%      { opacity: .96; }
  87%      { opacity: 1; }
  94%      { opacity: .98; }
  95%      { opacity: 1; }
}
.rbody { animation: screenflicker 7s linear infinite; }

.r-head {
  padding: 4px 13px; font-size: 8px; letter-spacing: .10em; text-transform: uppercase;
  color: var(--tdim); border-bottom: 1px solid var(--tdim);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0; position: relative; z-index: 2;
}
.rh-path {
  flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  font-family: 'Fixedsys', monospace; font-size: 9px; letter-spacing: .04em;
}

.rscroll {
  flex: 1; overflow-y: auto; padding: 16px 20px 28px; position: relative; z-index: 2;
  scrollbar-width: thin; scrollbar-color: var(--tdim) transparent;
}
.rscroll::-webkit-scrollbar { width: 2px; }
.rscroll::-webkit-scrollbar-thumb { background: var(--tdim); }

/* feed */
.fe { padding: 14px 0; border-bottom: 1px solid rgba(122,106,82,.2); cursor: pointer; }
.fe:last-child { border-bottom: none; }
.fe:hover .fe-title { color: var(--thl); }

.fe-meta {
  font-family: 'Fixedsys', monospace; font-size: 9px;
  color: var(--tdim); margin-bottom: 7px; opacity: .6;
}
.fe-title {
  font-family: 'Alkhemikal', serif; font-size: 18px; line-height: 1.25;
  color: var(--ta); margin-bottom: 5px; transition: color .1s; letter-spacing: .02em;
}
.fe-prev {
  font-size: 9px; line-height: 1.8; color: var(--tdim); opacity: .6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* note view */
.nv { padding: 2px 0 24px; animation: fadein .12s ease; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.nbk {
  font-family: 'Fixedsys', monospace; font-size: 9px;
  color: var(--tdim); background: none; border: none; cursor: pointer;
  padding: 0; margin-bottom: 18px; display: block; transition: color .1s;
}
.nbk:hover { color: var(--ta); }

.nmeta {
  font-family: 'Fixedsys', monospace; font-size: 9px;
  color: var(--tdim); margin-bottom: 12px; opacity: .55;
}
.ntitle {
  font-family: 'Alkhemikal', serif; font-size: 22px; line-height: 1.25;
  color: var(--thl); margin-bottom: 22px; letter-spacing: .02em;
}
.nbody { font-size: 10px; line-height: 1.9; color: var(--ta); }
.nbody p { margin-bottom: 13px; }
.nbody h2 {
  font-family: 'Alkhemikal', serif; font-size: 15px; color: var(--thl);
  margin: 20px 0 8px; letter-spacing: .03em; font-weight: 400;
}
.nbody blockquote {
  border-left: 1px solid var(--tdim); padding-left: 12px;
  margin: 13px 0; color: var(--tdim);
}
.nbody strong { color: var(--thl); font-weight: 400; }

/* statusbar */
.sbar {
  background: var(--tbar); border-top: 1px solid var(--tdim);
  display: flex; align-items: center; padding: 2px 10px; gap: 8px;
  flex-shrink: 0; position: relative; z-index: 2;
}
.si { font-family: 'Fixedsys', monospace; font-size: 9px; color: var(--tdim); opacity: .6; }
.sdv { width: 1px; height: 7px; background: var(--tdim); opacity: .3; }

@media (max-width: 600px) {
  body { overflow: auto; }
  .page-main { height: auto; }
  .desktop { flex-direction: column; height: auto; padding: 8px; }
  .win { width: 100% !important; }
  .win-l { height: auto; }
  .lbody { height: auto; }
  .flist { max-height: 180px; }
  .win-r { min-height: 60vh; }
}
</style>
</head>

<canvas id="grain"></canvas>

<header id="siteHeader">
  <div class="header-safe-top"></div>

<script>
// ── Grain (identical to gallery) ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() {
  gw = grain.width  = window.innerWidth  + 20;
  gh = grain.height = window.innerHeight + 120;
}
resizeGrain();
window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

// ── Header visible ──
setTimeout(() => document.getElementById('siteHeader').classList.add('visible'), 100);

// ── Burger menu ──
const swordBtn = document.getElementById('swordBtn');
const navOverlay = document.getElementById('navOverlay');
swordBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = navOverlay.classList.toggle('open');
  swordBtn.classList.toggle('open', open);
});
document.addEventListener('click', () => {
  navOverlay.classList.remove('open');
  swordBtn.classList.remove('open');
});

// ── Templar cross pattée SVG ──
const crossSVG = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;image-rendering:pixelated;shape-rendering:crispEdges"><rect x="5" y="0" width="1" height="11" fill="#1a1612"/><rect x="4" y="1" width="3" height="1" fill="#1a1612"/><rect x="4" y="9" width="3" height="1" fill="#1a1612"/><rect x="3" y="0" width="5" height="1" fill="#1a1612"/><rect x="3" y="10" width="5" height="1" fill="#1a1612"/><rect x="0" y="5" width="11" height="1" fill="#1a1612"/><rect x="1" y="4" width="1" height="3" fill="#1a1612"/><rect x="9" y="4" width="1" height="3" fill="#1a1612"/><rect x="0" y="3" width="1" height="5" fill="#1a1612"/><rect x="10" y="3" width="1" height="5" fill="#1a1612"/></svg>`;

function makeBtns(container) {
  ['Minimize','Maximize','Close'].forEach(t => {
    const b = document.createElement('div');
    b.className = 'tbbtn'; b.title = t;
    b.innerHTML = crossSVG;
    container.appendChild(b);
  });
}
makeBtns(document.getElementById('lbtns'));
makeBtns(document.getElementById('rbtns'));

// ── Data ──
const vault = [
  {
    folder: "Эзотерика",
    notes: [
      {
        id:1, date:"2026-04-22", tags:["теургия","платон"],
        title:"О теургии и причинах молитвы",
        body:`Ямвлих говорит, что молитва действует не потому, что боги узнают о нашем желании. Боги знают всё. Молитва действует потому, что она меняет самого молящегося.

Мы не информируем небо — мы настраиваем себя. Как настраивают инструмент перед тем как извлечь звук.

## Ритуал как калибровка

Ты приводишь свою структуру в соответствие с тем, к чему обращаешься. И в этом соответствии что-то начинает двигаться.

> "The gods hear because the soul has lifted itself to them." — Ямвлих

Ритуал гексаграммы работает именно так. Не объяснение в первую очередь — форма, которая что-то делает с тобой когда ты с ней работаешь.`
      },
      {
        id:4, date:"2026-03-29", tags:["символы","юнг"],
        title:"Символ как вход, а не как знак",
        body:`Юнг разделял знак и символ. Знак указывает на что-то известное. Символ — на что-то что нельзя выразить иначе.

Крест как знак — конкретная религия. Крест как символ — пересечение осей, точка где встречаются вертикаль и горизонталь. Это нельзя объяснить — можно только почувствовать.

Символы не объясняют — они открывают.`
      }
    ]
  },
  {
    folder: "Таро",
    notes: [
      {
        id:2, date:"2026-04-18", tags:["арканы"],
        title:"Маг: воля как канал",
        body:`Маг — первый аркан после Шута. Шут — потенциал без формы. Маг — момент когда потенциал берёт инструменты в руки.

На столе лежат все четыре масти. Одна рука поднята к небу, другая опущена к земле. Это не про контроль — про канал.

## Художник как Маг

Он проводит то что уже есть — сверху вниз, через себя, в материю. Твоя задача стать достаточно прозрачным чтобы оно прошло.

Это снимает часть тревоги про "создание". Не придумывать — а быть местом через которое оно проходит.`
      }
    ]
  },
  {
    folder: "Философия",
    notes: [
      {
        id:3, date:"2026-04-10", tags:["платон","медиа"],
        title:"Пещера Платона и экраны",
        body:`Привычно читать пещеру как метафору невежества. Но узники не глупы — они рациональны. Изучают тени, строят теории, предсказывают следующую тень. Проблема не в интеллекте — он направлен не туда.

Метрики, охваты, алгоритмы — это тени на стене. Можно очень умно о них рассуждать. Но это всё равно тени.

Реальность — то что происходит когда ты рисуешь.`
      },
      {
        id:5, date:"2026-03-15", tags:["архаика"],
        title:"Архаическое как живое",
        body:`Архаическое — это не хронология. Это уровень реальности.

Мифологическое мышление не исчезло. Оно ушло под поверхность. Люди по-прежнему живут ритуалами, ищут инициации, нуждаются в символах которые содержали бы их опыт.

Работа с оккультной эстетикой — не ностальгия. Попытка нащупать то что по-прежнему живо и ждёт формы.`
      }
    ]
  }
];

const allNotes = vault.flatMap(f => f.notes.map(n => ({...n, folder: f.folder})));
let openFolders = new Set();
let activeNote = null;

function buildLeft() {
  const fl = document.getElementById('flist');
  fl.innerHTML = '';
  vault.forEach(({folder, notes}) => {
    const isOpen = openFolders.has(folder);
    const row = document.createElement('div');
    row.className = 'folder-row';
    row.textContent = `[${folder.toUpperCase()}]`;
    row.onclick = () => {
      openFolders.has(folder) ? openFolders.delete(folder) : openFolders.add(folder);
      activeNote = null;
      buildLeft();
      showFeed(notes.map(n => ({...n, folder})), folder);
    };
    fl.appendChild(row);

    const children = document.createElement('div');
    children.className = 'folder-children' + (isOpen ? ' open' : '');
    notes.forEach(note => {
      const nr = document.createElement('div');
      nr.className = 'note-row' + (activeNote?.id === note.id ? ' act' : '');
      nr.textContent = note.title;
      nr.title = note.title;
      nr.onclick = e => {
        e.stopPropagation();
        activeNote = note;
        buildLeft();
        openNote({...note, folder});
      };
      children.appendChild(nr);
    });
    fl.appendChild(children);
  });
}

function showFeed(notes, folderName) {
  const sorted = [...notes].sort((a,b) => b.date.localeCompare(a.date));
  const lbl = folderName || 'ALL';
  document.getElementById('rtitle').textContent = `NOEASY / GARDEN / ${lbl.toUpperCase()}`;
  document.getElementById('rpath').textContent = `C:\\NOEASY\\${lbl.toUpperCase()}\\*.*`;
  document.getElementById('rcnt').textContent = `${sorted.length} files`;
  document.getElementById('s1').textContent = lbl.toUpperCase();
  document.getElementById('s2').textContent = sorted.length + ' entries';
  document.getElementById('s3').textContent = sorted[0]?.date || '';
  const r = document.getElementById('reader');
  r.innerHTML = '';
  sorted.forEach(n => {
    const e = document.createElement('div');
    e.className = 'fe';
    const preview = n.body.replace(/[#>*_\n]/g,' ').replace(/\s+/g,' ').slice(0,140);
    e.innerHTML = `<div class="fe-meta">${n.date}  ·  ${n.tags.join(' · ')}</div><div class="fe-title">${n.title}</div><div class="fe-prev">${preview}</div>`;
    e.onclick = () => { activeNote = n; buildLeft(); openNote({...n, folder: n.folder||folderName}); };
    r.appendChild(e);
  });
  r.scrollTop = 0;
}

function openNote(n) {
  document.getElementById('rtitle').textContent = `NOEASY / ${n.folder.toUpperCase()} / NOTE`;
  document.getElementById('rpath').textContent = `C:\\NOEASY\\${n.folder.toUpperCase()}\\NOTE.TXT`;
  document.getElementById('rcnt').textContent = '';
  document.getElementById('s1').textContent = n.folder.toUpperCase();
  document.getElementById('s2').textContent = n.tags.join(' · ');
  document.getElementById('s3').textContent = n.date;
  const r = document.getElementById('reader');
  r.innerHTML = '';
  const v = document.createElement('div');
  v.className = 'nv';
  v.innerHTML = `<button class="nbk" id="nbk">← back</button><div class="nmeta">${n.date}  ·  ${[n.folder,...n.tags].join(' · ')}</div><div class="ntitle">${n.title}</div><div class="nbody">${md(n.body)}</div>`;
  v.querySelector('#nbk').onclick = () => {
    activeNote = null; buildLeft();
    const fn = vault.find(f => f.folder === n.folder)?.notes || [];
    showFeed(fn.map(x => ({...x, folder: n.folder})), n.folder);
  };
  r.appendChild(v);
  r.scrollTop = 0;
}

function md(t) {
  return t.split('\n\n').map(b => {
    if (b.startsWith('## ')) return `<h2>${b.slice(3)}</h2>`;
    if (b.startsWith('> '))  return `<blockquote>${b.slice(2)}</blockquote>`;
    return `<p>${b.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p>`;
  }).join('');
}

buildLeft();
showFeed(allNotes, null);
document.getElementById('rtitle').textContent = 'NOEASY / GARDEN';
document.getElementById('rpath').textContent = 'C:\\NOEASY\\GARDEN\\*.*';
document.getElementById('s1').textContent = 'GARDEN';
</script>

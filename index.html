<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOEASY</title>
<link rel="icon" type="image/png" href="IMG_8091.png">
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: #f6f1da;
  color: #353535;
  font-family: 'DotGothic16', monospace;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

#grain {
  position:fixed; inset:0; z-index:99; pointer-events:none;
}

.stage {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
}

.desktop {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 36px;
  opacity: 0;
  animation: appear 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}

@keyframes appear {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

.shortcut {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  color: #353535;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  width: 80px;
}

.shortcut-icon {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  flex-shrink: 0;
}

.shortcut-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
  display: block;
}

.shortcut-label {
  font-family: 'DotGothic16', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.4;
  color: #353535;
  padding: 1px 3px;
  transition: background 0.05s, color 0.05s;
}

.shortcut:hover .shortcut-label {
  background: #5D5143;
  color: #f6f1da;
}

.shortcut:active .shortcut-icon {
  transform: translate(1px, 1px);
}

.shortcut.cur .shortcut-label {
  background: #5D5143;
  color: #f6f1da;
  pointer-events: none;
}

footer {
  position:fixed; bottom:0; left:0; right:0; z-index:2;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 20px max(16px, env(safe-area-inset-bottom,16px));
  opacity:0;
  animation: appear 0.6s ease 1s forwards;
  font-family: 'DotGothic16', monospace;
  font-size: 8px; letter-spacing: 0.18em; text-transform:uppercase;
}
footer span { opacity:0.32; }
footer a {
  opacity:0.32; color:#353535; text-decoration:none;
  transition: opacity 0.2s;
}
footer a:hover { opacity:0.65; }
</style>
</head>
<body>

<canvas id="grain"></canvas>

<div class="stage">
  <div class="desktop">

    <a href="/" class="shortcut cur">
      <div class="shortcut-icon">
        <img src="icons/home.png" alt="Home">
      </div>
      <span class="shortcut-label">Home</span>
    </a>

    <a href="/about/" class="shortcut">
      <div class="shortcut-icon">
        <img src="icons/about.png" alt="About">
      </div>
      <span class="shortcut-label">About</span>
    </a>

    <a href="/gallery/" class="shortcut">
      <div class="shortcut-icon">
        <img src="icons/gallery.png" alt="Gallery">
      </div>
      <span class="shortcut-label">Gallery</span>
    </a>

    <a href="/links/" class="shortcut">
      <div class="shortcut-icon">
        <img src="icons/links.png" alt="Links">
      </div>
      <span class="shortcut-label">Links</span>
    </a>

  </div>
</div>

<footer>
  <span>NoEasy 2026</span>
  <a href="/privacy/">Privacy Policy</a>
</footer>

<script>
const g = document.getElementById('grain');
const gc = g.getContext('2d');
let gw, gh;
function rsz() { gw = g.width = window.innerWidth; gh = g.height = window.innerHeight; }
rsz(); window.addEventListener('resize', rsz);
(function tick() {
  const d = gc.createImageData(gw, gh);
  for (let i = 0; i < d.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d.data[i] = d.data[i+1] = d.data[i+2] = v;
    d.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(d, 0, 0);
  requestAnimationFrame(tick);
})();
</script>

</body>
</html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOEASY</title>
<link rel="icon" type="image/png" href="IMG_8091.png">
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: #f6f1da;
  color: #353535;
  font-family: 'DotGothic16', monospace;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

#grain {
  position:fixed; inset:0; z-index:99; pointer-events:none;
}

.stage {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding: 20px;
}

/* ── Landscape: гифка слева, ярлыки справа ── */
.layout {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: clamp(16px, 4vw, 48px);
  opacity: 0;
  animation: appear 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  max-width: 100%;
  max-height: 100%;
}

@keyframes appear {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Portrait: гифка сверху, ярлыки в ряд снизу ── */
@media (orientation: portrait) {
  .layout {
    flex-direction: column;
  }
  .desktop {
    flex-direction: row !important;
    display: flex !important;
    grid-template-columns: none !important;
  }
}

/* ── Win95 window ── */
.win95 {
  background: #AFA191;
  border-top: 2px solid #d4cdc4;
  border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830;
  border-bottom: 2px solid #3d3830;
  box-shadow: 1px 1px 0 #2a2520;
  padding: 1px;
  flex-shrink: 0;
  /* размер окна подстраивается под ориентацию */
  width: clamp(120px, 36vw, 300px);
}

@media (orientation: portrait) {
  .win95 {
    /* 4 ярлыка по 64px + 3 gap по 4vw, минимум чтобы не было уже ярлыков */
    width: clamp(220px, 80vw, 400px);
  }
}

.win95-titlebar {
  display: flex; align-items: stretch;
  height: 20px;
  background: #AFA191;
  padding: 1px;
  margin-bottom: 1px;
  user-select: none;
}

.win95-titlebar-inner {
  flex: 1;
  height: 100%;
  background: #5D5143;
  display: flex; align-items: center;
  padding: 0 1px 0 6px;
  overflow: hidden;
  min-width: 0;
  gap: 2px;
}

.win95-titlebar-text {
  font-family: 'DotGothic16', monospace;
  font-size: 8px; font-weight: 700;
  color: #f6f1da;
  letter-spacing: 0.10em; text-transform: uppercase;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  line-height: 1;
  flex: 1;
}

.win95-titlebar-btns {
  display: flex; gap: 1px; flex-shrink: 0; align-items: stretch;
}

.win95-btn {
  width: 16px;
  background: #AFA191;
  border-top: 1px solid #d4cdc4;
  border-left: 1px solid #d4cdc4;
  border-right: 1px solid #3d3830;
  border-bottom: 1px solid #3d3830;
  display: flex; align-items: center; justify-content: center;
  cursor: default;
  flex-shrink: 0;
}

.win95-body {
  width: 100%;
  display: block;
  overflow: hidden;
  line-height: 0;
  background: #f6f1da;
}

.win95-body img {
  width: 100%;
  height: auto;
  display: block;
  image-rendering: pixelated;
}

/* ── Shortcuts: по умолчанию сетка 2×2 ── */
.desktop {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(16px, 3vw, 36px);
}

/* В портрете — ряд из 4, ширина подстраивается под ярлыки ── */
@media (orientation: portrait) {
  .desktop {
    display: flex;
    flex-direction: row;
    gap: clamp(12px, 4vw, 28px);
  }
}

.shortcut {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: #353535;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  width: clamp(48px, 10vw, 72px);
}

@media (orientation: portrait) {
  .shortcut {
    width: clamp(44px, 16vw, 64px);
  }
}

.shortcut-icon {
  width: clamp(32px, 7vw, 48px);
  height: clamp(32px, 7vw, 48px);
  image-rendering: pixelated;
  flex-shrink: 0;
}

@media (orientation: portrait) {
  .shortcut-icon {
    width: clamp(30px, 11vw, 44px);
    height: clamp(30px, 11vw, 44px);
  }
}

.shortcut-icon img {
  width: 100%; height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
  display: block;
}

.shortcut-label {
  font-family: 'DotGothic16', monospace;
  font-size: clamp(8px, 1.8vw, 10px);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.3;
  color: #353535;
  padding: 1px 3px;
  transition: background 0.05s, color 0.05s;
}

.shortcut:hover .shortcut-label {
  background: #5D5143;
  color: #f6f1da;
}

.shortcut:active .shortcut-icon {
  transform: translate(1px, 1px);
}

.shortcut.cur .shortcut-label {
  background: #5D5143;
  color: #f6f1da;
  pointer-events: none;
}

/* ── Footer ── */
footer {
  position:fixed; bottom:0; left:0; right:0; z-index:2;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 20px max(16px, env(safe-area-inset-bottom,16px));
  opacity:0;
  animation: appear 0.6s ease 1s forwards;
  font-family: 'DotGothic16', monospace;
  font-size: 8px; letter-spacing: 0.18em; text-transform:uppercase;
}
footer span { opacity:0.32; }
footer a {
  opacity:0.32; color:#353535; text-decoration:none;
  transition: opacity 0.2s;
}
footer a:hover { opacity:0.65; }
</style>

<script>
// ── GIF fallback (.gif / .GIF) ──
const heroImg = document.getElementById('hero-gif');
heroImg.onerror = function() {
  if (this.src.endsWith('.gif')) {
    this.src = 'assets/hero.GIF';
  }
};


const g = document.getElementById('grain');
const gc = g.getContext('2d');
let gw, gh;
function rsz() { gw = g.width = window.innerWidth; gh = g.height = window.innerHeight; }
rsz(); window.addEventListener('resize', rsz);
(function tick() {
  const d = gc.createImageData(gw, gh);
  for (let i = 0; i < d.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d.data[i] = d.data[i+1] = d.data[i+2] = v;
    d.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(d, 0, 0);
  requestAnimationFrame(tick);
})();
</script>

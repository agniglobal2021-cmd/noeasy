<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'Fixedsys';
  src: url('../fonts/Fixedsys.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'PageFont';
  src: url('../fonts/PageFont.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg:    #e8e0c4;
–text:  #353535;
–desk:  #5D5143;
–tb:    #5D5143;
–ttxt:  #f6f1da;
–btn:   #AFA191;
–blt:   #d4cdc4;
–bdk:   #3d3830;
–bsh:   #2a2520;
/* terminal — left panel bg: #221c14 ≈ #2e2820 darkened ~10% */
–lbg:   #1e1a12;
–tbg:   #2e2820;
–ta:    #D6D5A9;
–tdim:  #7a6a52;
–thl:   #e8d0a0;
–tbar:  #181410;
–tsel:  #6a5535;
–header-titlebar-h: 22px;
–header-pill-h: 44px;
–header-total-h: calc(env(safe-area-inset-top, 0px) + var(–header-titlebar-h) + var(–header-pill-h));
–r-fsize: 11px;
}

html { background: #5D5143; overflow-x: hidden; }

body::before {
content: ‘’;
position: fixed; top: -100vh; left: 0; right: 0;
height: 100vh; background: #5D5143;
z-index: 9001; pointer-events: none;
}

body {
background: var(–bg);
font-family: ‘DotGothic16’, monospace;
color: var(–text);
overflow: hidden;
overscroll-behavior: none;
-webkit-tap-highlight-color: transparent;
-webkit-font-smoothing: none;
height: 100vh;
}

/* ── Grain canvas (same as gallery) ── */
#grain {
position: fixed;
top: -60px; bottom: -60px; left: -10px; right: -10px;
z-index: 9998; pointer-events: none;
}

/* ── HEADER (identical to gallery) ── */
header {
position: fixed; top: 0; left: 0; right: 0; z-index: 500;
display: flex; flex-direction: column; align-items: stretch;
pointer-events: none;
opacity: 0; transition: opacity 0.7s ease;
background: var(–desk);
}
header.visible { opacity: 1; }
header > * { pointer-events: auto; }

.header-safe-top {
height: env(safe-area-inset-top, 0px);
background: var(–desk); flex-shrink: 0;
}
.header-inner { display: flex; flex-direction: column; align-items: stretch; width: 100%; }

.header-titlebar-strip {
width: 100%; height: var(–header-titlebar-h);
background: #5D5143;
display: flex; align-items: center; justify-content: space-between;
padding: 0 0 0 8px; flex-shrink: 0;
border-bottom: 1px solid #3e352d;
}
.header-titlebar-strip-text {
font-family: ‘DotGothic16’, monospace;
font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
color: #f6f1da; line-height: 1;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}

.header-pill {
display: flex; align-items: center;
position: relative; width: 100%; height: var(–header-pill-h);
background: #AFA191;
border-top: 1px solid #d4cdc4; border-bottom: 2px solid #7a7068;
box-shadow: 0 1px 0 #404040;
overflow: visible; padding: 0 4px;
}

.pill-divider {
width: 2px; height: 26px; flex-shrink: 0;
background: #808080; border-right: 1px solid #d4cdc4;
align-self: center; margin: 0 2px;
}

.pill-center {
flex: 1; min-width: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 1px; pointer-events: none; user-select: none;
overflow: hidden;
}
.pill-section {
font-family: ‘Alkhemikal’, serif;
font-size: clamp(13px, 4vw, 19px); letter-spacing: 0.08em; opacity: 0.9; color: #000;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}

.sword-btn {
height: calc(100% - 10px); padding: 0 12px; margin: 0 2px;
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 4px;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
cursor: pointer; -webkit-tap-highlight-color: transparent;
transition: none; flex-shrink: 0;
}
.sword-btn:active, .sword-btn.open {
border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
box-shadow: inset 1px 1px 0 #7a7068;
}
.sword-btn .line {
position: relative; height: 2px; width: 18px; background: #000;
opacity: 0.8;
transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.25s, width 0.38s cubic-bezier(0.16,1,0.3,1);
}
.sword-btn.open .line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
.sword-btn.open .line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.burger-wrap { position: relative; height: 100%; display: flex; align-items: center; }

.nav-overlay {
position: absolute; top: calc(100% + 4px); right: 0; z-index: 8999;
min-width: 160px; padding: 2px;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: 2px 2px 0 #2a2520;
display: flex; flex-direction: column;
opacity: 0; pointer-events: none;
transform: translateY(-4px); transform-origin: top right;
transition: opacity 0.15s ease, transform 0.15s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.nav-overlay a {
font-family: ‘DotGothic16’, monospace;
font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
color: #000; text-decoration: none; padding: 8px 12px 8px 8px;
display: flex; align-items: center;
}
.nav-overlay a::before { content: ‘/’; margin-right: 7px; font-size: 10px; }
.nav-overlay a:hover { background: #5D5143; color: #f6f1da; }
.nav-overlay a + a { border-top: 1px solid #7a7068; }
.nav-overlay a.current { background: #c8c2ba; }

/* ── Main layout — below header ── */
.page-main {
position: fixed;
top: var(–header-total-h);
left: 0; right: 0;
bottom: env(safe-area-inset-bottom, 0px);
display: flex;
flex-direction: column;
overflow: hidden;
}

.desktop {
display: flex; gap: 7px;
padding: 8px 8px 12px;
flex: 1; overflow: hidden;
max-width: 1100px;
width: 100%;
margin: 0 auto;
box-sizing: border-box;
min-height: 0;
}

/* ── Win95 window chrome ── */
.win {
display: flex; flex-direction: column; overflow: hidden;
border-top: 2px solid var(–blt); border-left: 2px solid var(–blt);
border-right: 2px solid var(–bdk); border-bottom: 2px solid var(–bdk);
box-shadow: 2px 2px 0 var(–bsh);
}

.tbar {
height: 22px; background: var(–btn);
display: flex; align-items: stretch; padding: 1px; flex-shrink: 0; user-select: none;
}
.tbar-inner {
flex: 1; background: var(–tb);
display: flex; align-items: center; padding: 0 1px 0 6px; gap: 2px; overflow: hidden; min-width: 0;
}
.tbar-t {
flex: 1; font-size: 8px; font-weight: 700; letter-spacing: .12em;
color: var(–ttxt); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1;
}
.tbbtns { display: flex; gap: 1px; flex-shrink: 0; align-items: stretch; }
.tbbtn {
width: 16px; background: var(–btn);
border-top: 1px solid var(–blt); border-left: 1px solid var(–blt);
border-right: 1px solid var(–bdk); border-bottom: 1px solid var(–bdk);
display: flex; align-items: center; justify-content: center;
cursor: default; flex-shrink: 0; padding: 0 0 1px 0;
}
.tbbtn:active {
border-top: 1px solid var(–bdk); border-left: 1px solid var(–bdk);
border-right: 1px solid var(–blt); border-bottom: 1px solid var(–blt);
}

.mbar {
display: flex; padding: 2px 3px; flex-shrink: 0; gap: 2px;
background: var(–lbg); border-bottom: 1px solid rgba(201,164,114,.1);
}
.lm-btn {
font-family: ‘Fixedsys’, monospace; font-size: 8px; letter-spacing: .08em;
display: flex; align-items: center; gap: 3px;
padding: 2px 7px; cursor: pointer; color: var(–ta);
background: var(–tbg);
border-top: 1px solid #4a4030; border-left: 1px solid #4a4030;
border-right: 1px solid #111008; border-bottom: 1px solid #111008;
transition: color .08s; user-select: none;
}
.lm-btn:hover { color: var(–thl); }
.lm-btn:active {
border-top: 1px solid #111008; border-left: 1px solid #111008;
border-right: 1px solid #4a4030; border-bottom: 1px solid #4a4030;
}
.lm-btn.active { color: var(–thl); background: var(–tsel); }
.lm-label { font-size: 7px; letter-spacing: .1em; }

/* ── Star background canvas ── */
canvas#starsBg {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
display: block;
z-index: 0;
image-rendering: pixelated;
}
canvas#graphCanvas {
display: block;
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
z-index: 1;
image-rendering: auto;
}

/* ── CRT turn-on overlay ── */
#crtOverlay {
position: absolute;
inset: 0;
z-index: 20;
pointer-events: none;
opacity: 0;
background: #D6D5A9;
}
@keyframes crtOn {
0%   { opacity: 0.76; clip-path: inset(48% 0 48% 0); }
18%  { opacity: 0.72; clip-path: inset(44% 0 44% 0); }
30%  { opacity: 0.56; clip-path: inset(30% 0 30% 0); }
50%  { opacity: 0.40; clip-path: inset(10% 0 10% 0); }
70%  { opacity: 0.20; clip-path: inset(2% 0 2% 0); }
88%  { opacity: 0.08; clip-path: inset(0% 0 0% 0); }
100% { opacity: 0;    clip-path: inset(0% 0 0% 0); }
}
#crtOverlay.firing {
animation: crtOn 0.38s steps(6, end) forwards;
}

/* ── Graph panel fold-appear animation ── */
@keyframes graphFoldIn {
0%   { transform: scaleY(0); opacity: 0; }
60%  { transform: scaleY(1.04); opacity: 1; }
100% { transform: scaleY(1); opacity: 1; }
}
.graph-panel.open {
display: block;
transform-origin: top center;
animation: graphFoldIn 0.32s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* ── Win-l expand / Win-r shrink when graph open ── */
.desktop.graph-active .win-l { width: 340px; transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }
.win-l { transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }

/* ── Hide fold-all when graph open ── */
.graph-panel-open #lmbar { opacity: 0; pointer-events: none; transition: opacity 0.15s; }
#lmbar { transition: opacity 0.15s; }

/* ── Graph panel — full left-panel overlay ── */
.graph-panel {
position: absolute; inset: 0; z-index: 10;
background: #0c0a06;
display: none; overflow: hidden;
}

.graph-wrap {
width: 100%; height: 100%;
position: relative; overflow: hidden;
background: #0c0a06;
}

/* hide old graph pill toggle */
.graph-toggle-pill { display: none; }

/* scanlines overlay */
.scan {
position: absolute; inset: 0; pointer-events: none; z-index: 1;
background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
}

/* ── LEFT PANEL ── */
.win-l { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* entire lbody: uniform dark bg, same as tbar */
.lbody {
flex: 1; background: var(–lbg);
display: flex; flex-direction: column; overflow: hidden; position: relative;
min-height: 0;
}

/* text flicker on all left-panel text */
@keyframes flicker {
0%,100% { opacity: 1; }
92%      { opacity: 1; }
93%      { opacity: .82; }
94%      { opacity: 1; }
97%      { opacity: .9; }
98%      { opacity: 1; }
}
.lbody *:not(#crtOverlay) { animation: flicker 4s step-end infinite; }

/* phosphor text-shadow blur */
.folder-row, .note-row {
text-shadow: 0 0 6px currentColor;
}

.flist {
flex: 1; display: flex; flex-direction: column; padding: 8px 0;
position: relative; z-index: 2; overflow-y: auto; overflow-x: hidden;
scrollbar-width: none;
}
.flist::-webkit-scrollbar { display: none; }

.folder-row {
padding: 1px 12px; cursor: pointer; user-select: none;
font-family: ‘Fixedsys’, monospace; font-size: 11px; line-height: 1.7;
color: var(–ta); letter-spacing: .03em;
white-space: nowrap; overflow: hidden;
transition: color .08s;
}
.folder-row:hover { color: var(–thl); }

.folder-children { display: none; flex-direction: column; margin-bottom: 3px; }
.folder-children.open { display: flex; }

.note-row {
padding: 0 12px 0 20px; cursor: pointer; user-select: none;
font-family: ‘Fixedsys’, monospace; font-size: 10px; line-height: 1.75;
color: var(–tdim);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
transition: color .08s; position: relative;
}
.note-row::before { content: ’· ’; }
.note-row:hover { color: var(–ta); }
.note-row.act { color: var(–thl); }
.note-row.act::after {
content: ‘▌’; margin-left: 2px;
animation: bl .9s step-end infinite;
}

@keyframes bl { 50% { opacity: 0; } }

/* ── Font size knob button ── */
.fsize-btn {
height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
display: flex; align-items: center; justify-content: center; gap: 5px;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
cursor: pointer; -webkit-tap-highlight-color: transparent;
flex-shrink: 0; user-select: none; position: relative;
}
.fsize-btn:active {
border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
box-shadow: inset 1px 1px 0 #7a7068;
}
.fsize-label {
font-family: ‘Alkhemikal’, serif; font-size: 13px;
color: #000; opacity: 0.75; letter-spacing: .02em; line-height: 1;
}
.fsize-knob {
width: 18px; height: 18px; border-radius: 50%;
background: radial-gradient(circle at 38% 38%, #d4cdc4, #8a7e72);
border: 1px solid #3d3830;
box-shadow: 1px 1px 0 #2a2520, inset 1px 1px 0 rgba(255,255,255,0.3);
position: relative; flex-shrink: 0;
transition: transform 0.1s;
}
.fsize-knob::after {
content: ‘’;
position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
width: 2px; height: 5px; background: #2a2520; border-radius: 1px;
}

.fsize-popup {
position: absolute; top: calc(100% + 6px); right: 0;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: 2px 2px 0 #2a2520;
padding: 8px 10px; z-index: 9000;
display: none; flex-direction: column; gap: 6px; min-width: 140px;
}
.fsize-popup.open { display: flex; }
.fsize-popup-title {
font-family: ‘Fixedsys’, monospace; font-size: 8px;
color: #000; opacity: 0.6; letter-spacing: .1em; text-transform: uppercase;
border-bottom: 1px solid #7a7068; padding-bottom: 4px; margin-bottom: 2px;
}

/* ── Graph knob button (same style as fsize-btn) ── */
.gknob-btn {
height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
display: flex; align-items: center; justify-content: center; gap: 5px;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
cursor: pointer; -webkit-tap-highlight-color: transparent;
flex-shrink: 0; user-select: none; position: relative;
}
.gknob-btn:active, .gknob-btn.open {
border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
box-shadow: inset 1px 1px 0 #7a7068;
}
.gknob-label {
font-family: ‘Fixedsys’, monospace; font-size: 8px;
color: #000; opacity: 0.7; letter-spacing: .05em; line-height: 1;
}
.gknob-knob { display: none; }
.gknob-map-icon {
width: 20px; height: 20px;
flex-shrink: 0; display: block;
}
.gknob-popup {
position: absolute; top: calc(100% + 6px); right: 0;
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: 2px 2px 0 #2a2520;
padding: 8px 10px; z-index: 9000;
display: none; flex-direction: column; gap: 6px; min-width: 140px;
}
.gknob-popup.open { display: flex; }
.gknob-popup-title {
font-family: ‘Fixedsys’, monospace; font-size: 8px;
color: #000; opacity: 0.6; letter-spacing: .1em; text-transform: uppercase;
border-bottom: 1px solid #7a7068; padding-bottom: 4px; margin-bottom: 2px;
}
.gknob-track {
display: flex; align-items: center; gap: 6px;
}
.gknob-track-label {
font-family: ‘Fixedsys’, monospace; font-size: 8px; color: #000; opacity: 0.5; width: 12px; text-align: center;
}
.gknob-slider {
flex: 1; height: 14px; position: relative; cursor: pointer;
background: #8a7e72;
border-top: 1px solid #3d3830; border-left: 1px solid #3d3830;
border-right: 1px solid #d4cdc4; border-bottom: 1px solid #d4cdc4;
}
.gknob-thumb {
position: absolute; top: 1px; width: 10px; height: 10px;
background: #AFA191;
border-top: 1px solid #d4cdc4; border-left: 1px solid #d4cdc4;
border-right: 1px solid #3d3830; border-bottom: 1px solid #3d3830;
cursor: grab; transform: translateX(-50%);
}
/* graph open/close toggle in pill — remove old pill button */
.graph-toggle-pill { display: none; }
.fsize-track {
display: flex; align-items: center; gap: 6px;
}
.fsize-track-label {
font-family: ‘Fixedsys’, monospace; font-size: 8px; color: #000; opacity: 0.5; width: 12px;
}
.fsize-slider {
flex: 1; height: 14px; position: relative; cursor: pointer;
background: #8a7e72;
border-top: 1px solid #3d3830; border-left: 1px solid #3d3830;
border-right: 1px solid #d4cdc4; border-bottom: 1px solid #d4cdc4;
}
.fsize-thumb {
position: absolute; top: 1px; width: 10px; height: 10px;
background: #AFA191;
border-top: 1px solid #d4cdc4; border-left: 1px solid #d4cdc4;
border-right: 1px solid #3d3830; border-bottom: 1px solid #3d3830;
cursor: grab; transform: translateX(-50%);
}

/* ── Win95 scrollbar for right panel ── */
.rscroll {
flex: 1; overflow-y: scroll; padding: 14px 14px 20px; position: relative; z-index: 2;
scrollbar-width: auto; scrollbar-color: #AFA191 #5a5145;
background: var(–lbg);
}
.rscroll::-webkit-scrollbar { width: 16px; }
.rscroll::-webkit-scrollbar-track {
background: #5a5145;
border-left: 1px solid #3d3830;
}
.rscroll::-webkit-scrollbar-thumb {
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
min-height: 20px;
}
.rscroll::-webkit-scrollbar-button {
background: #AFA191; height: 16px;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
display: block;
}

/* ── Obsidian path in right tbar ── */
#rtitle {
font-family: ‘Fixedsys’, monospace;
font-size: 8px; letter-spacing: .08em;
}
#rtitle .rpath-root { color: var(–tdim); }
#rtitle .rpath-cur  { color: var(–ttxt); }

/* ── RIGHT PANEL ── */
.win-r { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.rbody {
flex: 1; background: var(–lbg);
display: flex; flex-direction: column; overflow: hidden; position: relative;
min-height: 0;
}

/* feed — card style */
.fe {
background: #AFA191;
border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068, 2px 2px 0 #1a1612;
padding: 18px 20px 16px;
margin-bottom: 10px;
cursor: pointer;
will-change: transform;
}
.fe-meta, .fe-title, .fe-prev { will-change: transform; }
.fe:last-child { margin-bottom: 0; }
.fe:hover .fe-title { color: #1a1410; }

<script>
// ── Global popup mutex — one popup open at a time ──
window._popups = {};
window._registerPopup = function(name, closeFn) { window._popups[name] = closeFn; };
window._closeAllPopups = function(except) {
  Object.entries(window._popups).forEach(([k, fn]) => { if (k !== except) fn(); });
};

// ── Grain (identical to gallery) ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() {
  gw = grain.width  = window.innerWidth  + 20;
  gh = grain.height = window.innerHeight + 120;
}
resizeGrain();
window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

// ── Header visible ──
setTimeout(() => document.getElementById('siteHeader').classList.add('visible'), 100);

// ── Burger menu ──

const navOverlay = document.getElementById('navOverlay');
swordBtn.addEventListener('click', e => {
  e.stopPropagation();
  const willOpen = !navOverlay.classList.contains('open');
  if (willOpen) window._closeAllPopups('burger');
  const open = navOverlay.classList.toggle('open');
  swordBtn.classList.toggle('open', open);
});
window._registerPopup('burger', () => {
  navOverlay.classList.remove('open');
  swordBtn.classList.remove('open');
});

function makeBtns(container) {
  ['Minimize','Maximize','Close'].forEach(t => {

const allNotes = vault.flatMap(f => f.notes.map(n => ({...n, folder: f.folder})));
let openFolders = new Set(vault.map(f => f.folder)); // all open by default
let activeNote = null;

function buildLeft() {
  const fl = document.getElementById('flist');
  fl.innerHTML = '';
  vault.forEach(({folder, notes}) => {
    const isOpen = openFolders.has(folder);
    const row = document.createElement('div');
    row.className = 'folder-row';
    row.textContent = `[${folder.toUpperCase()}]`;
    row.onclick = () => {
      openFolders.has(folder) ? openFolders.delete(folder) : openFolders.add(folder);
      activeNote = null;
      buildLeft();
      showFeed(notes.map(n => ({...n, folder})), folder);
    };
    fl.appendChild(row);

    const children = document.createElement('div');
    children.className = 'folder-children' + (isOpen ? ' open' : '');
    notes.forEach(note => {
      const nr = document.createElement('div');
      nr.className = 'note-row' + (activeNote?.id === note.id ? ' act' : '');
      nr.textContent = note.title;
      nr.title = note.title;
      nr.onclick = e => {
        e.stopPropagation();
        activeNote = note;
        buildLeft();
        openNote({...note, folder});
      };
      children.appendChild(nr);
    });
    fl.appendChild(children);
  });
}

function setRPath(cur) {
  const el = document.getElementById('rpathCur');
  if (el) el.textContent = cur;
}

function showFeed(notes, folderName, _fromTree) {
  if (!_fromTree && window._treeSetNote) window._treeSetNote([], null);
  const sorted = [...notes].sort((a,b) => b.date.localeCompare(a.date));
  const lbl = folderName || '';
  setRPath(lbl ? lbl.toLowerCase() + '/' : '');
  document.getElementById('s1').textContent = (lbl || 'GARDEN').toUpperCase();
  document.getElementById('s2').textContent = sorted.length + ' entries';
  document.getElementById('s3').textContent = sorted[0]?.date || '';
  const r = document.getElementById('reader');
  r.innerHTML = '';
  sorted.forEach(n => {
    const e = document.createElement('div');
    e.className = 'fe';
    const preview = n.body.replace(/[#>*_\n]/g,' ').replace(/\s+/g,' ').slice(0,140);
    e.innerHTML = `<div class="fe-meta">${n.date}  ·  ${n.tags.join(' · ')}</div><div class="fe-title">${n.title}</div><div class="fe-prev">${preview}</div><span class="fe-arrow">READ →</span>`;
    e.onclick = () => { activeNote = n; buildLeft(); openNote({...n, folder: n.folder||folderName}); };
    r.appendChild(e);
  });
  r.scrollTop = 0;
}

function openNote(n) {
  if (window._treeSetNote) window._treeSetNote(n.sephirot || [], n);
  setRPath(n.folder.toLowerCase() + '/' + n.title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'') + '.md');
  document.getElementById('s1').textContent = n.folder.toUpperCase();
  document.getElementById('s2').textContent = n.tags.join(' · ');
  document.getElementById('s3').textContent = n.date;
  const r = document.getElementById('reader');
  r.innerHTML = '';
  const v = document.createElement('div');
  v.className = 'nv';
  v.innerHTML = `<button class="nbk" id="nbk">← back</button><div class="nv-inner"><div class="nmeta">${n.date}  ·  ${[n.folder,...n.tags].join(' · ')}</div><div class="ntitle">${n.title}</div><div class="n-rule"></div><div class="nbody">${md(n.body)}</div></div>`;
  v.querySelector('#nbk').onclick = () => {
    activeNote = null; buildLeft();
    const fn = vault.find(f => f.folder === n.folder)?.notes || [];
    showFeed(fn.map(x => ({...x, folder: n.folder})), n.folder);
  };
  r.appendChild(v);
  r.scrollTop = 0;
}

function md(t) {
  return t.split('\n\n').map(b => {
    if (b.startsWith('## ')) return `<h2>${b.slice(3)}</h2>`;
    if (b.startsWith('> '))  return `<blockquote>${b.slice(2)}</blockquote>`;
    return `<p>${b.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p>`;
  }).join('');
}


// ── Collapse / Expand All toggle ──
(function() {
  const btn = document.getElementById('collapseAllBtn');
  const icon = document.getElementById('collapseIcon');
  const label = document.getElementById('collapseLabel');
  let allOpen = true; // matches default open state

  btn.addEventListener('click', () => {

})();

// ── Graph knob button (open/close graph panel + zoom slider) ──
(function() {
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.5, ZOOM_DEFAULT = 1.0;
  let zoomCur = ZOOM_DEFAULT;

  const btn    = document.getElementById('gknobBtn');
  const popup  = document.getElementById('gknobPopup');
  const slider = document.getElementById('gknobSlider');
  const thumb  = document.getElementById('gknobThumb');
  const wrap   = document.getElementById('gknobWrap');
  const panel  = document.getElementById('graphPanel');
  const flist  = document.getElementById('flist');
  const desktop = document.querySelector('.desktop');
  const winL   = document.querySelector('.win-l');
  const lbody  = document.querySelector('.lbody');
  const lmbar  = document.getElementById('lmbar');
  const crtEl  = document.getElementById('crtOverlay');

  let graphVisible = false;

  function fireCRT() {
    crtEl.classList.remove('firing');
    void crtEl.offsetWidth; // reflow
    crtEl.classList.add('firing');
    setTimeout(() => crtEl.classList.remove('firing'), 420);
  }

  function zoomPct() { return (zoomCur - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN); }

  function applyKnob() {
    const sliderW = slider.offsetWidth;
    if (sliderW > 0) thumb.style.left = (zoomPct() * (sliderW - 10) + 5) + 'px';
    if (window._graphSetZoom) window._graphSetZoom(zoomCur);
  }

  // Don't call applyKnob here — slider is hidden, offsetWidth=0

  function openGraph() {
    graphVisible = true;
    btn.classList.add('open');
    fireCRT();
    lbody.classList.add('graph-panel-open');
    desktop.classList.add('graph-active');
    winL.classList.add('graph-open-mobile');
    panel.classList.add('open');
    flist.style.display = 'none';
    popup.classList.add('open');
    requestAnimationFrame(() => applyKnob());
    initGraph();
    // Force canvas resize after layout settles — critical on mobile
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (window._graphForceResize) window._graphForceResize();
    }));
    setTimeout(() => {
      if (window._graphForceResize) window._graphForceResize();
    }, 120);
  }

  function closeGraph() {
    graphVisible = false;
    btn.classList.remove('open');
    panel.classList.remove('open');
    flist.style.display = '';
    popup.classList.remove('open');
    desktop.classList.remove('graph-active');
    winL.classList.remove('graph-open-mobile');
    lbody.classList.remove('graph-panel-open');
  }

  window._registerPopup('graph', () => { if (graphVisible) { closeGraph(); } else { popup.classList.remove('open'); } });
  window._closeGraphPopup = () => { if (graphVisible) popup.classList.remove('open'); };

  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (graphVisible) {
      closeGraph();
    } else {
      window._closeAllPopups('graph');
      openGraph();
    }
  });

  // Zoom slider drag
  let dragging = false;
  function setZoomFromX(x) {
    const rect = slider.getBoundingClientRect();
    let t = (x - rect.left) / rect.width;
    t = Math.max(0, Math.min(1, t));
    zoomCur = ZOOM_MIN + t * (ZOOM_MAX - ZOOM_MIN);
    applyKnob();
  }
  slider.addEventListener('mousedown', e => { dragging = true; setZoomFromX(e.clientX); e.stopPropagation(); });
  slider.addEventListener('touchstart', e => { dragging = true; setZoomFromX(e.touches[0].clientX); e.stopPropagation(); }, {passive:true});
  document.addEventListener('mousemove', e => { if (dragging) setZoomFromX(e.clientX); });
  document.addEventListener('touchmove', e => { if (dragging) setZoomFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target) && graphVisible) popup.classList.remove('open');
  });

  window._graphZoom = () => zoomCur;
  window._graphSyncKnob = function(newZoom) {
    zoomCur = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
    applyKnob();
  };
})();

// ── Win95 Graph — pan/zoom, smooth labels ──
function initGraph() {
  if (window._graphInitialized) return;
  window._graphInitialized = true;

  const wrap   = document.getElementById('graphWrap');
  const canvas = document.getElementById('graphCanvas');
  const starsCv = document.getElementById('starsBg');
  const sctx = starsCv.getContext('2d');
  const ctx  = canvas.getContext('2d');

  // ── State — declared first so all functions can reference them ──
  let zoom = window._graphZoom ? window._graphZoom() : 1.0;
  let panX = 0, panY = 0;
  let starT = 0;
  let frame = 0;
  const NUM_STARS = 120;
  let stars = [];

  // ── Stars ──
  function initStars(w, h) {
    stars = Array.from({length: NUM_STARS}, () => ({
      x: Math.random() * w, y: Math.random() * h,
      size: Math.random() < 0.15 ? 2 : 1,
      bright: Math.random(),
      flickerPhase: Math.random() * 1000,
      flickerSpeed: 0.3 + Math.random() * 1.2,
      parallax: 0.1 + Math.random() * 0.6,
    }));
  }
  function drawStars(w, h) {
    sctx.clearRect(0, 0, w, h);
    sctx.fillStyle = '#0c0a06';
    sctx.fillRect(0, 0, w, h);
    stars.forEach(s => {
      const ox = (panX / (w||1) - 0.5) * s.parallax * 30;
      const oy = (panY / (h||1) - 0.5) * s.parallax * 30;
      const sx = (s.x + ox + w) % w;
      const sy = (s.y + oy + h) % h;
      const flickerT = starT * s.flickerSpeed + s.flickerPhase;
      const flicker = Math.sin(flickerT) > 0.6 ? 0.4 : 1.0;
      const alpha = (0.4 + s.bright * 0.6) * flicker;
      const hue = s.bright > 0.8 ? 'rgba(214,213,200,' : s.bright < 0.2 ? 'rgba(180,190,214,' : 'rgba(200,195,170,';
      sctx.fillStyle = hue + alpha + ')';
      sctx.fillRect(Math.floor(sx), Math.floor(sy), s.size, s.size);
    });
  }

  // ── Build nodes / edges ──
  const nodes = [], edges = [], nodeMap = {};
  vault.forEach((f, fi) => {
    const id = 'f_' + fi;
    nodes.push({ id, label: f.folder, type: 'folder', x: 0, y: 0, vx: 0, vy: 0 });
    nodeMap[id] = nodes[nodes.length - 1];
    f.notes.forEach(n => {
      const nid = 'n_' + n.id;
      nodes.push({ id: nid, label: n.title.split(':')[0].trim().slice(0, 18), type: 'note', x: 0, y: 0, vx: 0, vy: 0 });
      nodeMap[nid] = nodes[nodes.length - 1];
      edges.push({ a: id, b: nid });
    });
  });
  allNotes.forEach((n, i) => {
    allNotes.forEach((m, j) => {
      if (j > i && n.tags.some(t => m.tags.includes(t))) {
        const exists = edges.some(e =>
          (e.a==='n_'+n.id&&e.b==='n_'+m.id)||(e.b==='n_'+n.id&&e.a==='n_'+m.id));
        if (!exists) edges.push({ a: 'n_'+n.id, b: 'n_'+m.id, weak: true });
      }
    });
  });
  const N = nodes.length;
  nodes.forEach((node, i) => {
    const angle = (i / N) * Math.PI * 2;
    node.x = Math.cos(angle) * 80;
    node.y = Math.sin(angle) * 80;
  });

  // ── Force sim ──
  function simulate() {
    for (let iter = 0; iter < 3; iter++) {
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const d = Math.sqrt(dx*dx + dy*dy) || 0.1;
          const f = 1800 / (d * d);
          nodes[i].vx += dx/d*f; nodes[i].vy += dy/d*f;
          nodes[j].vx -= dx/d*f; nodes[j].vy -= dy/d*f;
        }
      }
      edges.forEach(e => {
        const a = nodeMap[e.a], b = nodeMap[e.b]; if (!a||!b) return;
        const dx = b.x-a.x, dy = b.y-a.y;
        const d = Math.sqrt(dx*dx+dy*dy)||0.1;
        const rest = e.weak ? 90 : 60;
        const f2 = (d - rest) * 0.06;
        a.vx += dx/d*f2; a.vy += dy/d*f2;
        b.vx -= dx/d*f2; b.vy -= dy/d*f2;
      });
      nodes.forEach(n => {
        n.vx += -n.x * 0.008; n.vy += -n.y * 0.008;
        n.vx *= 0.82; n.vy *= 0.82;
        n.x += n.vx; n.y += n.vy;
      });
    }
  }

  // ── Per-node drag offsets (world-space) + spring return ──
  nodes.forEach(n => { n.odx = 0; n.ody = 0; n.ovx = 0; n.ovy = 0; });

  let gSpringId = null;
  let gDragNode = null;

  function gStartSpring() {
    if (gSpringId) return;
    function step() {
      let any = false;
      nodes.forEach(n => {
        if (n === gDragNode) return;
        const k = 0.14, damp = 0.68;
        n.ovx = (n.ovx - k * n.odx) * damp;
        n.ovy = (n.ovy - k * n.ody) * damp;
        n.odx += n.ovx;
        n.ody += n.ovy;
        if (Math.abs(n.odx) > 0.15 || Math.abs(n.ody) > 0.15) any = true;
        else { n.odx = 0; n.ody = 0; n.ovx = 0; n.ovy = 0; }
      });
      draw();
      gSpringId = (any || gDragNode) ? requestAnimationFrame(step) : null;
    }
    gSpringId = requestAnimationFrame(step);
  }

  const COL_EDGE='#3a3228', COL_EDGE_W='#252018';
  const COL_FOLD='#D6D5A9', COL_NOTE='#7a6a52';
  const COL_FOLD_HL='#f0efcc', COL_NOTE_HL='#a89878';
  const COL_FOLD_LB='#D6D5A9', COL_NOTE_LB='#b0a080';
  const COL_GLOW='rgba(214,213,169,0.12)';

  function draw() {
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    ctx.clearRect(0, 0, W, H);
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.10)'; ctx.fillRect(0, y, W, 1);
    }
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);
    edges.forEach(e => {
      const a = nodeMap[e.a], b = nodeMap[e.b]; if (!a||!b) return;
      const ax = a.x + a.odx, ay = a.y + a.ody;
      const bx = b.x + b.odx, by = b.y + b.ody;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.strokeStyle = e.weak ? COL_EDGE_W : COL_EDGE;
      ctx.lineWidth = e.weak ? 0.6 : 1;
      ctx.setLineDash(e.weak ? [3,4] : []); ctx.stroke(); ctx.setLineDash([]);
    });
    nodes.forEach(n => {
      const nx = n.x + n.odx, ny = n.y + n.ody;
      const r = n.type === 'folder' ? 6 : 4;
      const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, r*3);
      g.addColorStop(0, COL_GLOW); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(nx, ny, r*3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = n.type==='folder' ? COL_FOLD : COL_NOTE;
      ctx.fillRect(nx-r, ny-r, r*2, r*2);
      ctx.fillStyle = 'rgba(200,255,180,0.3)'; ctx.fillRect(nx-r, ny-r, 1, 1);
      ctx.fillStyle = n.type==='folder' ? COL_FOLD_HL : COL_NOTE_HL;
      ctx.fillRect(nx-1, ny-1, 2, 2);
      ctx.save();
      ctx.font = `${n.type==='folder'?'bold ':''} ${n.type==='folder'?9:8}px "DotGothic16", monospace`;
      ctx.fillStyle = n.type==='folder' ? COL_FOLD_LB : COL_NOTE_LB;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = '#0c0a06'; ctx.shadowBlur = 3;
      ctx.fillText(n.label, nx, ny + r + 3);
      ctx.restore();
    });
    ctx.restore();
    ctx.fillStyle = '#1a3018';
    [[0,0,3,1],[0,0,1,3],[W-3,0,3,1],[W-1,0,1,3],
     [0,H-1,3,1],[0,H-3,1,3],[W-3,H-1,3,1],[W-1,H-3,1,3]
    ].forEach(([x,y,w,h]) => ctx.fillRect(x,y,w,h));
  }

  // ── Resize — sets canvas dimensions from actual DOM size ──
  function resize() {
    const w = wrap.clientWidth  || wrap.offsetWidth  || 300;
    const h = wrap.clientHeight || wrap.offsetHeight || 300;
    canvas.width  = w; canvas.height = h;
    starsCv.width = w; starsCv.height = h;
    panX = w / 2; panY = h / 2;
    initStars(w, h);
    draw();
  }

  // ── Main loop ──
  function tick() {
    frame++;
    starT += 0.018;
    if (frame < 200) simulate();
    drawStars(starsCv.width, starsCv.height);
    draw();
    window._graphAnimId = requestAnimationFrame(tick);
  }

  // ── Init: resize first, then start loop ──
  if (window._graphAnimId) cancelAnimationFrame(window._graphAnimId);
  resize();
  tick();
  window.addEventListener('resize', resize);
  window._graphForceResize = resize;

  // ── Zoom API ──
  window._graphSetZoom = function(z) {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const ratio = z / zoom;
    panX = cx + (panX - cx) * ratio;
    panY = cy + (panY - cy) * ratio;
    zoom = z; draw();
  };
  window._graphZoom = () => zoom;
  window._graphSyncKnob = function(newZoom) {
    zoom = Math.max(0.5, Math.min(2.5, newZoom));
    draw();
  };

  // ── Hit test using offset-adjusted positions ──
  function nodeAt(cx, cy) {
    const wx = (cx - panX) / zoom;
    const wy = (cy - panY) / zoom;
    for (const n of nodes) {
      const r = (n.type === 'folder' ? 6 : 4) + 7;
      const dx = wx - (n.x + n.odx), dy = wy - (n.y + n.ody);
      if (dx*dx + dy*dy <= r*r) return n;
    }
    return null;
  }

  // ── Drag state ──
  let panning = false, px0 = 0, py0 = 0, panX0 = 0, panY0 = 0;
  let mouseDownAt = null;
  const G_DRAG_THRESH = 4;
  let gIsDragging = false;
  // Grab offset: where inside the node the user grabbed (world space)
  let gGrabOdx = 0, gGrabOdy = 0;

  function gBeginDrag(node, cx, cy) {
    gDragNode = node;
    const wx = (cx - panX) / zoom;
    const wy = (cy - panY) / zoom;
    // Grab offset = cursor world pos - node render pos
    gGrabOdx = wx - (node.x + node.odx);
    gGrabOdy = wy - (node.y + node.ody);
    node.ovx = 0; node.ovy = 0;
    gStartSpring();
  }

  function gMoveDrag(cx, cy) {
    if (!gDragNode) return;
    const wx = (cx - panX) / zoom;
    const wy = (cy - panY) / zoom;
    // Target offset so node render pos follows cursor with RESIST
    const targetOdx = wx - gGrabOdx - gDragNode.x;
    const targetOdy = wy - gGrabOdy - gDragNode.y;
    // Smooth follow: lerp toward target at 55% per frame (called on mousemove, not rAF — so direct set)
    gDragNode.odx = targetOdx;
    gDragNode.ody = targetOdy;
    draw();
  }

  function gEndDrag() {
    if (!gDragNode) return;
    // Launch spring return with a little velocity
    gDragNode.ovx = -gDragNode.odx * 0.07;
    gDragNode.ovy = -gDragNode.ody * 0.07;
    gDragNode = null;
    gStartSpring();
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    mouseDownAt = {x: e.clientX, y: e.clientY};
    gIsDragging = false;
    const hit = nodeAt(cx, cy);
    if (hit) {
      gBeginDrag(hit, cx, cy);
    } else {
      panning = true;
      px0 = e.clientX; py0 = e.clientY;
      panX0 = panX; panY0 = panY;
    }
    e.preventDefault();
  });

  canvas.addEventListener('mousemove', e => {
    if (gDragNode) {
      if (!gIsDragging) {
        const dd = Math.hypot(e.clientX - mouseDownAt.x, e.clientY - mouseDownAt.y);
        if (dd > G_DRAG_THRESH) gIsDragging = true;
      }
      if (gIsDragging) {
        const rect = canvas.getBoundingClientRect();
        gMoveDrag(e.clientX - rect.left, e.clientY - rect.top);
        canvas.style.cursor = 'grabbing';
      }
      return;
    }
    if (panning) {
      panX = panX0 + (e.clientX - px0); panY = panY0 + (e.clientY - py0); draw();
      return;
    }
    const rect = canvas.getBoundingClientRect();
    canvas.style.cursor = nodeAt(e.clientX - rect.left, e.clientY - rect.top) ? 'grab' : 'default';
  });

  canvas.addEventListener('mouseup', () => {
    if (gDragNode) {
      if (!gIsDragging) { gDragNode = null; gStartSpring(); } // was a click, just release
      else gEndDrag();
      gIsDragging = false;
      mouseDownAt = null;
      canvas.style.cursor = 'default';
      return;
    }
    panning = false;
  });

  canvas.addEventListener('mouseleave', () => {
    if (gDragNode) { gEndDrag(); gIsDragging = false; }
    panning = false;
    canvas.style.cursor = 'default';
  });

  // ── Touch: pan / pinch / node-drag ──
  let lastTouchDist = null;
  let touchPanning = false, tpx0 = 0, tpy0 = 0, tPanX0 = 0, tPanY0 = 0;
  let touchDownAt = null, touchIsDragging = false, touchDragNode = null;

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const rect = canvas.getBoundingClientRect();
      const cx = e.touches[0].clientX - rect.left, cy = e.touches[0].clientY - rect.top;
      touchDownAt = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      touchIsDragging = false;
      const hit = nodeAt(cx, cy);
      if (hit) {
        touchDragNode = hit;
        gBeginDrag(hit, cx, cy);
      } else {
        touchPanning = true;
        tpx0 = e.touches[0].clientX; tpy0 = e.touches[0].clientY;
        tPanX0 = panX; tPanY0 = panY;
      }
    } else if (e.touches.length === 2) {
      touchPanning = false;
      if (touchDragNode) { gEndDrag(); touchDragNode = null; }
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx+dy*dy);
    }
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchmove', e => {
    if (touchDragNode && e.touches.length === 1) {
      const rect = canvas.getBoundingClientRect();
      const cx = e.touches[0].clientX - rect.left, cy = e.touches[0].clientY - rect.top;
      if (!touchIsDragging) {
        const dd = Math.hypot(e.touches[0].clientX - touchDownAt.x, e.touches[0].clientY - touchDownAt.y);
        if (dd > G_DRAG_THRESH) touchIsDragging = true;
      }
      if (touchIsDragging) { gMoveDrag(cx, cy); e.preventDefault(); }
      return;
    }
    if (e.touches.length === 1 && touchPanning) {
      panX = tPanX0 + (e.touches[0].clientX - tpx0);
      panY = tPanY0 + (e.touches[0].clientY - tpy0); draw();
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const newZoom = Math.max(0.5, Math.min(2.5, zoom * (dist / lastTouchDist)));
      if (window._graphSetZoom) window._graphSetZoom(newZoom);
      if (window._graphSyncKnob) window._graphSyncKnob(newZoom);
      lastTouchDist = dist;
    }
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchend', () => {
    if (touchDragNode) {
      if (!touchIsDragging) { gDragNode = null; } else gEndDrag();
      touchDragNode = null; touchIsDragging = false;
    }
    touchPanning = false; lastTouchDist = null;
  });

  // ── Mouse wheel zoom ──
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newZoom = Math.max(0.5, Math.min(2.5, zoom * factor));
    if (window._graphSetZoom) window._graphSetZoom(newZoom);
    if (window._graphSyncKnob) window._graphSyncKnob(newZoom);
  }, {passive:false});
}

// ── Tree of Life ──
(function() {
  const SEPHIROT = [
    { id:'Kether',  symbol:'', en:'Kether',  theme:'Unity / Source',       col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Chokmah', symbol:'', en:'Chokmah', theme:'Vision / Flash',        col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Binah',   symbol:'', en:'Binah',   theme:'Understanding / Form',  col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Chesed',  symbol:'', en:'Chesed',  theme:'Grace / Expansion',     col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Geburah', symbol:'', en:'Geburah', theme:'Strength / Will',       col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Tifaret', symbol:'', en:'Tifaret', theme:'Beauty / Heart',        col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Netzach', symbol:'', en:'Netzach', theme:'Desire / Nature',       col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Hod',     symbol:'', en:'Hod',     theme:'Intellect / Language',  col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Yesod',   symbol:'', en:'Yesod',   theme:'Dream / Image',         col:'#D6D5A9', dimCol:'#3a3228' },
    { id:'Malkuth', symbol:'', en:'Malkuth', theme:'Matter / Body',         col:'#D6D5A9', dimCol:'#3a3228' },
  ];

  // Fixed logical grid — tree never distorts on resize
  // Mirrored standard: Chokmah=right (Mercy), Binah=left (Severity)
  // Logical space: LW=200, LH=360. Rendered with uniform scale + centering.
  const LW = 200, LH = 400;
  const POS = {
    // Column X: Left=40, Center=100, Right=160  (span=120)
    // Row Y step: 70 throughout
    Kether:  [100,  10],   // top center
    Chokmah: [160,  70],   // right pillar row 1
    Binah:   [ 40,  70],   // left pillar row 1
    Chesed:  [160, 150],   // right pillar row 2
    Geburah: [ 40, 150],   // left pillar row 2
    Tifaret: [100, 210],   // center: midpoint of Chesed/Geburah(y=150) and Netzach/Hod(y=270)  → (150+270)/2=210 ✓
    Netzach: [160, 270],   // right pillar row 3
    Hod:     [ 40, 270],   // left pillar row 3
    Yesod:   [100, 330],   // center row 4
    Malkuth: [100, 390],   // center row 5
  };

  // 22 paths
  const PATHS = [
    ['Kether','Chokmah'],['Kether','Binah'],['Kether','Tifaret'],
    ['Chokmah','Binah'],['Chokmah','Chesed'],['Chokmah','Tifaret'],
    ['Binah','Geburah'],['Binah','Tifaret'],
    ['Chesed','Geburah'],['Chesed','Tifaret'],['Chesed','Netzach'],
    ['Geburah','Tifaret'],['Geburah','Hod'],
    ['Tifaret','Netzach'],['Tifaret','Hod'],['Tifaret','Yesod'],
    ['Netzach','Hod'],['Netzach','Yesod'],['Netzach','Malkuth'],
    ['Hod','Yesod'],['Hod','Malkuth'],
    ['Yesod','Malkuth'],
  ];

  // Transform: logical → canvas pixels (uniform scale, centered, with padding)
  function logicalToCanvas(lx, ly, cw, ch) {
    const PAD = 28;
    const scale = Math.min((cw - PAD*2) / LW, (ch - PAD*2) / LH);
    const offX  = (cw - LW * scale) / 2;
    const offY  = (ch - LH * scale) / 2;
    return [Math.round(lx * scale + offX), Math.round(ly * scale + offY)];
  }

  function getScale(cw, ch) {
    const PAD = 28;
    return Math.min((cw - PAD*2) / LW, (ch - PAD*2) / LH);
  }

  const treeBtn   = document.getElementById('treeBtn');
  const treePanel = document.getElementById('treePanel');
  const canvas    = document.getElementById('treeCanvas');
  const infoSym   = document.getElementById('treeInfoSymbol');
  const infoName  = document.getElementById('treeInfoName');
  const infoTheme = document.getElementById('treeInfoTheme');
  const infoCount = document.getElementById('treeInfoCount');
  const flist     = document.getElementById('flist');
  const desktop   = document.querySelector('.desktop');
  const winL      = document.querySelector('.win-l');
  const lbody     = document.querySelector('.lbody');
  const graphPanel= document.getElementById('graphPanel');
  const graphBtn  = document.getElementById('gknobBtn');
  const crtEl     = document.getElementById('crtOverlay');

  let treeVisible = false;
  let hoveredSeph = null;
  let activeSephs = new Set();   // lit by open note
  let selectedSephs = [];        // user-selected (max 3)
  let ctx;

  function fireCRTTree() {
    crtEl.classList.remove('firing');
    void crtEl.offsetWidth;
    crtEl.classList.add('firing');
    setTimeout(() => crtEl.classList.remove('firing'), 420);
  }

  // Canvas pixel size from DOM (excluding info bar)
  function canvasDims() {
    const INFO_H = 54;
    const dpr = window.devicePixelRatio || 1;
    return {
      cw: (treePanel.clientWidth  || 200),
      ch: (treePanel.clientHeight || 354) - INFO_H,
      dpr,
    };
  }

  // Logical → canvas with UNIFORM scale (no distortion)
  function l2c(lx, ly) {
    const {cw, ch} = canvasDims();
    const PAD   = 24;
    const scale = Math.min((cw - PAD*2) / LW, (ch - PAD*2) / LH);
    const offX  = (cw - LW * scale) / 2;
    const offY  = (ch - LH * scale) / 2;
    return [lx * scale + offX, ly * scale + offY];
  }

  // Node radius in canvas pixels (based on scale, clamped)
  function nodeR() {
    const {cw, ch} = canvasDims();
    const PAD   = 24;
    const scale = Math.min((cw - PAD*2) / LW, (ch - PAD*2) / LH);
    return Math.max(6, Math.min(13, Math.round(scale * 8)));
  }

  // ── Drag offsets: each sephirah can be displaced from canonical pos ──
  const dragOffsets = {};
  SEPHIROT.forEach(s => { dragOffsets[s.id] = {dx:0, dy:0, vx:0, vy:0}; });

  // Get canvas position of sephirah including drag offset
  function sephPos(id) {
    const [bx, by] = l2c(...POS[id]);
    const o = dragOffsets[id];
    return [bx + o.dx, by + o.dy];
  }


  // Spring animation: pull offsets back toward 0 gently
  let springAnimId = null;
  function startSpring() {
    if (springAnimId) return;
    function step() {
      let anyMoving = false;
      SEPHIROT.forEach(s => {
        const o = dragOffsets[s.id];
        if (s.id === dragState.id) return; // skip actively dragged node
        const k = 0.12, damp = 0.70;
        o.vx = (o.vx - k * o.dx) * damp;
        o.vy = (o.vy - k * o.dy) * damp;
        o.dx += o.vx;
        o.dy += o.vy;
        if (Math.abs(o.dx) > 0.2 || Math.abs(o.dy) > 0.2 || Math.abs(o.vx) > 0.1) anyMoving = true;
        else { o.dx = 0; o.dy = 0; o.vx = 0; o.vy = 0; }
      });
      drawTree();
      if (anyMoving || dragState.id) {
        springAnimId = requestAnimationFrame(step);
      } else {
        springAnimId = null;
      }
    }
    springAnimId = requestAnimationFrame(step);
  }

  const dragState = { id: null };

  function beginDrag(seph, canvasX, canvasY) {
    dragState.id = seph.id;
    dragState.startCanvasX = canvasX;
    dragState.startCanvasY = canvasY;
    dragState.startDx = dragOffsets[seph.id].dx;
    dragState.startDy = dragOffsets[seph.id].dy;
    dragOffsets[seph.id].vx = 0;
    dragOffsets[seph.id].vy = 0;
    startSpring();
  }

  function moveDrag(canvasX, canvasY) {
    if (!dragState.id) return false;
    const rawDx = canvasX - dragState.startCanvasX;
    const rawDy = canvasY - dragState.startCanvasY;
    const RESIST = 0.28;
    dragOffsets[dragState.id].dx = dragState.startDx + rawDx * RESIST;
    dragOffsets[dragState.id].dy = dragState.startDy + rawDy * RESIST;
    drawTree();
    return true;
  }

  function endDrag() {
    if (!dragState.id) return;
    const o = dragOffsets[dragState.id];
    o.vx = -o.dx * 0.06;
    o.vy = -o.dy * 0.06;
    dragState.id = null;
    startSpring();
  }

  // ── Medieval Heraldic Rose for Tifaret ───────────────────────────────
  // Multilayer rose: 3 rings of rounded petals, each rotated, like a real rose bloom
  function drawRose(ctx, cx, cy, R, lit, isSelected, isActive) {
    const strokeCol = lit ? '#D6D5A9' : '#3a3228';
    const fillBright = isSelected || isActive ? '#D6D5A9' : (lit ? '#7a6a52' : '#1a1710');
    const fillMid    = isSelected || isActive ? '#7a6a52' : (lit ? '#3a3228' : '#0f0d09');
    const fillDark   = '#0c0a06';
    const lw = lit ? 1.2 : 0.8;

    ctx.save();
    ctx.translate(cx, cy);

    if (isSelected) {
      ctx.beginPath(); ctx.arc(0, 0, R + 3, 0, Math.PI*2);
      ctx.strokeStyle = '#D6D5A988'; ctx.lineWidth = 1; ctx.stroke();
    }

    // Helper: draw one ring of rounded petals
    // count = number of petals, r = tip radius, baseR = base radius, rot = rotation offset
    function petalRing(count, tipR, baseR, rot, fill) {
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2 + rot;
        // Petal tip point
        const tx = Math.cos(a) * tipR;
        const ty = Math.sin(a) * tipR;
        // Base left/right points at baseR
        const halfSpan = (Math.PI * 2 / count) * 0.42;
        const lx = Math.cos(a - halfSpan) * baseR;
        const ly = Math.sin(a - halfSpan) * baseR;
        const rx = Math.cos(a + halfSpan) * baseR;
        const ry = Math.sin(a + halfSpan) * baseR;
        // Control points: bulge outward for rounded petal shape
        const bulge = 1.18;
        const clx = Math.cos(a - halfSpan * 0.5) * tipR * bulge;
        const cly = Math.sin(a - halfSpan * 0.5) * tipR * bulge;
        const crx = Math.cos(a + halfSpan * 0.5) * tipR * bulge;
        const cry = Math.sin(a + halfSpan * 0.5) * tipR * bulge;

        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.bezierCurveTo(clx, cly, clx, cly, tx, ty);
        ctx.bezierCurveTo(crx, cry, crx, cry, rx, ry);
        ctx.quadraticCurveTo(0, 0, lx, ly);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = strokeCol;
        ctx.lineWidth = lw * 0.75;
        ctx.stroke();
      }
    }

    // ── Layer 3 (outermost): 8 petals ──
    petalRing(8, R * 0.92, R * 0.38, 0, fillMid);

    // ── Layer 2: 6 petals, rotated, slightly smaller ──
    petalRing(6, R * 0.66, R * 0.28, Math.PI / 6, fillBright);

    // ── Layer 1 (innermost): 5 petals, rotated again ──
    petalRing(5, R * 0.42, R * 0.14, Math.PI / 10, fillMid);

    // ── Outer ring border ──
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.strokeStyle = strokeCol; ctx.lineWidth = lw; ctx.stroke();

    // ── Sepal notches on outer ring (between outer petals) ──
    for (let i = 0; i < 8; i++) {
      const a = ((i + 0.5) / 8) * Math.PI * 2;
      const ox = Math.cos(a) * R, oy = Math.sin(a) * R;
      const ix = Math.cos(a) * R * 0.80, iy = Math.sin(a) * R * 0.80;
      ctx.beginPath();
      ctx.moveTo(ox, oy); ctx.lineTo(ix, iy);
      ctx.strokeStyle = strokeCol; ctx.lineWidth = lw * 0.5; ctx.stroke();
    }

    // ── Center ──
    ctx.beginPath(); ctx.arc(0, 0, R * 0.13, 0, Math.PI * 2);
    ctx.fillStyle = strokeCol; ctx.fill();

    ctx.restore();
  }

  function drawTree() {
    if (!ctx) return;
    const {cw, ch, dpr} = canvasDims();
    canvas.width  = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width  = cw + 'px';
    canvas.style.height = ch + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Clear — transparent so stars canvas shows through
    ctx.clearRect(0, 0, cw, ch);

    // Scanlines over stars
    for (let y = 0; y < ch; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, y, cw, 1);
    }

    // ── Paths ──
    PATHS.forEach(([a, b]) => {
      const [ax, ay] = sephPos(a);
      const [bx, by] = sephPos(b);
      const bothActive   = activeSephs.has(a) && activeSephs.has(b);
      const bothSelected = selectedSephs.includes(a) && selectedSephs.includes(b);
      const eitherHov    = hoveredSeph === a || hoveredSeph === b;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      if (bothSelected) {
        ctx.strokeStyle = 'rgba(230,220,130,0.55)';
        ctx.lineWidth   = 1.5;
      } else if (bothActive) {
        ctx.strokeStyle = 'rgba(214,210,140,0.35)';
        ctx.lineWidth   = 1.5;
      } else if (eitherHov) {
        ctx.strokeStyle = 'rgba(200,190,120,0.22)';
        ctx.lineWidth   = 1;
      } else {
        ctx.strokeStyle = '#26231a';
        ctx.lineWidth   = 1;
      }
      ctx.stroke();
    });

    // ── Nodes ──
    const R = nodeR();
    SEPHIROT.forEach(s => {
      const [sx, sy] = sephPos(s.id);
      const isActive   = activeSephs.has(s.id);
      const isSelected = selectedSephs.includes(s.id);
      const isHovered  = hoveredSeph === s.id;
      const lit = isActive || isSelected || isHovered;

      // ── Glow halo ──
      if (lit) {
        const glowR = isActive ? R * 2.8 : R * 2.2;
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
        g.addColorStop(0, isActive   ? 'rgba(214,213,169,0.35)'
                        : isSelected ? 'rgba(214,213,169,0.20)'
                        :              'rgba(214,213,169,0.10)');
        g.addColorStop(1, 'transparent');
        ctx.save();
        ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.restore();
      }

      if (s.id === 'Tifaret') {
        drawRose(ctx, sx, sy, R, lit, isSelected, isActive);
      } else {
        ctx.save();
        ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI*2);
        ctx.fillStyle = isActive                ? '#D6D5A9'
                      : isSelected             ? '#c8c4a0'
                      : isHovered              ? '#3a3228'
                      :                          '#0c0a06';
        ctx.fill();
        ctx.strokeStyle = isActive   ? '#ffffff'
                        : lit        ? '#D6D5A9'
                        :              '#3a3228';
        ctx.lineWidth = isActive ? 2 : lit ? 1.5 : 1;
        if (isActive) { ctx.shadowColor = '#D6D5A9'; ctx.shadowBlur = 8; }
        ctx.stroke();
        if (isSelected) {
          ctx.beginPath(); ctx.arc(sx, sy, R + 3.5, 0, Math.PI*2);
          ctx.strokeStyle = '#D6D5A966'; ctx.lineWidth = 1; ctx.stroke();
        }
        ctx.restore();
      }

      // ── Label — fixed readable size, Alkhemikal with DotGothic fallback ──
      ctx.save();
      ctx.font = `12px "Alkhemikal", "DotGothic16", sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = isActive   ? '#ffffff'
                    : lit        ? '#D6D5A9'
                    :              '#4a4232';
      if (isActive)   { ctx.shadowColor = '#D6D5A9'; ctx.shadowBlur = 8; }
      else if (lit)   { ctx.shadowColor = '#D6D5A9'; ctx.shadowBlur = 4; }
      ctx.fillText(s.en, sx, sy + R + 4);
      ctx.restore();
    });

    // Pixel corner marks
    ctx.fillStyle = '#1a3018';
    [[0,0,3,1],[0,0,1,3],[cw-3,0,3,1],[cw-1,0,1,3],
     [0,ch-1,3,1],[0,ch-3,1,3],[cw-3,ch-1,3,1],[cw-1,ch-3,1,3]
    ].forEach(([x,y,w,h]) => ctx.fillRect(x,y,w,h));
  }

  function setInfo(s) {
    if (!s) {
      infoSym.textContent   = '';
      infoName.textContent  = '';
      infoTheme.textContent = selectedSephs.length ? selectedSephs.join(' · ') : 'SELECT A TAG';
      infoCount.textContent = selectedSephs.length ? (() => {
        const n = allNotes.filter(x => x.sephirot && selectedSephs.some(id => x.sephirot.includes(id))).length;
        return n + (n === 1 ? ' note' : ' notes');
      })() : '';
      return;
    }
    const count = allNotes.filter(n => n.sephirot && n.sephirot.includes(s.id)).length;
    infoSym.textContent   = '';
    infoName.textContent  = s.en.toUpperCase();
    infoTheme.textContent = s.theme;
    infoCount.textContent = count + (count === 1 ? ' note' : ' notes') +
      (selectedSephs.includes(s.id) ? '  ✓' : '');
  }

  function getSephAt(mx, my) {
    const R = nodeR();
    const hitR = R + 8;
    for (const s of SEPHIROT) {
      const [sx, sy] = sephPos(s.id);
      const dx = mx - sx, dy = my - sy;
      if (dx*dx + dy*dy <= hitR*hitR) return s;
    }
    return null;
  }

  let mouseDownSeph = null;
  let mouseDownX = 0, mouseDownY = 0;
  let isDragging = false;
  const DRAG_THRESHOLD = 5;
  let pointerIsTouch = false;

  canvas.addEventListener('mousedown', e => {
    if (pointerIsTouch) return; // touch handles its own flow
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    mouseDownSeph = getSephAt(mx, my);
    mouseDownX = mx; mouseDownY = my;
    isDragging = false;
  });

  canvas.addEventListener('mousemove', e => {
    if (pointerIsTouch) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (mouseDownSeph) {
      const dist = Math.hypot(mx - mouseDownX, my - mouseDownY);
      if (!isDragging && dist > DRAG_THRESHOLD) {
        isDragging = true;
        beginDrag(mouseDownSeph, mouseDownX, mouseDownY);
      }
      if (isDragging) {
        moveDrag(mx, my);
        canvas.style.cursor = 'grabbing';
        return;
      }
    }

    const s = getSephAt(mx, my);
    const newId = s ? s.id : null;
    if (newId !== hoveredSeph) {
      hoveredSeph = newId;
      setInfo(s || null);
      drawTree();
      canvas.style.cursor = s ? 'grab' : 'default';
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (pointerIsTouch) return;
    if (isDragging) {
      endDrag(); isDragging = false; mouseDownSeph = null;
      canvas.style.cursor = 'default'; return;
    }
    if (mouseDownSeph) {
      const rect = canvas.getBoundingClientRect();
      const hit = getSephAt(e.clientX - rect.left, e.clientY - rect.top);
      if (hit && hit.id === mouseDownSeph.id) handleSephClick(hit);
    }
    mouseDownSeph = null; isDragging = false;
  });

  canvas.addEventListener('mouseleave', () => {
    if (isDragging) { endDrag(); isDragging = false; }
    mouseDownSeph = null;
    hoveredSeph = null;
    const last = selectedSephs.length ? SEPHIROT.find(s => s.id === selectedSephs[selectedSephs.length-1]) : null;
    setInfo(last || null);
    drawTree();
    canvas.style.cursor = 'default';
  });

  // ── Touch ──
  let touchDownSeph = null;
  let touchDownX = 0, touchDownY = 0;
  let touchDragging = false;

  canvas.addEventListener('touchstart', e => {
    pointerIsTouch = true;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = t.clientX - rect.left, my = t.clientY - rect.top;
    touchDownSeph = getSephAt(mx, my);
    touchDownX = mx; touchDownY = my;
    touchDragging = false;
    if (touchDownSeph) e.preventDefault();
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    if (!touchDownSeph) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = t.clientX - rect.left, my = t.clientY - rect.top;
    const dist = Math.hypot(mx - touchDownX, my - touchDownY);
    if (!touchDragging && dist > DRAG_THRESHOLD) {
      touchDragging = true;
      beginDrag(touchDownSeph, touchDownX, touchDownY);
    }
    if (touchDragging) {
      moveDrag(mx, my);
      e.preventDefault();
    }
  }, {passive: false});

  canvas.addEventListener('touchend', e => {
    if (touchDragging) {
      endDrag(); touchDragging = false; touchDownSeph = null;
      e.preventDefault(); return;
    }
    if (touchDownSeph) {
      const rect = canvas.getBoundingClientRect();
      const t = e.changedTouches[0];
      const hit = getSephAt(t.clientX - rect.left, t.clientY - rect.top);
      if (hit && hit.id === touchDownSeph.id) handleSephClick(hit);
      e.preventDefault();
    }
    touchDownSeph = null; touchDragging = false;
  }, {passive: false});

  function handleSephClick(s) {
    if (!s) return;
    const idx = selectedSephs.indexOf(s.id);
    if (idx !== -1) {
      selectedSephs.splice(idx, 1);
    } else {
      if (selectedSephs.length >= 3) selectedSephs.length = 0;
      selectedSephs.push(s.id);
    }
    drawTree();
    setInfo(s);
    applyTreeFilter();
    hideBars();
  }

  function applyTreeFilter() {
    if (selectedSephs.length === 0) {
      showFeed(allNotes, null, true);
      return;
    }
    const filtered = allNotes.filter(n =>
      n.sephirot && selectedSephs.some(id => n.sephirot.includes(id))
    );
    showFeed(filtered, selectedSephs.join(' · '), true);
  }

  function clearTreeSelection() {
    selectedSephs = [];
    drawTree();
  }

  // ── Weight bars ──
  const treeBars   = document.getElementById('treeBars');
  const treeInfoEl = document.getElementById('treeInfo');
  const barRows    = [0,1,2].map(i => ({
    row:   document.getElementById('treeBar'+i),
    label: document.getElementById('treeBarLabel'+i),
    fill:  document.getElementById('treeBarFill'+i),
  }));

  function showBars(note) {
    if (!note || !note.weights) { hideBars(); return; }
    const entries = Object.entries(note.weights);
    treeBars.style.display = 'flex';
    treeInfoEl.classList.add('expanded');
    barRows.forEach((b, i) => {
      if (i < entries.length) {
        const [seph, val] = entries[i];
        b.row.style.display = 'flex';
        b.label.textContent = seph.toUpperCase();
        requestAnimationFrame(() => { b.fill.style.width = val + '%'; });
      } else {
        b.row.style.display = 'none';
        b.fill.style.width = '0%';
      }
    });
  }

  function hideBars() {
    treeBars.style.display = 'none';
    treeInfoEl.classList.remove('expanded');
    barRows.forEach(b => { b.fill.style.width = '0%'; });
  }

  // ── Stars background for tree ──
  const starsCvTree = document.getElementById('treeStars');
  let treeStarCtx, treeStars = [], treeStarT = 0;
  let treeStarAnim = null;

  function initTreeStars() {
    treeStarCtx = starsCvTree.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = treePanel.clientWidth  || 200;
    const h = treePanel.clientHeight || 400;
    starsCvTree.width  = w * dpr;
    starsCvTree.height = h * dpr;
    starsCvTree.style.width  = w + 'px';
    starsCvTree.style.height = h + 'px';
    treeStarCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    treeStars = Array.from({length: 90}, () => ({
      x: Math.random() * w, y: Math.random() * h,
      size: Math.random() < 0.12 ? 2 : 1,
      bright: Math.random(),
      phase: Math.random() * 1000,
      speed: 0.2 + Math.random() * 0.8,
    }));
  }

  function drawTreeStars() {
    if (!treeStarCtx) return;
    const w = starsCvTree.clientWidth || starsCvTree.width;
    const h = starsCvTree.clientHeight || starsCvTree.height;
    treeStarCtx.fillStyle = '#0c0a06';
    treeStarCtx.fillRect(0, 0, w, h);
    treeStars.forEach(s => {
      const flicker = Math.sin(treeStarT * s.speed + s.phase) > 0.55 ? 0.35 : 1.0;
      const alpha = (0.3 + s.bright * 0.65) * flicker;
      const hue = s.bright > 0.8 ? 'rgba(214,213,200,' : s.bright < 0.2 ? 'rgba(180,190,214,' : 'rgba(200,195,170,';
      treeStarCtx.fillStyle = hue + alpha + ')';
      treeStarCtx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
    });
    treeStarT += 0.015;
    treeStarAnim = requestAnimationFrame(drawTreeStars);
  }

  function stopTreeStars() {
    if (treeStarAnim) { cancelAnimationFrame(treeStarAnim); treeStarAnim = null; }
  }

  function openTree() {
    treeVisible = true;
    treeBtn.classList.add('open');
    fireCRTTree();
    lbody.classList.add('graph-panel-open');
    desktop.classList.add('graph-active');
    winL.classList.add('graph-open-mobile');
    treePanel.style.display = 'flex';
    treePanel.style.flexDirection = 'column';
    treePanel.classList.add('open');
    flist.style.display = 'none';
    ctx = canvas.getContext('2d');

    function doInitDraw() {
      initTreeStars();
      drawTreeStars();
      drawTree();
      setInfo(null);
    }

    // Wait for ALL fonts (including Alkhemikal) before first canvas draw
    const fontReady = document.fonts ? document.fonts.ready : Promise.resolve();
    fontReady.then(() => {
      requestAnimationFrame(() => requestAnimationFrame(doInitDraw));
      setTimeout(doInitDraw, 80);
      setTimeout(doInitDraw, 180);
      setTimeout(doInitDraw, 350);
    });

    function onResize() { if (treeVisible) { initTreeStars(); drawTree(); } }
    window.addEventListener('resize', onResize);
    // store cleanup ref
    openTree._resizeFn = onResize;
  }

  function closeTree() {
    treeVisible = false;
    selectedSephs = [];
    // Reset all drag offsets
    SEPHIROT.forEach(s => { dragOffsets[s.id] = {dx:0, dy:0, vx:0, vy:0}; });
    if (springAnimId) { cancelAnimationFrame(springAnimId); springAnimId = null; }
    dragState.id = null;
    hideBars();
    stopTreeStars();
    treeBtn.classList.remove('open');
    treePanel.classList.remove('open');
    treePanel.style.display = 'none';
    flist.style.display = '';
    desktop.classList.remove('graph-active');
    winL.classList.remove('graph-open-mobile');
    lbody.classList.remove('graph-panel-open');
    window.removeEventListener('resize', drawTree);
  }

  window._registerPopup('tree', () => { if (treeVisible) closeTree(); });

  treeBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (treeVisible) {
      closeTree();
    } else {
      window._closeAllPopups('tree');
      // close graph if open
      if (graphPanel.classList.contains('open')) {
        graphPanel.classList.remove('open');
        flist.style.display = '';
        desktop.classList.remove('graph-active');
        winL.classList.remove('graph-open-mobile');
        lbody.classList.remove('graph-panel-open');
        graphBtn.classList.remove('open');
      }
      openTree();
    }
  });

  window._treeSetNote = function(sephirotArr, note) {
    activeSephs = new Set(sephirotArr || []);
    if (treeVisible) { drawTree(); showBars(note); }
    else { hideBars(); }
  };
})();

// ── Font size knob ──
(function() {
  const MIN = 9, MAX = 15, DEFAULT = 11;
  let cur = DEFAULT;
  const popup   = document.getElementById('fsizePopup');
  const btn     = document.getElementById('fsizeBtn');
  const knob    = document.getElementById('fsizeKnob');
  const slider  = document.getElementById('fsizeSlider');
  const thumb   = document.getElementById('fsizeThumb');
  const wrap    = document.getElementById('fsizeWrap');

  function pct() { return (cur - MIN) / (MAX - MIN); }

  function apply() {
    document.documentElement.style.setProperty('--r-fsize', cur + 'px');
    const deg = -135 + pct() * 270;
    knob.style.transform = `rotate(${deg}deg)`;
    const sliderW = slider.offsetWidth;
    thumb.style.left = (pct() * (sliderW - 10) + 5) + 'px';
  }

  apply();

  window._registerPopup('fsize', () => popup.classList.remove('open'));

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = popup.classList.contains('open');
    window._closeAllPopups('fsize');
    popup.classList.toggle('open', !isOpen);
  });

  // drag on slider
  let dragging = false;
  function setFromX(x) {
    const rect = slider.getBoundingClientRect();
    let t = (x - rect.left) / rect.width;
    t = Math.max(0, Math.min(1, t));
    cur = Math.round(MIN + t * (MAX - MIN));
    apply();
  }

  slider.addEventListener('mousedown', e => { dragging = true; setFromX(e.clientX); });
  slider.addEventListener('touchstart', e => { dragging = true; setFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mousemove', e => { if (dragging) setFromX(e.clientX); });
  document.addEventListener('touchmove', e => { if (dragging) setFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) popup.classList.remove('open');
  });
})();

// ── Mobile: win-r slides up over win-l (absolute layout) ──
(function() {
  if (window.innerWidth > 600) return;

  const desktop = document.querySelector('.desktop');
  const winL    = document.querySelector('.win-l');
  const winR    = document.querySelector('.win-r');
  const reader  = document.getElementById('reader');
  if (!winL || !winR || !desktop) return;

  const GAP = 6;
  const SNAP_UP = 0.3;
  const SPRING = 420;

  let expanded = false;
  let startY = 0;
  let tracking = false;
  let dragging = false;
  let curTop = 0;
  let rafId = null;

  function isMobile() { return window.innerWidth <= 600; }

  function getLFrac() {
    // When graph/tree is open, give win-l more height
    return winL.classList.contains('graph-open-mobile') ? 0.70 : 0.42;
  }

  function getTotalH() { return desktop.clientHeight - GAP * 2; }
  function getLH()     { return Math.round(getTotalH() * getLFrac()); }
  function restTop()   { return getLH() + GAP; }
  function coverTop()  { return GAP; }

  function layout(rTop) {
    curTop = rTop;
    const lH = getLH();
    winL.style.height = lH + 'px';
    winR.style.top    = rTop + 'px';
    winR.style.bottom = '0';
    winR.style.height = '';
    const cover = Math.max(0, Math.min(1, (lH + GAP - rTop) / lH));
    winL.style.opacity = (1 - cover * 0.55).toFixed(3);
  }

  function init() {
    if (!expanded) layout(restTop());
    else layout(coverTop());
  }

  function springTo(target, onDone) {
    if (rafId) cancelAnimationFrame(rafId);
    const from = curTop;
    const dist = target - from;
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / SPRING);
      const c1 = 1.4, c3 = c1 + 1;
      const e = 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      layout(from + dist * Math.min(e, 1));
      if (t < 1) { rafId = requestAnimationFrame(step); }
      else { layout(target); if (onDone) onDone(); }
    }
    rafId = requestAnimationFrame(step);
  }

  function slideUp()   { expanded = true;  springTo(coverTop()); }
  function slideDown() { expanded = false; springTo(restTop(), () => { winL.style.opacity = ''; }); }

  function onTouchStart(e) {
    if (!isMobile()) return;
    startY   = e.touches[0].clientY;
    tracking = true;
    dragging = false;
  }

  function onTouchMove(e) {
    if (!tracking || !isMobile()) return;
    const dy = startY - e.touches[0].clientY;

    if (!dragging) {
      if (Math.abs(dy) < 8) return;
      const readerAtTop = !reader || reader.scrollTop <= 1;
      const onLeft = winL.contains(e.target);

      if (!expanded && dy > 0 && (readerAtTop || onLeft)) { dragging = true; }
      else if (expanded && dy < 0 && readerAtTop)          { dragging = true; }
      else { tracking = false; return; }

      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    e.preventDefault();

    const lo = coverTop(), hi = restTop();
    const startTop = expanded ? coverTop() : restTop();
    let newTop = startTop - dy;
    if (newTop < lo) newTop = lo - Math.sqrt(Math.max(0, lo - newTop)) * 2;
    if (newTop > hi) newTop = hi + Math.sqrt(Math.max(0, newTop - hi)) * 2;
    layout(newTop);
  }

  function onTouchEnd() {
    if (!tracking || !isMobile()) return;
    tracking = false;
    if (!dragging) return;
    dragging = false;

    const range    = restTop() - coverTop();
    const progress = range > 0 ? (restTop() - curTop) / range : 0;

    if (!expanded) { progress > SNAP_UP ? slideUp() : slideDown(); }
    else           { progress > (1 - SNAP_UP) ? slideUp() : slideDown(); }
  }

  document.addEventListener('touchstart', onTouchStart, {passive: true});
  document.addEventListener('touchmove',  onTouchMove,  {passive: false});
  document.addEventListener('touchend',   onTouchEnd,   {passive: true});

  winL.querySelector('.tbar')?.addEventListener('click', () => { if (expanded) slideDown(); });

  // Re-layout when graph-open-mobile class is toggled
  const observer = new MutationObserver(() => {
    if (!expanded) springTo(restTop());
  });
  observer.observe(winL, {attributes: true, attributeFilter: ['class']});

  window.addEventListener('resize', () => {
    if (!isMobile()) {
      winL.style.cssText = '';
      winR.style.cssText = '';
      expanded = false; curTop = 0;
    } else {
      init();
    }
  });

  requestAnimationFrame(() => requestAnimationFrame(init));
})();





(function() {
  let rafId = null;
  let lastScroll = -1;

  function getReader() { return document.getElementById('reader'); }

  function applyParallax() {
    const reader = getReader();
    if (!reader) return;
    const cards = reader.querySelectorAll('.fe');
    if (!cards.length) return;

    const readerRect = reader.getBoundingClientRect();
    const rH = readerRect.height;
    const rMid = readerRect.top + rH * 0.5;

    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const cardMid = rect.top + rect.height * 0.5;
      // norm: -0.5 (top of viewport) .. 0 (center) .. +0.5 (bottom)
      const norm = (cardMid - rMid) / rH;

      // Card itself: very subtle 3D tip — just 1.5deg so it doesn't feel broken
      const tilt = norm * 1.5;
      card.style.transform = `perspective(800px) rotateX(${tilt}deg)`;

      // Inner layers move at different speeds — depth illusion
      const meta  = card.querySelector('.fe-meta');
      const title = card.querySelector('.fe-title');
      const prev  = card.querySelector('.fe-prev');

      if (meta)  meta.style.transform  = `translateY(${norm * 10}px)`;
      if (title) title.style.transform = `translateY(${norm * -7}px)`;
      if (prev)  prev.style.transform  = `translateY(${norm * 4}px)`;
    });

    rafId = null;
  }

  function scheduleParallax() {
    if (!rafId) rafId = requestAnimationFrame(applyParallax);
  }

  // Attach scroll to reader whenever it exists (reader is recreated on note open/close)
  let boundReader = null;
  function watchReader() {
    const reader = getReader();
    if (reader && reader !== boundReader) {
      if (boundReader) boundReader.removeEventListener('scroll', scheduleParallax);
      reader.addEventListener('scroll', scheduleParallax, {passive: true});
      boundReader = reader;
      scheduleParallax();
    }
  }

  // MutationObserver watches for card injection
  new MutationObserver(() => {
    watchReader();
    scheduleParallax();
  }).observe(document.body, {childList: true, subtree: true});

  watchReader();
})();
</script>

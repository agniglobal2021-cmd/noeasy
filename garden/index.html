<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
@font-face { font-family: 'Alkhemikal'; src: url('../fonts/Alkhemikal.ttf') format('truetype'); }
@font-face { font-family: 'DotGothic16'; src: url('../fonts/DotGothic16-Regular.ttf') format('truetype'); }
@font-face { font-family: 'Fixedsys'; src: url('../fonts/Fixedsys.ttf') format('truetype'); }

:root {
  --bg:    #e8e0c4; --text:  #353535; --desk:  #5D5143;
  --tb:    #5D5143; --ttxt:  #f6f1da; --btn:   #AFA191;
  --blt:   #d4cdc4; --bdk:   #3d3830; --bsh:   #2a2520;
  --lbg:   #1e1a12; --tbg:   #2e2820; --ta:    #D6D5A9;
  --tdim:  #7a6a52; --thl:   #e8d0a0; --tbar:  #181410;
  --tsel:  #6a5535;
  --header-total-h: calc(env(safe-area-inset-top, 0px) + 66px);
  --r-fsize: 11px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  overscroll-behavior: none; /* Фикс отскока на iOS */
}

/* Фикс дыр сверху */
.header-fill {
  position: fixed; top: -100vh; left: 0; right: 0;
  height: 150vh; background: var(--desk);
  z-index: 499; pointer-events: none;
}

header {
  position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 500;
  display: flex; flex-direction: column; pointer-events: none;
}
header > * { pointer-events: auto; }
.header-safe-top { height: env(safe-area-inset-top, 0px); background: var(--desk); }

.header-titlebar-strip {
  height: 22px; background: var(--desk);
  border-bottom: 1px solid #3e352d; padding: 0 10px;
  display: flex; align-items: center;
}
.header-titlebar-strip-text { font-family: 'DotGothic16'; font-size: 9px; color: #f6f1da; letter-spacing: 0.1em; }

.header-pill {
  display: flex; align-items: center; height: 44px;
  background: #AFA191; padding: 0 4px;
  border-bottom: 2px solid #7a7068; box-shadow: 0 1px 0 #404040;
}

.pill-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'Alkhemikal'; font-size: 19px; color: #000; pointer-events: none;
}

.pill-btn {
  height: 34px; padding: 0 10px; background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  user-select: none;
}
.pill-btn:active, .pill-btn.open {
  border: 2px solid #3d3830; border-top-color: #2a2520; border-left-color: #2a2520;
  background: #a59787;
}

.pill-divider { width: 2px; height: 26px; background: #808080; border-right: 1px solid #d4cdc4; margin: 0 4px; }

/* Font Size Popup */
.fsize-popup {
  position: absolute; top: calc(100% + 5px); right: 8px; background: #AFA191;
  border: 2px solid #3d3830; box-shadow: 3px 3px 0 #000;
  padding: 12px; display: none; z-index: 1000; min-width: 160px;
}
.fsize-popup.open { display: block; }
.slider-track {
  width: 100%; height: 8px; background: #3d3830; position: relative; cursor: pointer;
  border: 1px solid #d4cdc4;
}
.slider-thumb {
  position: absolute; top: -5px; width: 12px; height: 16px; background: #f6f1da;
  border: 1px solid #000; transform: translateX(-50%); pointer-events: none;
}

/* Навигация */
.nav-overlay {
  position: absolute; top: calc(100% + 5px); right: 8px; background: #AFA191;
  border: 2px solid #3d3830; box-shadow: 3px 3px 0 #000;
  display: none; flex-direction: column; z-index: 1000;
}
.nav-overlay.open { display: flex; }
.nav-overlay a {
  padding: 10px 20px; text-decoration: none; color: #000; font-size: 11px;
  border-bottom: 1px solid #7a7068;
}
.nav-overlay a:hover { background: #5D5143; color: #fff; }

/* Main Layout */
.page-main {
  position: fixed; top: var(--header-total-h); left: 0; right: 0; bottom: 0;
  display: flex; padding: 8px; gap: 8px;
}
.win {
  display: flex; flex-direction: column; background: #b5ad9e;
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  box-shadow: 2px 2px 0 var(--bsh); overflow: hidden;
}
.win-l { width: 200px; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
.win-l.expanded { width: 450px; }
.win-r { flex: 1; min-width: 0; }

.tbar { height: 22px; background: var(--btn); display: flex; padding: 1px; flex-shrink: 0; }
.tbar-inner { flex: 1; background: var(--tb); display: flex; align-items: center; padding: 0 6px; }
.tbar-t { font-size: 8px; color: #fff; font-weight: bold; letter-spacing: 1px; }

.lbody { flex: 1; background: var(--lbg); position: relative; overflow-y: auto; overflow-x: hidden; }

/* Карта */
.graph-panel { position: absolute; inset: 0; background: #0c0a06; display: none; z-index: 10; }
.graph-panel.open { display: block; }
.graph-controls {
  position: absolute; bottom: 12px; right: 12px; z-index: 11;
  background: #AFA191; padding: 4px; border: 2px solid #3d3830;
  display: flex; align-items: center; gap: 6px; box-shadow: 2px 2px 0 #000;
}
.zoom-btn {
  background: #d4cdc4; color: #000; border: 1px solid #3d3830;
  font-family: Fixedsys; font-size: 14px; width: 24px; height: 24px; cursor: pointer;
}

.rscroll { flex: 1; overflow-y: auto; padding: 24px; background: #e8e0c4; }
.ntitle { font-family: 'Alkhemikal'; font-size: 24px; margin-bottom: 12px; }
.nbody { font-size: var(--r-fsize); line-height: 1.6; }

.folder-row { color: var(--ta); font-family: Fixedsys; padding: 6px 12px; cursor: pointer; font-size: 11px; }
.note-row { color: var(--tdim); font-family: Fixedsys; padding: 4px 24px; cursor: pointer; font-size: 10px; }
.note-row:hover { color: var(--thl); background: var(--tsel); }

#grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.04; }
</style>
</head>
<body>

<div class="header-fill"></div>
<canvas id="grain"></canvas>

<header>
  <div class="header-safe-top"></div>
  <div class="header-titlebar-strip">
    <span class="header-titlebar-strip-text">NOEASY / GARDEN / OS_v1.0.5</span>
  </div>
  <div class="header-pill">
    <span class="pill-center">Digital Garden</span>
    <div style="flex:1"></div>
    
    <button class="pill-btn" id="fsizeBtn"><span style="font-family:'Alkhemikal'; font-size:16px;">Aa</span></button>
    <div class="fsize-popup" id="fsizePopup">
      <div style="font-family:Fixedsys; font-size:8px; margin-bottom:8px;">TEXT_SIZE</div>
      <div class="slider-track" id="fsizeSlider"><div class="slider-thumb" id="fsizeThumb"></div></div>
    </div>

    <div class="pill-divider"></div>
    <button class="pill-btn" id="gknobBtn"><span style="font-family:Fixedsys; font-size:11px;">[M]</span></button>
    <div class="pill-divider"></div>

    <button class="pill-btn" id="swordBtn">
      <div style="width:18px; display:flex; flex-direction:column; gap:3px;">
        <div style="height:2px; background:#000;"></div>
        <div style="height:2px; background:#000;"></div>
        <div style="height:2px; background:#000;"></div>
      </div>
    </button>
    <div class="nav-overlay" id="navOverlay">
      <a href="#">HOME</a>
      <a href="#">GALLERY</a>
      <a href="#">ABOUT</a>
    </div>
  </div>
</header>

<div class="page-main">
  <div class="win win-l" id="winL">
    <div class="tbar"><div class="tbar-inner"><div class="tbar-t">EXPLORER</div></div></div>
    <div class="lbody">
      <div id="flist"></div>
      <div class="graph-panel" id="graphPanel">
        <canvas id="graphCanvas"></canvas>
        <div class="graph-controls">
          <button class="zoom-btn" id="zoomOut">−</button>
          <button class="zoom-btn" id="zoomIn">+</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="win win-r">
    <div class="tbar"><div class="tbar-inner"><div class="tbar-t">READER</div></div></div>
    <div class="rscroll" id="reader">
      <div class="ntitle">Welcome</div>
      <div class="nbody">Select a note to start exploring.</div>
    </div>
  </div>
</div>

<script>
// --- DATA ---
const vault = [
  { folder: "Grimoires", notes: [
      { id:1, title: "The Lesser Key", body: "Lemegeton Clavicula Salomonis. Detailed notes on the 72 goetic spirits and their seals." },
      { id:2, title: "Abramelin Mage", body: "The operation of the sacred magic. Requires 6 months of purification and intense focus." }
  ]},
  { folder: "Research", notes: [
      { id:3, title: "Cybernetic Serendipity", body: "Looking back at the 1968 exhibition. The intersection of early computer logic and organic art." },
      { id:4, title: "Vibe Coding", body: "The era of LLMs. Software becomes a matter of intent and language rather than syntax." }
  ]},
  { folder: "Personal", notes: [
      { id:5, title: "Garden Log", body: "Added parallax stars to the graph. Fixed the header gap issue." }
  ]}
];

// --- UI STATE & MUTEX ---
const ui = {
  fsize: { btn: document.getElementById('fsizeBtn'), pop: document.getElementById('fsizePopup') },
  nav: { btn: document.getElementById('swordBtn'), pop: document.getElementById('navOverlay') },
  graph: { btn: document.getElementById('gknobBtn'), panel: document.getElementById('graphPanel') }
};

function closePopups() {
  ui.fsize.pop.classList.remove('open'); ui.fsize.btn.classList.remove('open');
  ui.nav.pop.classList.remove('open'); ui.nav.btn.classList.remove('open');
}

ui.fsize.btn.onclick = (e) => { e.stopPropagation(); const isO = ui.fsize.pop.classList.toggle('open'); ui.fsize.btn.classList.toggle('open', isO); if(isO) ui.nav.pop.classList.remove('open'); };
ui.nav.btn.onclick = (e) => { e.stopPropagation(); const isO = ui.nav.pop.classList.toggle('open'); ui.nav.btn.classList.toggle('open', isO); if(isO) ui.fsize.pop.classList.remove('open'); };
document.onclick = () => closePopups();

// --- FONT SIZE SLIDER ---
let curFsize = 11;
const thumb = document.getElementById('fsizeThumb');
const slider = document.getElementById('fsizeSlider');

function updateFsize(x) {
  const rect = slider.getBoundingClientRect();
  let t = (x - rect.left) / rect.width;
  t = Math.max(0, Math.min(1, t));
  curFsize = Math.round(9 + t * 9);
  document.documentElement.style.setProperty('--r-fsize', curFsize + 'px');
  thumb.style.left = (t * 100) + '%';
}

function initSlider(el, handler) {
  const start = (e) => {
    e.preventDefault();
    const move = (ev) => handler(ev.touches ? ev.touches[0].clientX : ev.clientX);
    const stop = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop); document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
    document.addEventListener('touchmove', move); document.addEventListener('touchend', stop);
    handler(e.touches ? e.touches[0].clientX : e.clientX);
  };
  el.addEventListener('mousedown', start); el.addEventListener('touchstart', start);
}
initSlider(slider, updateFsize);

// --- GRAPH ---
let graphActive = false;
let zoom = 1.0;
ui.graph.btn.onclick = () => {
  graphActive = !graphActive;
  ui.graph.btn.classList.toggle('open');
  document.getElementById('winL').classList.toggle('expanded', graphActive);
  ui.graph.panel.classList.toggle('open', graphActive);
  if(graphActive) initGraph();
};

function initGraph() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = ui.graph.panel.clientWidth; canvas.height = ui.graph.panel.clientHeight; };
  window.addEventListener('resize', resize); resize();

  document.getElementById('zoomIn').onclick = (e) => { e.stopPropagation(); zoom = Math.min(2, zoom + 0.1); };
  document.getElementById('zoomOut').onclick = (e) => { e.stopPropagation(); zoom = Math.max(0.5, zoom - 0.1); };

  const render = (time) => {
    if(!graphActive) return;
    ctx.fillStyle = '#0c0a06'; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Stars
    ctx.fillStyle = '#f6f1da';
    for(let i=0; i<60; i++) {
       let x = (Math.abs(Math.sin(i*123)) * canvas.width);
       let y = (Math.abs(Math.cos(i*456)) * canvas.height);
       let flicker = Math.sin(time/500 + i);
       if(flicker > 0.4) ctx.fillRect(x, y, 1, 1);
    }

    // Nodes
    vault.forEach((f, i) => {
      let cx = canvas.width/2 + (Math.cos(i + time/2000) * 100 * zoom);
      let cy = canvas.height/2 + (Math.sin(i + time/2000) * 80 * zoom);
      ctx.fillStyle = '#D6D5A9'; ctx.fillRect(cx, cy, 5, 5);
      ctx.font = '9px Fixedsys'; ctx.fillStyle = '#e8d0a0';
      ctx.fillText(f.folder, cx + 10, cy + 5);
    });
    requestAnimationFrame(render);
  };
  requestAnimationFrame(render);
}

// --- CONTENT RENDER ---
function renderList() {
  const flist = document.getElementById('flist');
  flist.innerHTML = '';
  vault.forEach(f => {
    const fr = document.createElement('div'); fr.className = 'folder-row'; fr.textContent = `[ ${f.folder} ]`;
    flist.appendChild(fr);
    f.notes.forEach(n => {
      const nr = document.createElement('div'); nr.className = 'note-row'; nr.textContent = n.title;
      nr.onclick = () => {
        document.getElementById('reader').innerHTML = `<div class="ntitle">${n.title}</div><div class="nbody">${n.body}</div>`;
      };
      flist.appendChild(nr);
    });
  });
}

// --- GRAIN ---
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
function drawGrain() {
  grain.width = window.innerWidth; grain.height = window.innerHeight;
  const img = gc.createImageData(grain.width, grain.height);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255;
    img.data[i] = img.data[i+1] = img.data[i+2] = v; img.data[i+3] = 20;
  }
  gc.putImageData(img, 0, 0);
  setTimeout(() => requestAnimationFrame(drawGrain), 50);
}
drawGrain();

renderList();
</script>
</body>
</html>

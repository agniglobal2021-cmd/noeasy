<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'Fixedsys';
  src: url('../fonts/Fixedsys.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'PageFont';
  src: url('../fonts/PageFont.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:    #e8e0c4;
  --text:  #353535;
  --desk:  #5D5143;
  --tb:    #5D5143;
  --ttxt:  #f6f1da;
  --btn:   #AFA191;
  --blt:   #d4cdc4;
  --bdk:   #3d3830;
  --bsh:   #2a2520;
  /* terminal — left panel bg: #221c14 ≈ #2e2820 darkened ~10% */
  --lbg:   #1e1a12;
  --tbg:   #2e2820;
  --ta:    #D6D5A9;
  --tdim:  #7a6a52;
  --thl:   #e8d0a0;
  --tbar:  #181410;
  --tsel:  #6a5535;
  --header-titlebar-h: 22px;
  --header-pill-h: 44px;
  --header-total-h: calc(env(safe-area-inset-top, 0px) + var(--header-titlebar-h) + var(--header-pill-h));
  --r-fsize: 11px;
}

html { background: #5D5143; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; top: -100vh; left: 0; right: 0;
  height: 100vh; background: #5D5143;
  z-index: 9001; pointer-events: none;
}

body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  color: var(--text);
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: none;
  height: 100vh;
}

/* ── Grain canvas (same as gallery) ── */
#grain {
  position: fixed;
  top: -60px; bottom: -60px; left: -10px; right: -10px;
  z-index: 9998; pointer-events: none;
}

/* ── HEADER (identical to gallery) ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: stretch;
  pointer-events: none;
  opacity: 0; transition: opacity 0.7s ease;
  background: var(--desk);
}
header.visible { opacity: 1; }
header > * { pointer-events: auto; }

.header-safe-top {
  height: env(safe-area-inset-top, 0px);
  background: var(--desk); flex-shrink: 0;
}
.header-inner { display: flex; flex-direction: column; align-items: stretch; width: 100%; }

.header-titlebar-strip {
  width: 100%; height: var(--header-titlebar-h);
  background: #5D5143;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0 0 8px; flex-shrink: 0;
  border-bottom: 1px solid #3e352d;
}
.header-titlebar-strip-text {
  font-family: 'DotGothic16', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  color: #f6f1da; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}

.header-pill {
  display: flex; align-items: center;
  position: relative; width: 100%; height: var(--header-pill-h);
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-bottom: 2px solid #7a7068;
  box-shadow: 0 1px 0 #404040;
  overflow: visible; padding: 0 4px;
}

.pill-divider {
  width: 2px; height: 26px; flex-shrink: 0;
  background: #808080; border-right: 1px solid #d4cdc4;
  align-self: center; margin: 0 2px;
}

.pill-center {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; pointer-events: none; user-select: none;
  overflow: hidden;
}
.pill-section {
  font-family: 'Alkhemikal', serif;
  font-size: clamp(13px, 4vw, 19px); letter-spacing: 0.08em; opacity: 0.9; color: #000;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}

.sword-btn {
  height: calc(100% - 10px); padding: 0 12px; margin: 0 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: none; flex-shrink: 0;
}
.sword-btn:active, .sword-btn.open {
  border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
  border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
  box-shadow: inset 1px 1px 0 #7a7068;
}
.sword-btn .line {
  position: relative; height: 2px; width: 18px; background: #000;
  opacity: 0.8;
  transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.25s, width 0.38s cubic-bezier(0.16,1,0.3,1);
}
.sword-btn.open .line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
.sword-btn.open .line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.burger-wrap { position: relative; height: 100%; display: flex; align-items: center; }

.nav-overlay {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 8999;
  min-width: 160px; padding: 2px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transform-origin: top right;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.nav-overlay a {
  font-family: 'DotGothic16', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #000; text-decoration: none; padding: 8px 12px 8px 8px;
  display: flex; align-items: center;
}
.nav-overlay a::before { content: '/'; margin-right: 7px; font-size: 10px; }
.nav-overlay a:hover { background: #5D5143; color: #f6f1da; }
.nav-overlay a + a { border-top: 1px solid #7a7068; }
.nav-overlay a.current { background: #c8c2ba; }

/* ── Main layout — below header ── */
.page-main {
  position: fixed;
  top: var(--header-total-h);
  left: 0; right: 0;
  bottom: env(safe-area-inset-bottom, 0px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.desktop {
  display: flex; gap: 7px;
  padding: 8px 8px 12px;
  flex: 1; overflow: hidden;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
  min-height: 0;
}

/* ── Win95 window chrome ── */
.win {
  display: flex; flex-direction: column; overflow: hidden;
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  box-shadow: 2px 2px 0 var(--bsh);
}

.tbar {
  height: 22px; background: var(--btn);
  display: flex; align-items: stretch; padding: 1px; flex-shrink: 0; user-select: none;
}
.tbar-inner {
  flex: 1; background: var(--tb);
  display: flex; align-items: center; padding: 0 1px 0 6px; gap: 2px; overflow: hidden; min-width: 0;
}
.tbar-t {
  flex: 1; font-size: 8px; font-weight: 700; letter-spacing: .12em;
  color: var(--ttxt); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1;
}
.tbbtns { display: flex; gap: 1px; flex-shrink: 0; align-items: stretch; }
.tbbtn {
  width: 16px; background: var(--btn);
  border-top: 1px solid var(--blt); border-left: 1px solid var(--blt);
  border-right: 1px solid var(--bdk); border-bottom: 1px solid var(--bdk);
  display: flex; align-items: center; justify-content: center;
  cursor: default; flex-shrink: 0; padding: 0 0 1px 0;
}
.tbbtn:active {
  border-top: 1px solid var(--bdk); border-left: 1px solid var(--bdk);
  border-right: 1px solid var(--blt); border-bottom: 1px solid var(--blt);
}

.mbar {
  display: flex; padding: 2px 3px; flex-shrink: 0; gap: 2px;
  background: var(--lbg); border-bottom: 1px solid rgba(201,164,114,.1);
}
.lm-btn {
  font-family: 'Fixedsys', monospace; font-size: 8px; letter-spacing: .08em;
  display: flex; align-items: center; gap: 3px;
  padding: 2px 7px; cursor: pointer; color: var(--ta);
  background: var(--tbg);
  border-top: 1px solid #4a4030; border-left: 1px solid #4a4030;
  border-right: 1px solid #111008; border-bottom: 1px solid #111008;
  transition: color .08s; user-select: none;
}
.lm-btn:hover { color: var(--thl); }
.lm-btn:active {
  border-top: 1px solid #111008; border-left: 1px solid #111008;
  border-right: 1px solid #4a4030; border-bottom: 1px solid #4a4030;
}
.lm-btn.active { color: var(--thl); background: var(--tsel); }
.lm-label { font-size: 7px; letter-spacing: .1em; }

/* ── Star background canvas ── */
canvas#starsBg {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: block;
  z-index: 0;
  image-rendering: pixelated;
}
canvas#graphCanvas {
  display: block;
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
  image-rendering: auto;
}

/* ── CRT turn-on overlay ── */
#crtOverlay {
  position: absolute;
  inset: 0;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  background: #D6D5A9;
}
@keyframes crtOn {
  0%   { opacity: 0.76; clip-path: inset(48% 0 48% 0); }
  18%  { opacity: 0.72; clip-path: inset(44% 0 44% 0); }
  30%  { opacity: 0.56; clip-path: inset(30% 0 30% 0); }
  50%  { opacity: 0.40; clip-path: inset(10% 0 10% 0); }
  70%  { opacity: 0.20; clip-path: inset(2% 0 2% 0); }
  88%  { opacity: 0.08; clip-path: inset(0% 0 0% 0); }
  100% { opacity: 0;    clip-path: inset(0% 0 0% 0); }
}
#crtOverlay.firing {
  animation: crtOn 0.38s steps(6, end) forwards;
}

/* ── Graph panel fold-appear animation ── */
@keyframes graphFoldIn {
  0%   { transform: scaleY(0); opacity: 0; }
  60%  { transform: scaleY(1.04); opacity: 1; }
  100% { transform: scaleY(1); opacity: 1; }
}
.graph-panel.open {
  display: block;
  transform-origin: top center;
  animation: graphFoldIn 0.32s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* ── Win-l expand / Win-r shrink when graph open ── */
.desktop.graph-active .win-l { width: 340px; transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }
.win-l { transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }

/* ── Hide fold-all when graph open ── */
.graph-panel-open #lmbar { opacity: 0; pointer-events: none; transition: opacity 0.15s; }
#lmbar { transition: opacity 0.15s; }



/* ── Graph panel — full left-panel overlay ── */
.graph-panel {
  position: absolute; inset: 0; z-index: 10;
  background: #0c0a06;
  display: none; overflow: hidden;
}

.graph-wrap {
  width: 100%; height: 100%;
  position: relative; overflow: hidden;
  background: #0c0a06;
}

/* hide old graph pill toggle */
.graph-toggle-pill { display: none; }

/* scanlines overlay */
.scan {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
}

/* ── LEFT PANEL ── */
.win-l { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* entire lbody: uniform dark bg, same as tbar */
.lbody {
  flex: 1; background: var(--lbg);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
  min-height: 0;
}

/* text flicker on all left-panel text */
@keyframes flicker {
  0%,100% { opacity: 1; }
  92%      { opacity: 1; }
  93%      { opacity: .82; }
  94%      { opacity: 1; }
  97%      { opacity: .9; }
  98%      { opacity: 1; }
}
.lbody *:not(#crtOverlay) { animation: flicker 4s step-end infinite; }

/* phosphor text-shadow blur */
.folder-row, .note-row {
  text-shadow: 0 0 6px currentColor;
}

.flist {
  flex: 1; display: flex; flex-direction: column; padding: 8px 0;
  position: relative; z-index: 2; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
}
.flist::-webkit-scrollbar { display: none; }

.folder-row {
  padding: 1px 12px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 11px; line-height: 1.7;
  color: var(--ta); letter-spacing: .03em;
  white-space: nowrap; overflow: hidden;
  transition: color .08s;
}
.folder-row:hover { color: var(--thl); }

.folder-children { display: none; flex-direction: column; margin-bottom: 3px; }
.folder-children.open { display: flex; }

.note-row {
  padding: 0 12px 0 20px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 10px; line-height: 1.75;
  color: var(--tdim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .08s; position: relative;
}
.note-row::before { content: '· '; }
.note-row:hover { color: var(--ta); }
.note-row.act { color: var(--thl); }
.note-row.act::after {
  content: '▌'; margin-left: 2px;
  animation: bl .9s step-end infinite;
}

@keyframes bl { 50% { opacity: 0; } }

/* ── Font size knob button ── */
.fsize-btn {
  height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  flex-shrink: 0; user-select: none; position: relative;
}
.fsize-btn:active {
  border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
  border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
  box-shadow: inset 1px 1px 0 #7a7068;
}
.fsize-label {
  font-family: 'Alkhemikal', serif; font-size: 13px;
  color: #000; opacity: 0.75; letter-spacing: .02em; line-height: 1;
}
.fsize-knob {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #d4cdc4, #8a7e72);
  border: 1px solid #3d3830;
  box-shadow: 1px 1px 0 #2a2520, inset 1px 1px 0 rgba(255,255,255,0.3);
  position: relative; flex-shrink: 0;
  transition: transform 0.1s;
}
.fsize-knob::after {
  content: '';
  position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
  width: 2px; height: 5px; background: #2a2520; border-radius: 1px;
}

.fsize-popup {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  padding: 8px 10px; z-index: 9000;
  display: none; flex-direction: column; gap: 6px; min-width: 140px;
}
.fsize-popup.open { display: flex; }
.fsize-popup-title {
  font-family: 'Fixedsys', monospace; font-size: 8px;
  color: #000; opacity: 0.6; letter-spacing: .1em; text-transform: uppercase;
  border-bottom: 1px solid #7a7068; padding-bottom: 4px; margin-bottom: 2px;
}

/* ── Graph knob button (same style as fsize-btn) ── */
.gknob-btn {
  height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  flex-shrink: 0; user-select: none; position: relative;
}
.gknob-btn:active, .gknob-btn.open {
  border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
  border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
  box-shadow: inset 1px 1px 0 #7a7068;
}
.gknob-label {
  font-family: 'Fixedsys', monospace; font-size: 8px;
  color: #000; opacity: 0.7; letter-spacing: .05em; line-height: 1;
}
.gknob-knob { display: none; }
.gknob-map-icon {
  width: 20px; height: 20px;
  flex-shrink: 0; display: block;
}
.gknob-popup {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  padding: 8px 10px; z-index: 9000;
  display: none; flex-direction: column; gap: 6px; min-width: 140px;
}
.gknob-popup.open { display: flex; }
.gknob-popup-title {
  font-family: 'Fixedsys', monospace; font-size: 8px;
  color: #000; opacity: 0.6; letter-spacing: .1em; text-transform: uppercase;
  border-bottom: 1px solid #7a7068; padding-bottom: 4px; margin-bottom: 2px;
}
.gknob-track {
  display: flex; align-items: center; gap: 6px;
}
.gknob-track-label {
  font-family: 'Fixedsys', monospace; font-size: 8px; color: #000; opacity: 0.5; width: 12px; text-align: center;
}
.gknob-slider {
  flex: 1; height: 14px; position: relative; cursor: pointer;
  background: #8a7e72;
  border-top: 1px solid #3d3830; border-left: 1px solid #3d3830;
  border-right: 1px solid #d4cdc4; border-bottom: 1px solid #d4cdc4;
}
.gknob-thumb {
  position: absolute; top: 1px; width: 10px; height: 10px;
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-left: 1px solid #d4cdc4;
  border-right: 1px solid #3d3830; border-bottom: 1px solid #3d3830;
  cursor: grab; transform: translateX(-50%);
}
/* graph open/close toggle in pill — remove old pill button */
.graph-toggle-pill { display: none; }
.fsize-track {
  display: flex; align-items: center; gap: 6px;
}
.fsize-track-label {
  font-family: 'Fixedsys', monospace; font-size: 8px; color: #000; opacity: 0.5; width: 12px;
}
.fsize-slider {
  flex: 1; height: 14px; position: relative; cursor: pointer;
  background: #8a7e72;
  border-top: 1px solid #3d3830; border-left: 1px solid #3d3830;
  border-right: 1px solid #d4cdc4; border-bottom: 1px solid #d4cdc4;
}
.fsize-thumb {
  position: absolute; top: 1px; width: 10px; height: 10px;
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-left: 1px solid #d4cdc4;
  border-right: 1px solid #3d3830; border-bottom: 1px solid #3d3830;
  cursor: grab; transform: translateX(-50%);
}

/* ── Win95 scrollbar for right panel ── */
.rscroll {
  flex: 1; overflow-y: scroll; padding: 20px 28px 28px; position: relative; z-index: 2;
  scrollbar-width: auto; scrollbar-color: #AFA191 #5a5145;
}
.rscroll::-webkit-scrollbar { width: 16px; }
.rscroll::-webkit-scrollbar-track {
  background: #5a5145;
  border-left: 1px solid #3d3830;
}
.rscroll::-webkit-scrollbar-thumb {
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  min-height: 20px;
}
.rscroll::-webkit-scrollbar-button {
  background: #AFA191; height: 16px;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  display: block;
}

/* ── Obsidian path in right tbar ── */
#rtitle {
  font-family: 'Fixedsys', monospace;
  font-size: 8px; letter-spacing: .08em;
}
#rtitle .rpath-root { color: var(--tdim); }
#rtitle .rpath-cur  { color: var(--ttxt); }

/* ── RIGHT PANEL ── */
.win-r { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.rbody {
  flex: 1; background: #b5ad9e;
  display: flex; flex-direction: column; overflow: hidden; position: relative;
  min-height: 0;
}

/* feed */
.fe {
  padding: 20px 0;
  border-bottom: 1px solid rgba(93,81,67,.18);
  cursor: pointer;
}
.fe:first-child { padding-top: 0; }
.fe:last-child { border-bottom: none; }
.fe:hover .fe-title { color: #3d3020; }
.fe:hover .fe-arrow { opacity: 1; transform: translateX(3px); }

.fe-meta {
  font-family: 'Fixedsys', monospace; font-size: 8px;
  color: #7a6a52; margin-bottom: 8px; letter-spacing: .14em;
  text-transform: uppercase; opacity: .75;
}
.fe-title {
  font-family: 'Alkhemikal', serif; font-size: 20px; line-height: 1.2;
  color: #2e2318; margin-bottom: 8px; transition: color .15s;
  letter-spacing: .01em;
}
.fe-prev {
  font-family: 'DotGothic16', monospace; font-size: var(--r-fsize); line-height: 1.9;
  color: #5a4e3e; opacity: .7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  max-width: 580px;
}
.fe-arrow {
  display: inline-block; margin-top: 8px;
  font-family: 'Fixedsys', monospace; font-size: 8px;
  color: #7a6a52; letter-spacing: .12em; opacity: 0;
  transition: opacity .15s, transform .15s;
}

/* note view */
.nv {
  padding: 0 0 32px;
  animation: fadein .2s ease;
  max-width: 640px;
}
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.nbk {
  font-family: 'Fixedsys', monospace; font-size: 8px; letter-spacing: .12em;
  text-transform: uppercase;
  color: #7a6a52; background: none; border: none; cursor: pointer;
  padding: 0; margin-bottom: 20px; display: block; transition: color .12s;
  opacity: .7;
}
.nbk:hover { color: #3d3020; opacity: 1; }

.nmeta {
  font-family: 'Fixedsys', monospace; font-size: 8px; letter-spacing: .14em;
  text-transform: uppercase;
  color: #7a6a52; margin-bottom: 12px; opacity: .6;
}
.ntitle {
  font-family: 'Alkhemikal', serif; font-size: 26px; line-height: 1.15;

}
.nbody {

  line-height: 2.1; color: #3d3428;
}
.nbody p { margin-bottom: 18px; max-width: 560px; }
.nbody h2 {
  font-family: 'Alkhemikal', serif; font-size: 17px; color: #1e1710;
  margin: 36px 0 14px; letter-spacing: .02em; font-weight: 400;
}
.nbody blockquote {
  border-left: 1px solid rgba(93,81,67,.4); padding-left: 20px;
  margin: 24px 0; color: #6a5c4a; font-style: normal;
}
.nbody strong { color: #1e1710; font-weight: 400; }

/* statusbar */
.sbar {
  background: rgba(93,81,67,.12); border-top: 1px solid rgba(93,81,67,.2);
  display: flex; align-items: center; padding: 3px 14px; gap: 10px;
  flex-shrink: 0; position: relative; z-index: 2;
}
.si { font-family: 'Fixedsys', monospace; font-size: 8px; color: #7a6a52; opacity: .55; letter-spacing: .08em; text-transform: uppercase; }
.sdv { width: 1px; height: 7px; background: rgba(93,81,67,.3); }

/* ── Tree of Life panel ── */
#treePanel {
  position: absolute; inset: 0; z-index: 10;
  background: #0c0a06;
  display: none; overflow: hidden;
  flex-direction: column;
}
#treeCanvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: calc(100% - 54px);
  image-rendering: pixelated;
  cursor: default;
}
#treeInfo {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 54px;
  background: #0f0d08;
  border-top: 1px solid #2a2518;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  font-family: 'Fixedsys', monospace;
  overflow: hidden;
}
#treeInfoSymbol {
  font-size: 20px;
  color: #D6D5A9;
  text-shadow: 0 0 8px #D6D5A9;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
}
#treeInfoName {
  font-size: 11px;
  color: #D6D5A9;
  text-shadow: 0 0 6px #D6D5A9;
  letter-spacing: .08em;
  font-weight: bold;
  flex-shrink: 0;
  min-width: 60px;
}
#treeInfoTheme {
  font-size: 8px;
  color: #7a6a52;
  letter-spacing: .12em;
  text-transform: uppercase;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#treeInfoCount {
  font-size: 8px;
  color: #7a6a52;
  letter-spacing: .1em;
  flex-shrink: 0;
}
.treeBtn.open {
  border-top: 2px solid #3d3830 !important;
  border-left: 2px solid #3d3830 !important;
  border-right: 2px solid #d4cdc4 !important;
  border-bottom: 2px solid #d4cdc4 !important;
  box-shadow: inset 1px 1px 0 #7a7068 !important;
}

@media (max-width: 600px) {

  .desktop { flex-direction: column; height: auto; overflow-y: auto; padding: 8px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 16px)); }

  .win-l.graph-open-mobile .lbody { max-height: none; height: 100%; }
  .win-l.graph-open-mobile ~ .win-r { min-height: 35vh; }
}

<script>
// ── Global popup mutex — one popup open at a time ──
window._popups = {};
window._registerPopup = function(name, closeFn) { window._popups[name] = closeFn; };
window._closeAllPopups = function(except) {
  Object.entries(window._popups).forEach(([k, fn]) => { if (k !== except) fn(); });
};

// ── Grain (identical to gallery) ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() {
  gw = grain.width  = window.innerWidth  + 20;
  gh = grain.height = window.innerHeight + 120;
}
resizeGrain();
window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

// ── Header visible ──
setTimeout(() => document.getElementById('siteHeader').classList.add('visible'), 100);

// ── Burger menu ──
const swordBtn = document.getElementById('swordBtn');
const navOverlay = document.getElementById('navOverlay');
swordBtn.addEventListener('click', e => {
  e.stopPropagation();
  const willOpen = !navOverlay.classList.contains('open');
  if (willOpen) window._closeAllPopups('burger');
  const open = navOverlay.classList.toggle('open');
  swordBtn.classList.toggle('open', open);
});
window._registerPopup('burger', () => {
  navOverlay.classList.remove('open');
  swordBtn.classList.remove('open');
});
document.addEventListener('click', () => {
  navOverlay.classList.remove('open');
  swordBtn.classList.remove('open');
});

// ── Templar cross pattée SVG ──
const crossSVG = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;image-rendering:pixelated;shape-rendering:crispEdges"><rect x="5" y="0" width="1" height="11" fill="#1a1612"/><rect x="4" y="1" width="3" height="1" fill="#1a1612"/><rect x="4" y="9" width="3" height="1" fill="#1a1612"/><rect x="3" y="0" width="5" height="1" fill="#1a1612"/><rect x="3" y="10" width="5" height="1" fill="#1a1612"/><rect x="0" y="5" width="11" height="1" fill="#1a1612"/><rect x="1" y="4" width="1" height="3" fill="#1a1612"/><rect x="9" y="4" width="1" height="3" fill="#1a1612"/><rect x="0" y="3" width="1" height="5" fill="#1a1612"/><rect x="10" y="3" width="1" height="5" fill="#1a1612"/></svg>`;

function makeBtns(container) {
  ['Minimize','Maximize','Close'].forEach(t => {
    const b = document.createElement('div');
    b.className = 'tbbtn'; b.title = t;
    b.innerHTML = crossSVG;
    container.appendChild(b);
  });
}
makeBtns(document.getElementById('lbtns'));
makeBtns(document.getElementById('rbtns'));

// ── Data ──
const vault = [
  {
    folder: "Esoterica",
    notes: [
      {
        id:1, date:"2026-04-22", tags:["theurgy","plato"], sephirot:["Tifaret","Binah"],
        title:"On Theurgy and the Purpose of Prayer",
        body:`Iamblichus says that prayer works not because the gods learn of our desire. The gods know everything. Prayer works because it changes the one who prays.

We do not inform heaven — we tune ourselves. Like tuning an instrument before drawing sound from it.

## Ritual as Calibration

You bring your structure into alignment with that which you address. And in that alignment, something begins to move.

> "The gods hear because the soul has lifted itself to them." — Iamblichus

The hexagram ritual works precisely this way. Not explanation first — a form that does something to you when you work with it.`
      },
      {
        id:4, date:"2026-03-29", tags:["symbols","jung"], sephirot:["Yesod","Hod"],
        title:"The Symbol as Entrance, Not Sign",
        body:`Jung distinguished sign from symbol. A sign points to something known. A symbol points to something that cannot be expressed otherwise.

The cross as sign — a specific religion. The cross as symbol — the intersection of axes, the point where vertical and horizontal meet. This cannot be explained — only felt.

Symbols do not explain — they open.`
      }
    ]
  },
  {
    folder: "Tarot",
    notes: [
      {
        id:2, date:"2026-04-18", tags:["arcana"], sephirot:["Hod","Tifaret"],
        title:"The Magician: Will as Channel",
        body:`The Magician is the first arcana after the Fool. The Fool is potential without form. The Magician is the moment when potential takes up its tools.

On the table lie all four suits. One hand raised to heaven, the other lowered to earth. This is not about control — it is about channel.

## The Artist as Magician

He conducts what already exists — from above downward, through himself, into matter. Your task is to become transparent enough for it to pass through.

This relieves some of the anxiety around "creation." Not to invent — but to be the place through which it passes.`
      }
    ]
  },
  {
    folder: "Philosophy",
    notes: [
      {
        id:3, date:"2026-04-10", tags:["plato","media"], sephirot:["Yesod","Malkuth"],
        title:"Plato's Cave and Screens",
        body:`It is common to read the cave as a metaphor for ignorance. But the prisoners are not foolish — they are rational. They study shadows, build theories, predict the next shadow. The problem is not the intellect — it is aimed in the wrong direction.

Metrics, reach, algorithms — these are shadows on the wall. One can reason about them very cleverly. But they remain shadows all the same.

Reality is what happens when you paint.`
      },
      {
        id:5, date:"2026-03-15", tags:["archaic"], sephirot:["Netzach","Malkuth"],
        title:"The Archaic as Living",
        body:`The archaic is not chronology. It is a layer of reality.

Mythological thinking has not disappeared. It went underground. People still live by rituals, seek initiation, need symbols capable of holding their experience.

Working with occult aesthetics is not nostalgia. It is an attempt to feel out what is still alive and waiting for form.`
      }
    ]
  }
];

const allNotes = vault.flatMap(f => f.notes.map(n => ({...n, folder: f.folder})));
let openFolders = new Set(vault.map(f => f.folder)); // all open by default
let activeNote = null;

function buildLeft() {
  const fl = document.getElementById('flist');
  fl.innerHTML = '';
  vault.forEach(({folder, notes}) => {
    const isOpen = openFolders.has(folder);
    const row = document.createElement('div');
    row.className = 'folder-row';
    row.textContent = `[${folder.toUpperCase()}]`;
    row.onclick = () => {
      openFolders.has(folder) ? openFolders.delete(folder) : openFolders.add(folder);
      activeNote = null;
      buildLeft();
      showFeed(notes.map(n => ({...n, folder})), folder);
    };
    fl.appendChild(row);

    const children = document.createElement('div');
    children.className = 'folder-children' + (isOpen ? ' open' : '');
    notes.forEach(note => {
      const nr = document.createElement('div');
      nr.className = 'note-row' + (activeNote?.id === note.id ? ' act' : '');
      nr.textContent = note.title;
      nr.title = note.title;
      nr.onclick = e => {
        e.stopPropagation();
        activeNote = note;
        buildLeft();
        openNote({...note, folder});
      };
      children.appendChild(nr);
    });
    fl.appendChild(children);
  });
}

function setRPath(cur) {
  const el = document.getElementById('rpathCur');
  if (el) el.textContent = cur;
}

function showFeed(notes, folderName) {
  if (window._treeSetNote) window._treeSetNote([]);
  const sorted = [...notes].sort((a,b) => b.date.localeCompare(a.date));
  const lbl = folderName || '';
  setRPath(lbl ? lbl.toLowerCase() + '/' : '');
  document.getElementById('s1').textContent = (lbl || 'GARDEN').toUpperCase();
  document.getElementById('s2').textContent = sorted.length + ' entries';
  document.getElementById('s3').textContent = sorted[0]?.date || '';
  const r = document.getElementById('reader');
  r.innerHTML = '';
  sorted.forEach(n => {
    const e = document.createElement('div');
    e.className = 'fe';
    const preview = n.body.replace(/[#>*_\n]/g,' ').replace(/\s+/g,' ').slice(0,140);
    e.innerHTML = `<div class="fe-meta">${n.date}  ·  ${n.tags.join(' · ')}</div><div class="fe-title">${n.title}</div><div class="fe-prev">${preview}</div><span class="fe-arrow">READ →</span>`;
    e.onclick = () => { activeNote = n; buildLeft(); openNote({...n, folder: n.folder||folderName}); };
    r.appendChild(e);
  });
  r.scrollTop = 0;
}

function openNote(n) {
  if (window._treeSetNote) window._treeSetNote(n.sephirot || []);
  setRPath(n.folder.toLowerCase() + '/' + n.title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'') + '.md');
  document.getElementById('s1').textContent = n.folder.toUpperCase();
  document.getElementById('s2').textContent = n.tags.join(' · ');
  document.getElementById('s3').textContent = n.date;
  const r = document.getElementById('reader');
  r.innerHTML = '';
  const v = document.createElement('div');
  v.className = 'nv';
  v.innerHTML = `<button class="nbk" id="nbk">← back</button><div class="nmeta">${n.date}  ·  ${[n.folder,...n.tags].join(' · ')}</div><div class="ntitle">${n.title}</div><div class="n-rule"></div><div class="nbody">${md(n.body)}</div>`;
  v.querySelector('#nbk').onclick = () => {
    activeNote = null; buildLeft();
    const fn = vault.find(f => f.folder === n.folder)?.notes || [];
    showFeed(fn.map(x => ({...x, folder: n.folder})), n.folder);
  };
  r.appendChild(v);
  r.scrollTop = 0;
}

function md(t) {
  return t.split('\n\n').map(b => {
    if (b.startsWith('## ')) return `<h2>${b.slice(3)}</h2>`;
    if (b.startsWith('> '))  return `<blockquote>${b.slice(2)}</blockquote>`;
    return `<p>${b.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p>`;
  }).join('');
}

// ── Graph knob button (open/close graph panel + zoom slider) ──
(function() {
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.5, ZOOM_DEFAULT = 1.0;
  let zoomCur = ZOOM_DEFAULT;

  const btn    = document.getElementById('gknobBtn');
  const popup  = document.getElementById('gknobPopup');
  const slider = document.getElementById('gknobSlider');
  const thumb  = document.getElementById('gknobThumb');
  const wrap   = document.getElementById('gknobWrap');
  const panel  = document.getElementById('graphPanel');
  const flist  = document.getElementById('flist');
  const desktop = document.querySelector('.desktop');
  const winL   = document.querySelector('.win-l');
  const lbody  = document.querySelector('.lbody');
  const lmbar  = document.getElementById('lmbar');
  const crtEl  = document.getElementById('crtOverlay');

  let graphVisible = false;

  function fireCRT() {
    crtEl.classList.remove('firing');
    void crtEl.offsetWidth; // reflow
    crtEl.classList.add('firing');
    setTimeout(() => crtEl.classList.remove('firing'), 420);
  }

  function zoomPct() { return (zoomCur - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN); }

  function applyKnob() {
    const sliderW = slider.offsetWidth;
    if (sliderW > 0) thumb.style.left = (zoomPct() * (sliderW - 10) + 5) + 'px';
    if (window._graphSetZoom) window._graphSetZoom(zoomCur);
  }

  // Don't call applyKnob here — slider is hidden, offsetWidth=0

  function openGraph() {
    graphVisible = true;
    btn.classList.add('open');
    fireCRT();
    lbody.classList.add('graph-panel-open');
    desktop.classList.add('graph-active');
    winL.classList.add('graph-open-mobile');
    panel.classList.add('open');
    flist.style.display = 'none';
    popup.classList.add('open');
    requestAnimationFrame(() => applyKnob());
    initGraph();
    // Force canvas resize after layout settles — critical on mobile
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (window._graphForceResize) window._graphForceResize();
    }));
    setTimeout(() => {
      if (window._graphForceResize) window._graphForceResize();
    }, 120);
  }

  function closeGraph() {
    graphVisible = false;
    btn.classList.remove('open');
    panel.classList.remove('open');
    flist.style.display = '';
    popup.classList.remove('open');
    desktop.classList.remove('graph-active');
    winL.classList.remove('graph-open-mobile');
    lbody.classList.remove('graph-panel-open');
  }

  window._registerPopup('graph', () => { if (graphVisible) { closeGraph(); } else { popup.classList.remove('open'); } });
  window._closeGraphPopup = () => { if (graphVisible) popup.classList.remove('open'); };

  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (graphVisible) {
      closeGraph();
    } else {
      window._closeAllPopups('graph');
      openGraph();
    }
  });

  // Zoom slider drag
  let dragging = false;
  function setZoomFromX(x) {
    const rect = slider.getBoundingClientRect();
    let t = (x - rect.left) / rect.width;
    t = Math.max(0, Math.min(1, t));
    zoomCur = ZOOM_MIN + t * (ZOOM_MAX - ZOOM_MIN);
    applyKnob();
  }
  slider.addEventListener('mousedown', e => { dragging = true; setZoomFromX(e.clientX); e.stopPropagation(); });
  slider.addEventListener('touchstart', e => { dragging = true; setZoomFromX(e.touches[0].clientX); e.stopPropagation(); }, {passive:true});
  document.addEventListener('mousemove', e => { if (dragging) setZoomFromX(e.clientX); });
  document.addEventListener('touchmove', e => { if (dragging) setZoomFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target) && graphVisible) popup.classList.remove('open');
  });

  window._graphZoom = () => zoomCur;
  window._graphSyncKnob = function(newZoom) {
    zoomCur = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
    applyKnob();
  };
})();

// ── Win95 Graph — pan/zoom, smooth labels ──
function initGraph() {
  if (window._graphInitialized) return;
  window._graphInitialized = true;

  const wrap   = document.getElementById('graphWrap');
  const canvas = document.getElementById('graphCanvas');
  const starsCv = document.getElementById('starsBg');
  const sctx = starsCv.getContext('2d');
  const ctx  = canvas.getContext('2d');

  // ── State — declared first so all functions can reference them ──
  let zoom = window._graphZoom ? window._graphZoom() : 1.0;
  let panX = 0, panY = 0;
  let starT = 0;
  let frame = 0;
  const NUM_STARS = 120;
  let stars = [];

  // ── Stars ──
  function initStars(w, h) {
    stars = Array.from({length: NUM_STARS}, () => ({
      x: Math.random() * w, y: Math.random() * h,
      size: Math.random() < 0.15 ? 2 : 1,
      bright: Math.random(),
      flickerPhase: Math.random() * 1000,
      flickerSpeed: 0.3 + Math.random() * 1.2,
      parallax: 0.1 + Math.random() * 0.6,
    }));
  }
  function drawStars(w, h) {
    sctx.clearRect(0, 0, w, h);
    sctx.fillStyle = '#0c0a06';
    sctx.fillRect(0, 0, w, h);
    stars.forEach(s => {
      const ox = (panX / (w||1) - 0.5) * s.parallax * 30;
      const oy = (panY / (h||1) - 0.5) * s.parallax * 30;
      const sx = (s.x + ox + w) % w;
      const sy = (s.y + oy + h) % h;
      const flickerT = starT * s.flickerSpeed + s.flickerPhase;
      const flicker = Math.sin(flickerT) > 0.6 ? 0.4 : 1.0;
      const alpha = (0.4 + s.bright * 0.6) * flicker;
      const hue = s.bright > 0.8 ? 'rgba(214,213,200,' : s.bright < 0.2 ? 'rgba(180,190,214,' : 'rgba(200,195,170,';
      sctx.fillStyle = hue + alpha + ')';
      sctx.fillRect(Math.floor(sx), Math.floor(sy), s.size, s.size);
    });
  }

  // ── Build nodes / edges ──
  const nodes = [], edges = [], nodeMap = {};
  vault.forEach((f, fi) => {
    const id = 'f_' + fi;
    nodes.push({ id, label: f.folder, type: 'folder', x: 0, y: 0, vx: 0, vy: 0 });
    nodeMap[id] = nodes[nodes.length - 1];
    f.notes.forEach(n => {
      const nid = 'n_' + n.id;
      nodes.push({ id: nid, label: n.title.split(':')[0].trim().slice(0, 18), type: 'note', x: 0, y: 0, vx: 0, vy: 0 });
      nodeMap[nid] = nodes[nodes.length - 1];
      edges.push({ a: id, b: nid });
    });
  });
  allNotes.forEach((n, i) => {
    allNotes.forEach((m, j) => {
      if (j > i && n.tags.some(t => m.tags.includes(t))) {
        const exists = edges.some(e =>
          (e.a==='n_'+n.id&&e.b==='n_'+m.id)||(e.b==='n_'+n.id&&e.a==='n_'+m.id));
        if (!exists) edges.push({ a: 'n_'+n.id, b: 'n_'+m.id, weak: true });
      }
    });
  });
  const N = nodes.length;
  nodes.forEach((node, i) => {
    const angle = (i / N) * Math.PI * 2;
    node.x = Math.cos(angle) * 80;
    node.y = Math.sin(angle) * 80;
  });

  // ── Force sim ──
  function simulate() {
    for (let iter = 0; iter < 3; iter++) {
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const d = Math.sqrt(dx*dx + dy*dy) || 0.1;
          const f = 1800 / (d * d);
          nodes[i].vx += dx/d*f; nodes[i].vy += dy/d*f;
          nodes[j].vx -= dx/d*f; nodes[j].vy -= dy/d*f;
        }
      }
      edges.forEach(e => {
        const a = nodeMap[e.a], b = nodeMap[e.b]; if (!a||!b) return;
        const dx = b.x-a.x, dy = b.y-a.y;
        const d = Math.sqrt(dx*dx+dy*dy)||0.1;
        const rest = e.weak ? 90 : 60;
        const f2 = (d - rest) * 0.06;
        a.vx += dx/d*f2; a.vy += dy/d*f2;
        b.vx -= dx/d*f2; b.vy -= dy/d*f2;
      });
      nodes.forEach(n => {
        n.vx += -n.x * 0.008; n.vy += -n.y * 0.008;
        n.vx *= 0.82; n.vy *= 0.82;
        n.x += n.vx; n.y += n.vy;
      });
    }
  }

  // ── Draw ──
  const COL_EDGE='#3a3228', COL_EDGE_W='#252018';
  const COL_FOLD='#D6D5A9', COL_NOTE='#7a6a52';
  const COL_FOLD_HL='#f0efcc', COL_NOTE_HL='#a89878';
  const COL_FOLD_LB='#D6D5A9', COL_NOTE_LB='#b0a080';
  const COL_GLOW='rgba(214,213,169,0.12)';

  function draw() {
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    ctx.clearRect(0, 0, W, H);
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.10)'; ctx.fillRect(0, y, W, 1);
    }
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);
    edges.forEach(e => {
      const a = nodeMap[e.a], b = nodeMap[e.b]; if (!a||!b) return;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = e.weak ? COL_EDGE_W : COL_EDGE;
      ctx.lineWidth = e.weak ? 0.6 : 1;
      ctx.setLineDash(e.weak ? [3,4] : []); ctx.stroke(); ctx.setLineDash([]);
    });
    nodes.forEach(n => {
      const r = n.type === 'folder' ? 6 : 4;
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r*3);
      g.addColorStop(0, COL_GLOW); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, r*3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = n.type==='folder' ? COL_FOLD : COL_NOTE;
      ctx.fillRect(n.x-r, n.y-r, r*2, r*2);
      ctx.fillStyle = 'rgba(200,255,180,0.3)'; ctx.fillRect(n.x-r, n.y-r, 1, 1);
      ctx.fillStyle = n.type==='folder' ? COL_FOLD_HL : COL_NOTE_HL;
      ctx.fillRect(n.x-1, n.y-1, 2, 2);
      ctx.save();
      ctx.font = `${n.type==='folder'?'bold ':''} ${n.type==='folder'?9:8}px "DotGothic16", monospace`;
      ctx.fillStyle = n.type==='folder' ? COL_FOLD_LB : COL_NOTE_LB;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = '#0c0a06'; ctx.shadowBlur = 3;
      ctx.fillText(n.label, n.x, n.y + r + 3);
      ctx.restore();
    });
    ctx.restore();
    ctx.fillStyle = '#1a3018';
    [[0,0,3,1],[0,0,1,3],[W-3,0,3,1],[W-1,0,1,3],
     [0,H-1,3,1],[0,H-3,1,3],[W-3,H-1,3,1],[W-1,H-3,1,3]
    ].forEach(([x,y,w,h]) => ctx.fillRect(x,y,w,h));
  }

  // ── Resize — sets canvas dimensions from actual DOM size ──
  function resize() {
    const w = wrap.clientWidth  || wrap.offsetWidth  || 300;
    const h = wrap.clientHeight || wrap.offsetHeight || 300;
    canvas.width  = w; canvas.height = h;
    starsCv.width = w; starsCv.height = h;
    panX = w / 2; panY = h / 2;
    initStars(w, h);
    draw();
  }

  // ── Main loop ──
  function tick() {
    frame++;
    starT += 0.018;
    if (frame < 200) simulate();
    drawStars(starsCv.width, starsCv.height);
    draw();
    window._graphAnimId = requestAnimationFrame(tick);
  }

  // ── Init: resize first, then start loop ──
  if (window._graphAnimId) cancelAnimationFrame(window._graphAnimId);
  resize();
  tick();
  window.addEventListener('resize', resize);
  window._graphForceResize = resize;

  // ── Zoom API ──
  window._graphSetZoom = function(z) {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const ratio = z / zoom;
    panX = cx + (panX - cx) * ratio;
    panY = cy + (panY - cy) * ratio;
    zoom = z; draw();
  };
  window._graphZoom = () => zoom;
  window._graphSyncKnob = function(newZoom) {
    zoom = Math.max(0.5, Math.min(2.5, newZoom));
    draw();
  };

  // ── Pan: mouse ──
  let panning = false, px0 = 0, py0 = 0, panX0 = 0, panY0 = 0;
  canvas.addEventListener('mousedown', e => {
    panning = true; px0 = e.clientX; py0 = e.clientY;
    panX0 = panX; panY0 = panY; e.preventDefault();
  });
  canvas.addEventListener('mousemove', e => {
    if (!panning) return;
    panX = panX0 + (e.clientX - px0); panY = panY0 + (e.clientY - py0); draw();
  });
  canvas.addEventListener('mouseup', () => { panning = false; });
  canvas.addEventListener('mouseleave', () => { panning = false; });

  // ── Pan/pinch: touch ──
  let lastTouchDist = null;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      panning = true;
      px0 = e.touches[0].clientX; py0 = e.touches[0].clientY;
      panX0 = panX; panY0 = panY;
    } else if (e.touches.length === 2) {
      panning = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx+dy*dy);
    }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && panning) {
      panX = panX0 + (e.touches[0].clientX - px0);
      panY = panY0 + (e.touches[0].clientY - py0); draw();
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const newZoom = Math.max(0.5, Math.min(2.5, zoom * (dist / lastTouchDist)));
      if (window._graphSetZoom) window._graphSetZoom(newZoom);
      if (window._graphSyncKnob) window._graphSyncKnob(newZoom);
      lastTouchDist = dist;
    }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () => { panning = false; lastTouchDist = null; });

  // ── Mouse wheel zoom ──
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newZoom = Math.max(0.5, Math.min(2.5, zoom * factor));
    if (window._graphSetZoom) window._graphSetZoom(newZoom);
    if (window._graphSyncKnob) window._graphSyncKnob(newZoom);
  }, {passive:false});
}

  // 22 paths (Tarot = 22 letters)
  const PATHS = [

    ['Chokmah','Binah'],['Chokmah','Chesed'],['Chokmah','Tifaret'],

    ['Hod','Yesod'],['Hod','Malkuth'],
    ['Yesod','Malkuth'],
  ];

  const treeBtn   = document.getElementById('treeBtn');

  const infoSym   = document.getElementById('treeInfoSymbol');

  const flist     = document.getElementById('flist');

  const graphPanel= document.getElementById('graphPanel');
  const graphBtn  = document.getElementById('gknobBtn');
  const crtEl     = document.getElementById('crtOverlay');

  let treeVisible = false;
  let hoveredSeph = null;
  let activeSephs = new Set(); // sephirot of currently open note
  let ctx;

  function fireCRTTree() {

    void crtEl.offsetWidth;

    return {

    };
  }

  function sephPx(id) {

    const [nx, ny] = POS[id];
    return [Math.round(nx * w), Math.round(ny * h)];

  function drawTree() {
    if (!ctx) return;

    ctx.fillStyle = '#0c0a06';
    ctx.fillRect(0, 0, w, h);

    // scanlines
    for (let y = 0; y < h; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, y, w, 1);
    }

    // Paths
    ctx.save();
    PATHS.forEach(([a, b]) => {
      const [ax, ay] = sephPx(a);
      const [bx, by] = sephPx(b);
      const aActive = activeSephs.has(a) && activeSephs.has(b);
      const hovered = (hoveredSeph === a || hoveredSeph === b);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      if (aActive) {
        ctx.strokeStyle = 'rgba(214,210,140,0.38)';
        ctx.lineWidth = 1.5;
      } else if (hovered) {
        ctx.strokeStyle = 'rgba(200,195,140,0.22)';
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = '#1e1c14';
        ctx.lineWidth = 1;
      }
      ctx.stroke();
    });
    ctx.restore();

    // R — circle radius proportional to canvas
    const R = Math.max(7, Math.min(12, Math.round(w * 0.045)));

    // Sephirot nodes
    SEPHIROT.forEach(s => {
      const [sx, sy] = sephPx(s.id);
      const isActive  = activeSephs.has(s.id);
      const isHovered = hoveredSeph === s.id;
      const col = isActive ? s.col : (isHovered ? s.col : s.dimCol);

      // glow
      if (isActive || isHovered) {
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, R * 3.5);
        const gc = isActive ? s.col : '#a09060';
        g.addColorStop(0, gc.replace('#', 'rgba(') + ',0.18)');
        g.addColorStop(0, 'rgba(200,190,120,0.14)');
        g.addColorStop(1, 'transparent');
        ctx.save();
        ctx.beginPath(); ctx.arc(sx, sy, R * 3.5, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.restore();
      }

      // circle (pixel: drawn as arc, 1px stroke)
      ctx.save();
      ctx.beginPath();
      ctx.arc(sx, sy, R, 0, Math.PI * 2);
      ctx.fillStyle = '#0c0a06';
      ctx.fill();
      ctx.strokeStyle = col;
      ctx.lineWidth = isActive ? 1.5 : 1;
      ctx.stroke();

      // inner dot when active
      if (isActive) {
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(2, R * 0.35), 0, Math.PI * 2);
        ctx.fillStyle = s.col;
        ctx.fill();
      }
      ctx.restore();

      // symbol inside
      ctx.save();
      const fsize = Math.max(8, Math.min(13, Math.round(R * 1.1)));
      ctx.font = `${fsize}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = col;
      if (isActive) ctx.shadowColor = s.col, ctx.shadowBlur = 6;
      ctx.fillText(s.symbol, sx, sy);
      ctx.restore();

      // label below
      ctx.save();
      const lblSize = Math.max(6, Math.min(9, Math.round(w * 0.032)));
      ctx.font = `${lblSize}px "Fixedsys", monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = isActive ? '#D6D5A9' : '#3a3228';
      if (isActive) ctx.shadowColor = '#D6D5A9', ctx.shadowBlur = 4;
      ctx.fillText(s.en.toUpperCase(), sx, sy + R + 3);
      ctx.restore();
    });

    // pixel corners
    ctx.fillStyle = '#1a3018';
    [[0,0,3,1],[0,0,1,3],[w-3,0,3,1],[w-1,0,1,3],
     [0,h-1,3,1],[0,h-3,1,3],[w-3,h-1,3,1],[w-1,h-3,1,3]
    ].forEach(([x,y,ww,hh]) => ctx.fillRect(x,y,ww,hh));
  }

  function setInfo(s) {
    if (!s) {
      infoSym.textContent   = '';
      infoName.textContent  = '';
      infoTheme.textContent = 'SELECT A SEPHIRA';
      infoCount.textContent = '';
      return;
    }
    const count = allNotes.filter(n => n.sephirot && n.sephirot.includes(s.id)).length;
    infoSym.textContent   = s.symbol;
    infoName.textContent  = s.en.toUpperCase();
    infoTheme.textContent = s.theme;
    infoCount.textContent = count + (count === 1 ? ' note' : ' notes');
  }

  function getSephAt(mx, my) {
    const {w, h} = getCanvasSize();
    const R = Math.max(7, Math.min(12, Math.round(w * 0.045)));
    const hitR = R + 6;
    for (const s of SEPHIROT) {
      const [sx, sy] = sephPx(s.id);
      const dx = mx - sx, dy = my - sy;
      if (dx*dx + dy*dy <= hitR*hitR) return s;
    }
    return null;
  }

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const s = getSephAt(e.clientX - rect.left, e.clientY - rect.top);
    const newId = s ? s.id : null;
    if (newId !== hoveredSeph) {
      hoveredSeph = newId;
      setInfo(s || null);
      drawTree();
      canvas.style.cursor = s ? 'pointer' : 'default';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredSeph = null;
    setInfo(null);
    drawTree();
  });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const s = getSephAt(e.clientX - rect.left, e.clientY - rect.top);
    if (!s) return;
    // filter feed by this sephira
    const filtered = allNotes.filter(n => n.sephirot && n.sephirot.includes(s.id));
    showFeed(filtered, s.en);
  });

  // Touch support
  canvas.addEventListener('touchend', e => {
    const rect = canvas.getBoundingClientRect();
    const t = e.changedTouches[0];
    const s = getSephAt(t.clientX - rect.left, t.clientY - rect.top);
    if (!s) return;
    const filtered = allNotes.filter(n => n.sephirot && n.sephirot.includes(s.id));
    showFeed(filtered, s.en);
  }, {passive: true});

  function openTree() {
    treeVisible = true;
    treeBtn.classList.add('open');
    fireCRTTree();
    lbody.classList.add('graph-panel-open');
    desktop.classList.add('graph-active');
    winL.classList.add('graph-open-mobile');
    treePanel.style.display = 'flex';
    treePanel.style.flexDirection = 'column';
    treePanel.classList.add('open');
    flist.style.display = 'none';
    ctx = canvas.getContext('2d');
    requestAnimationFrame(() => { drawTree(); setInfo(null); });
    window.addEventListener('resize', drawTree);
  }

  function closeTree() {
    treeVisible = false;
    treeBtn.classList.remove('open');
    treePanel.classList.remove('open');
    treePanel.style.display = 'none';
    flist.style.display = '';
    desktop.classList.remove('graph-active');
    winL.classList.remove('graph-open-mobile');
    lbody.classList.remove('graph-panel-open');
    window.removeEventListener('resize', drawTree);
  }

  window._registerPopup('tree', () => { if (treeVisible) closeTree(); });

  treeBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (treeVisible) {
      closeTree();
    } else {
      window._closeAllPopups('tree');
      // close graph if open
      if (graphPanel.classList.contains('open')) {
        graphPanel.classList.remove('open');
        flist.style.display = '';
        desktop.classList.remove('graph-active');
        winL.classList.remove('graph-open-mobile');
        lbody.classList.remove('graph-panel-open');
        graphBtn.classList.remove('open');
      }
      openTree();
    }
  });

  // exposed: call this when opening a note to update tree highlights
  window._treeSetNote = function(sephirotArr) {
    activeSephs = new Set(sephirotArr || []);
    if (treeVisible) drawTree();
  };
})();

document.getElementById('s1').textContent = 'GARDEN';

buildLeft();
showFeed(allNotes, null);
setRPath('');

// ── Font size knob ──
(function() {
  const MIN = 9, MAX = 15, DEFAULT = 11;
  let cur = DEFAULT;
  const popup   = document.getElementById('fsizePopup');
  const btn     = document.getElementById('fsizeBtn');
  const knob    = document.getElementById('fsizeKnob');
  const slider  = document.getElementById('fsizeSlider');
  const thumb   = document.getElementById('fsizeThumb');
  const wrap    = document.getElementById('fsizeWrap');

  function pct() { return (cur - MIN) / (MAX - MIN); }

  function apply() {
    document.documentElement.style.setProperty('--r-fsize', cur + 'px');
    const deg = -135 + pct() * 270;
    knob.style.transform = `rotate(${deg}deg)`;
    const sliderW = slider.offsetWidth;
    thumb.style.left = (pct() * (sliderW - 10) + 5) + 'px';
  }

  apply();

  window._registerPopup('fsize', () => popup.classList.remove('open'));

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = popup.classList.contains('open');
    window._closeAllPopups('fsize');
    popup.classList.toggle('open', !isOpen);
  });

  // drag on slider
  let dragging = false;
  function setFromX(x) {
    const rect = slider.getBoundingClientRect();
    let t = (x - rect.left) / rect.width;
    t = Math.max(0, Math.min(1, t));
    cur = Math.round(MIN + t * (MAX - MIN));
    apply();
  }

  slider.addEventListener('mousedown', e => { dragging = true; setFromX(e.clientX); });
  slider.addEventListener('touchstart', e => { dragging = true; setFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mousemove', e => { if (dragging) setFromX(e.clientX); });
  document.addEventListener('touchmove', e => { if (dragging) setFromX(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) popup.classList.remove('open');
  });
})();

// ── Parallax in note feed ──
(function() {
  const reader = document.getElementById('reader');
  if (!reader) return;

  function applyParallax() {
    const cards = reader.querySelectorAll('.fe');
    const readerRect = reader.getBoundingClientRect();
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const centerOffset = (rect.top - readerRect.top) - readerRect.height * 0.5;
      const meta = card.querySelector('.fe-meta');
      if (meta) meta.style.transform = `translateY(${centerOffset * 0.018}px)`;
      const title = card.querySelector('.fe-title');
      if (title) title.style.transform = `translateY(${centerOffset * -0.010}px)`;
      const prev = card.querySelector('.fe-prev');
      if (prev) prev.style.transform = `translateY(${centerOffset * 0.008}px)`;
    });
  }

  reader.addEventListener('scroll', applyParallax, {passive: true});
  new MutationObserver(applyParallax).observe(reader, {childList: true});
})();

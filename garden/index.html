<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
@font-face {
  font-family: 'Alkhemikal';
  src: url('../fonts/Alkhemikal.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'DotGothic16';
  src: url('../fonts/DotGothic16-Regular.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'Fixedsys';
  src: url('../fonts/Fixedsys.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:    #e8e0c4;
  --text:  #353535;
  --desk:  #5D5143;
  --tb:    #5D5143;
  --ttxt:  #f6f1da;
  --btn:   #AFA191;
  --blt:   #d4cdc4;
  --bdk:   #3d3830;
  --bsh:   #2a2520;
  --lbg:   #1e1a12;
  --tbg:   #2e2820;
  --ta:    #D6D5A9;
  --tdim:  #7a6a52;
  --thl:   #e8d0a0;
  --tbar:  #181410;
  --tsel:  #6a5535;
  --header-titlebar-h: 22px;
  --header-pill-h: 44px;
  --header-total-h: calc(env(safe-area-inset-top, 0px) + var(--header-titlebar-h) + var(--header-pill-h));
  --r-fsize: 11px;
}

html { background: #5D5143; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; top: -100vh; left: 0; right: 0;
  height: 100vh; background: #5D5143;
  z-index: 9001; pointer-events: none;
}

body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  color: var(--text);
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: none;
  height: 100vh;
}

#grain {
  position: fixed;
  top: -60px; bottom: -60px; left: -10px; right: -10px;
  z-index: 9998; pointer-events: none;
}

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: stretch;
  pointer-events: none;
  opacity: 0; transition: opacity 0.7s ease;
  background: var(--desk);
}
header.visible { opacity: 1; }
header > * { pointer-events: auto; }

.header-safe-top {
  height: env(safe-area-inset-top, 0px);
  background: var(--desk); flex-shrink: 0;
}
.header-inner { display: flex; flex-direction: column; align-items: stretch; width: 100%; }

.header-titlebar-strip {
  width: 100%; height: var(--header-titlebar-h);
  background: #5D5143;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0 0 8px; flex-shrink: 0;
  border-bottom: 1px solid #3e352d;
}
.header-titlebar-strip-text {
  font-family: 'DotGothic16', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  color: #f6f1da; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}

.header-pill {
  display: flex; align-items: center;
  position: relative; width: 100%; height: var(--header-pill-h);
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-bottom: 2px solid #7a7068;
  box-shadow: 0 1px 0 #404040;
  overflow: visible; padding: 0 4px;
}

.pill-divider {
  width: 2px; height: 26px; flex-shrink: 0;
  background: #808080; border-right: 1px solid #d4cdc4;
  align-self: center; margin: 0 2px;
}

.pill-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; pointer-events: none; user-select: none; white-space: nowrap;
}
.pill-section {
  font-family: 'Alkhemikal', serif;
  font-size: 19px; letter-spacing: 0.08em; opacity: 0.9; color: #000;
}

.sword-btn {
  height: calc(100% - 10px); padding: 0 12px; margin: 0 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; transition: none; flex-shrink: 0;
}
.sword-btn:active, .sword-btn.open {
  border-top: 2px solid #3d3830; border-left: 2px solid #3d3830;
  border-right: 2px solid #d4cdc4; border-bottom: 2px solid #d4cdc4;
  box-shadow: inset 1px 1px 0 #7a7068;
}
.sword-btn .line {
  position: relative; height: 2px; width: 18px; background: #000;
  opacity: 0.8;
  transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.25s, width 0.38s cubic-bezier(0.16,1,0.3,1);
}
.sword-btn.open .line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
.sword-btn.open .line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.burger-wrap { position: relative; height: 100%; display: flex; align-items: center; }

.nav-overlay {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 8999;
  min-width: 160px; padding: 2px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transform-origin: top right;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.nav-overlay a {
  font-family: 'DotGothic16', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #000; text-decoration: none; padding: 8px 12px 8px 8px;
  display: flex; align-items: center;
}
.nav-overlay a::before { content: '/'; margin-right: 7px; font-size: 10px; }
.nav-overlay a:hover { background: #5D5143; color: #f6f1da; }
.nav-overlay a + a { border-top: 1px solid #7a7068; }
.nav-overlay a.current { background: #c8c2ba; }

.page-main {
  position: fixed;
  top: var(--header-total-h);
  left: 0; right: 0;
  bottom: env(safe-area-inset-bottom, 0px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.desktop {
  display: flex; gap: 7px;
  padding: 8px 8px 12px;
  flex: 1; overflow: hidden;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
  min-height: 0;
}

.win {
  display: flex; flex-direction: column; overflow: hidden;
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  box-shadow: 2px 2px 0 var(--bsh);
}

.tbar {
  height: 22px; background: var(--btn);
  display: flex; align-items: stretch; padding: 1px; flex-shrink: 0; user-select: none;
}
.tbar-inner {
  flex: 1; background: var(--tb);
  display: flex; align-items: center; padding: 0 1px 0 6px; gap: 2px; overflow: hidden; min-width: 0;
}
.tbar-t {
  flex: 1; font-size: 8px; font-weight: 700; letter-spacing: .12em;
  color: var(--ttxt); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1;
}
.tbbtns { display: flex; gap: 1px; flex-shrink: 0; align-items: stretch; }
.tbbtn {
  width: 16px; background: var(--btn);
  border-top: 1px solid var(--blt); border-left: 1px solid var(--blt);
  border-right: 1px solid var(--bdk); border-bottom: 1px solid var(--bdk);
  display: flex; align-items: center; justify-content: center;
  cursor: default; flex-shrink: 0; padding: 0 0 1px 0;
}
.tbbtn:active {
  border-top: 1px solid var(--bdk); border-left: 1px solid var(--bdk);
  border-right: 1px solid var(--blt); border-bottom: 1px solid var(--blt);
}

.mbar {
  display: flex; padding: 2px 3px; flex-shrink: 0; gap: 2px;
  background: var(--lbg); border-bottom: 1px solid rgba(201,164,114,.1);
}
.lm-btn {
  font-family: 'Fixedsys', monospace; font-size: 8px; letter-spacing: .08em;
  display: flex; align-items: center; gap: 3px;
  padding: 2px 7px; cursor: pointer; color: var(--ta);
  background: var(--tbg);
  border-top: 1px solid #4a4030; border-left: 1px solid #4a4030;
  border-right: 1px solid #111008; border-bottom: 1px solid #111008;
  transition: color .08s; user-select: none;
}
.lm-btn:hover { color: var(--thl); }
.lm-btn:active {
  border-top: 1px solid #111008; border-left: 1px solid #111008;
  border-right: 1px solid #4a4030; border-bottom: 1px solid #4a4030;
}
.lm-btn.active { color: var(--thl); background: var(--tsel); }
.lm-label { font-size: 7px; letter-spacing: .1em; }

/* ── LEFT PANEL ── */
.win-l { 
  width: 200px; 
  flex-shrink: 0; 
  display: flex; 
  flex-direction: column; 
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
}
.win-l.expanded { width: 450px; }

.lbody {
  flex: 1; background: var(--lbg);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
  min-height: 0;
}

@keyframes flicker {
  0%,100% { opacity: 1; }
  92%      { opacity: 1; }
  93%      { opacity: .82; }
  94%      { opacity: 1; }
  97%      { opacity: .9; }
  98%      { opacity: 1; }
}
.lbody * { animation: flicker 4s step-end infinite; }

.folder-row, .note-row { text-shadow: 0 0 6px currentColor; }

.flist {
  flex: 1; display: flex; flex-direction: column; padding: 8px 0;
  position: relative; z-index: 2; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
}
.flist::-webkit-scrollbar { display: none; }

.folder-row {
  padding: 1px 12px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 11px; line-height: 1.7;
  color: var(--ta); letter-spacing: .03em;
  white-space: nowrap; overflow: hidden;
  transition: color .08s;
}
.folder-row:hover { color: var(--thl); }

.folder-children { display: none; flex-direction: column; margin-bottom: 3px; }
.folder-children.open { display: flex; }

.note-row {
  padding: 0 12px 0 20px; cursor: pointer; user-select: none;
  font-family: 'Fixedsys', monospace; font-size: 10px; line-height: 1.75;
  color: var(--tdim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .08s; position: relative;
}
.note-row::before { content: '· '; }
.note-row:hover { color: var(--ta); }
.note-row.act { color: var(--thl); }
.note-row.act::after {
  content: '▌'; margin-left: 2px;
  animation: bl .9s step-end infinite;
}

@keyframes bl { 50% { opacity: 0; } }

/* ── GRAPH PANEL ── */
.graph-panel {
  position: absolute; inset: 0; z-index: 10;
  background: #0c0a06;
  display: none; overflow: hidden;
}
.graph-panel.open { display: block; }
.graph-wrap { width: 100%; height: 100%; position: relative; overflow: hidden; background: #0c0a06; }
canvas#graphCanvas { display: block; image-rendering: auto; }
.scan {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
}

/* ── FONT SIZE BTN ── */
.fsize-btn {
  height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; flex-shrink: 0; user-select: none; position: relative;
}
.fsize-label {
  font-family: 'Alkhemikal', serif; font-size: 16px;
  color: #000; opacity: 0.8; line-height: 1;
}
.fsize-knob {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #d4cdc4, #8a7e72);
  border: 1px solid #3d3830;
  box-shadow: 1px 1px 0 #2a2520, inset 1px 1px 0 rgba(255,255,255,0.3);
  position: relative; flex-shrink: 0; transition: transform 0.1s;
}
.fsize-knob::after {
  content: ''; position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
  width: 2px; height: 5px; background: #2a2520; border-radius: 1px;
}

/* ── GRAPH TOGGLE LED ── */
.gknob-btn {
  height: calc(100% - 10px); padding: 0 10px; margin: 0 2px 0 0;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: inset 1px 1px 0 #d4cdc4, inset -1px -1px 0 #7a7068;
  cursor: pointer; flex-shrink: 0; user-select: none; position: relative;
}
.g-led {
  width: 6px; height: 6px; border-radius: 50%;
  background: #3d3830;
  box-shadow: inset 1px 1px 1px rgba(0,0,0,0.5);
  transition: background 0.2s, box-shadow 0.2s;
}
.gknob-btn.open .g-led {
  background: #8acc7c;
  box-shadow: 0 0 5px #8acc7c, inset 1px 1px 1px rgba(255,255,255,0.5);
}

.fsize-popup, .gknob-popup {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #AFA191;
  border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
  box-shadow: 2px 2px 0 #2a2520;
  padding: 8px 10px; z-index: 9000;
  display: none; flex-direction: column; gap: 6px; min-width: 140px;
}
.fsize-popup.open, .gknob-popup.open { display: flex; }

.fsize-track, .gknob-track { display: flex; align-items: center; gap: 6px; }
.fsize-slider, .gknob-slider {
  flex: 1; height: 14px; position: relative; cursor: pointer;
  background: #8a7e72;
  border-top: 1px solid #3d3830; border-left: 1px solid #3d3830;
  border-right: 1px solid #d4cdc4; border-bottom: 1px solid #d4cdc4;
}
.fsize-thumb, .gknob-thumb {
  position: absolute; top: 1px; width: 10px; height: 10px;
  background: #AFA191;
  border-top: 1px solid #d4cdc4; border-left: 1px solid #d4cdc4;
  border-right: 1px solid #3d3830; border-bottom: 1px solid #3d3830;
  cursor: grab; transform: translateX(-50%);
}

/* ── RIGHT PANEL ── */
.win-r { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.rbody { flex: 1; background: #b5ad9e; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; }
.rscroll {
  flex: 1; overflow-y: scroll; padding: 20px 28px 28px; position: relative; z-index: 2;
  scrollbar-width: auto; scrollbar-color: #AFA191 #5a5145;
}
.rscroll::-webkit-scrollbar { width: 16px; }
.rscroll::-webkit-scrollbar-track { background: #5a5145; border-left: 1px solid #3d3830; }
.rscroll::-webkit-scrollbar-thumb {
  background: #AFA191; border-top: 2px solid #d4cdc4; border-left: 2px solid #d4cdc4;
  border-right: 2px solid #3d3830; border-bottom: 2px solid #3d3830;
}

/* Feed & Note styles */
.fe { padding: 20px 0; border-bottom: 1px solid rgba(93,81,67,.18); cursor: pointer; }
.fe-meta { font-family: 'Fixedsys', monospace; font-size: 8px; color: #7a6a52; margin-bottom: 8px; text-transform: uppercase; }
.fe-title { font-family: 'Alkhemikal', serif; font-size: 20px; color: #2e2318; margin-bottom: 8px; }
.fe-prev { font-family: 'DotGothic16', monospace; font-size: var(--r-fsize); line-height: 1.9; color: #5a4e3e; opacity: .7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.nv { padding: 0 0 32px; animation: fadein .2s ease; max-width: 640px; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.ntitle { font-family: 'Alkhemikal', serif; font-size: 26px; color: #1e1710; margin-bottom: 8px; }
.nbody { font-family: 'DotGothic16', monospace; font-size: var(--r-fsize); line-height: 2.1; color: #3d3428; }
.sbar { background: rgba(93,81,67,.12); border-top: 1px solid rgba(93,81,67,.2); display: flex; align-items: center; padding: 3px 14px; gap: 10px; flex-shrink: 0; }
.si { font-family: 'Fixedsys', monospace; font-size: 8px; color: #7a6a52; opacity: .55; text-transform: uppercase; }

@media (max-width: 600px) {
  .win-l.expanded { width: 100%; }
  .desktop { flex-direction: column; overflow-y: auto; }
}
</style>
</head>
<body>

<canvas id="grain"></canvas>

<header id="siteHeader">
  <div class="header-safe-top"></div>
  <div class="header-inner">
    <div class="header-titlebar-strip">
      <span class="header-titlebar-strip-text">noeasy.xyz/garden</span>
    </div>
    <div class="header-pill">
      <span class="pill-center"><span class="pill-section">Digital Garden</span></span>
      <div style="flex:1"></div>
      <div class="pill-divider"></div>
      <div class="burger-wrap" id="fsizeWrap">
        <button class="fsize-btn" id="fsizeBtn" aria-label="Text size">
          <span class="fsize-label">Aa</span>
          <div class="fsize-knob" id="fsizeKnob"></div>
        </button>
        <div class="fsize-popup" id="fsizePopup">
          <div class="fsize-track">
            <span style="font-family:Fixedsys;font-size:8px">A</span>
            <div class="fsize-slider" id="fsizeSlider"><div class="fsize-thumb" id="fsizeThumb"></div></div>
            <span style="font-family:Fixedsys;font-size:11px">A</span>
          </div>
        </div>
      </div>
      <div class="pill-divider"></div>
      <div class="burger-wrap" id="gknobWrap">
        <button class="gknob-btn" id="gknobBtn" aria-label="Graph view">
          <div class="g-led"></div>
          <span style="font-family:Fixedsys;font-size:8px;margin-left:4px">MAP</span>
        </button>
        <div class="gknob-popup" id="gknobPopup">
          <div class="gknob-track">
            <span style="font-family:Fixedsys;font-size:8px">−</span>
            <div class="gknob-slider" id="gknobSlider"><div class="gknob-thumb" id="gknobThumb"></div></div>
            <span style="font-family:Fixedsys;font-size:8px">+</span>
          </div>
        </div>
      </div>
      <div class="pill-divider"></div>
      <div class="burger-wrap">
        <button class="sword-btn" id="swordBtn" aria-label="Menu">
          <span class="line"></span><span class="line"></span><span class="line"></span>
        </button>
        <div class="nav-overlay" id="navOverlay">
          <a href="/">Home</a><a href="/about/">About</a><a href="/gallery/">Gallery</a><a href="/garden/" class="current">Digital Garden</a><a href="/links/">Links</a>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="page-main">
  <div class="desktop">
    <div class="win win-l">
      <div class="tbar"><div class="tbar-inner"><div class="tbar-t">GARDEN.MD</div><div class="tbbtns" id="lbtns"></div></div></div>
      <div class="mbar">
        <button class="lm-btn" id="collapseAllBtn"><span id="collapseIcon">⊟</span><span class="lm-label" id="collapseLabel">FOLD ALL</span></button>
      </div>
      <div class="lbody">
        <div class="scan"></div>
        <div class="flist" id="flist"></div>
        <div class="graph-panel" id="graphPanel">
          <div class="graph-wrap" id="graphWrap"><canvas id="graphCanvas"></canvas></div>
        </div>
      </div>
    </div>
    <div class="win win-r">
      <div class="tbar"><div class="tbar-inner"><div class="tbar-t" id="rtitle"><span class="rpath-root">noeasy.xyz/garden/</span><span class="rpath-cur" id="rpathCur"></span></div><div class="tbbtns" id="rbtns"></div></div></div>
      <div class="rbody">
        <div class="rscroll" id="reader"></div>
        <div class="sbar"><span class="si" id="s1">READY</span><div class="sdv"></div><span class="si" id="s2"></span><div class="sdv"></div><span class="si" id="s3"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── MUTEX & UI LOGIC ──
const ui = {
  nav: { btn: document.getElementById('swordBtn'), el: document.getElementById('navOverlay') },
  fsize: { btn: document.getElementById('fsizeBtn'), el: document.getElementById('fsizePopup') },
  graph: { btn: document.getElementById('gknobBtn'), el: document.getElementById('gknobPopup') }
};

function closeAllExcept(key) {
  Object.keys(ui).forEach(k => {
    if (k !== key) {
      ui[k].el.classList.remove('open');
      ui[k].btn.classList.remove('open');
    }
  });
}

// ── GRAIN ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() { gw = grain.width = window.innerWidth + 20; gh = grain.height = window.innerHeight + 120; }
resizeGrain();
window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

setTimeout(() => document.getElementById('siteHeader').classList.add('visible'), 100);

// ── HEADER BUTTONS ──

ui.fsize.btn.onclick = (e) => { e.stopPropagation(); closeAllExcept('fsize'); ui.fsize.el.classList.toggle('open'); };

// ── DATA ──
const vault = [
  { folder: "Esoterica", notes: [{ id:1, date:"2026-04-22", tags:["theurgy","plato"], title:"On Theurgy and the Purpose of Prayer", body:`Iamblichus says that prayer works...` }] },
  { folder: "Tarot", notes: [{ id:2, date:"2026-04-18", tags:["arcana"], title:"The Magician: Will as Channel", body:`The Magician is...` }] }
];
const allNotes = vault.flatMap(f => f.notes.map(n => ({...n, folder: f.folder})));
let openFolders = new Set(), activeNote = null;

function buildLeft() {
  const fl = document.getElementById('flist'); fl.innerHTML = '';
  vault.forEach(({folder, notes}) => {
    const row = document.createElement('div'); row.className = 'folder-row'; row.textContent = `[${folder.toUpperCase()}]`;
    row.onclick = () => { openFolders.has(folder) ? openFolders.delete(folder) : openFolders.add(folder); buildLeft(); showFeed(notes.map(n=>({...n, folder})), folder); };
    fl.appendChild(row);
    const children = document.createElement('div'); children.className = 'folder-children' + (openFolders.has(folder)?' open':'');
    notes.forEach(note => {
      const nr = document.createElement('div'); nr.className = 'note-row'+(activeNote?.id===note.id?' act':'');
      nr.textContent = note.title; nr.onclick = e => { e.stopPropagation(); activeNote = note; buildLeft(); openNote({...note, folder}); };
      children.appendChild(nr);
    });
    fl.appendChild(children);
  });
}

function showFeed(notes, folderName) {
  const r = document.getElementById('reader'); r.innerHTML = '';
  notes.forEach(n => {
    const e = document.createElement('div'); e.className = 'fe';
    e.innerHTML = `<div class="fe-meta">${n.date}</div><div class="fe-title">${n.title}</div>`;
    e.onclick = () => { activeNote = n; buildLeft(); openNote({...n, folder: n.folder||folderName}); };
    r.appendChild(e);
  });
}

function openNote(n) {
  const r = document.getElementById('reader'); r.innerHTML = `<div class="nv"><div class="ntitle">${n.title}</div><div class="nbody">${n.body}</div></div>`;
}

// ── GRAPH LOGIC ──
(function() {
  const btn = document.getElementById('gknobBtn');
  const panel = document.getElementById('graphPanel');
  const winL = document.querySelector('.win-l');
  const flist = document.getElementById('flist');
  let graphVisible = false;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    closeAllExcept('graph');
    graphVisible = !graphVisible;
    btn.classList.toggle('open', graphVisible);
    panel.classList.toggle('open', graphVisible);
    winL.classList.toggle('expanded', graphVisible);
    flist.style.display = graphVisible ? 'none' : '';
    if (graphVisible) { ui.graph.el.classList.add('open'); initGraph(); }
    else { ui.graph.el.classList.remove('open'); }
  });
})();

function initGraph() {
  if (window._graphInitialized) return; window._graphInitialized = true;
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('graphWrap');
  let zoom = 1.0;

  function resize() { canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; }
  window.addEventListener('resize', resize); resize();

  function drawStars(time) {
    ctx.fillStyle = '#f6f1da';
    for(let i=0; i<80; i++) {
      let x = (Math.sin(i * 123.4) * 0.5 + 0.5) * canvas.width;
      let y = (Math.cos(i * 567.8) * 0.5 + 0.5) * canvas.height;
      let size = (Math.sin(time * 0.002 + i) * 0.5 + 0.5);
      if (size > 0.6) ctx.fillRect(x, y, 1, 1);
    }
  }

  const nodes = vault.map((f, i) => ({ x: Math.random()*200, y: Math.random()*200, label: f.folder, type: 'folder' }));

  function draw(time) {
    ctx.fillStyle = '#0c0a06'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawStars(time);
    nodes.forEach(n => {
      ctx.fillStyle = n.type === 'folder' ? '#D6D5A9' : '#7a6a52';
      ctx.fillRect(n.x, n.y, 6, 6);
      ctx.fillStyle = '#e8d0a0'; ctx.font = '8px Fixedsys';
      ctx.fillText(n.label, n.x + 8, n.y + 8);
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

// ── FONT SIZE KNOB ──
(function() {
  const btn = document.getElementById('fsizeBtn');
  const knob = document.getElementById('fsizeKnob');
  const slider = document.getElementById('fsizeSlider');
  const thumb = document.getElementById('fsizeThumb');
  let cur = 11;

  function apply() {
    document.documentElement.style.setProperty('--r-fsize', cur + 'px');
    const t = (cur - 9) / (15 - 9);
    knob.style.transform = `rotate(${-135 + t*270}deg)`;
    thumb.style.left = (t * 90) + '%';
  }
  apply();

  slider.onmousedown = (e) => {
    let move = (e) => {
      let rect = slider.getBoundingClientRect();
      let t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      cur = Math.round(9 + t * 6); apply();
    };
    move(e); document.onmousemove = move; document.onmouseup = () => document.onmousemove = null;
  };
})();

buildLeft();
showFeed(allNotes, null);
</script>

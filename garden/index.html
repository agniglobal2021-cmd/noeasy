<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5D5143">
<title>NOEASY / garden</title>
<style>
/* Шрифты — сердце стиля */
@font-face { font-family: 'Alkhemikal'; src: url('../fonts/Alkhemikal.ttf') format('truetype'); }
@font-face { font-family: 'DotGothic16'; src: url('../fonts/DotGothic16-Regular.ttf') format('truetype'); }
@font-face { font-family: 'Fixedsys'; src: url('../fonts/Fixedsys.ttf') format('truetype'); }

:root {
  --bg:    #e8e0c4; /* Цвет бумаги */
  --text:  #353535;
  --desk:  #5D5143; /* Тот самый темно-коричневый */
  --tb:    #5D5143;
  --ttxt:  #f6f1da;
  --btn:   #AFA191; /* Цвет металла кнопок */
  --blt:   #d4cdc4;
  --bdk:   #3d3830;
  --bsh:   #2a2520;
  --lbg:   #1e1a12; /* Фон левой панели */
  --tbg:   #2e2820;
  --ta:    #D6D5A9;
  --tdim:  #7a6a52;
  --thl:   #e8d0a0;
  --header-h: calc(env(safe-area-inset-top, 0px) + 66px);
  --r-fsize: 11px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  overscroll-behavior: none;
}

/* ФОН ДЛЯ ОВЕРСКРОЛЛА (Telegram/iOS) */
.body-shield {
  position: fixed; top: -100vh; left: 0; right: 0; height: 200vh;
  background: var(--desk); z-index: -1;
}

#grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.05; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; flex-direction: column; background: var(--desk);
}

.h-safe { height: env(safe-area-inset-top, 0px); }

.h-strip {
  height: 22px; padding: 0 12px; display: flex; align-items: center;
  border-bottom: 1px solid #3e352d;
}
.h-strip-text { font-size: 9px; color: #f6f1da; letter-spacing: 2px; font-weight: bold; }

.h-pill {
  height: 44px; background: var(--btn); display: flex; align-items: center;
  padding: 0 6px; border-bottom: 2px solid var(--bdk); box-shadow: 0 1px 0 #000;
}

.pill-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'Alkhemikal'; font-size: 20px; color: #1a1612; pointer-events: none;
}

/* КНОПКИ КОРПУСНЫЕ */
.btn-case {
  height: 34px; padding: 0 12px; background: var(--btn);
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.btn-case:active, .btn-case.active {
  border: 2px solid var(--bdk); background: #9e9081; padding: 2px 10px 0 14px;
}
.btn-divider { width: 2px; height: 28px; background: #808080; border-right: 1px solid var(--blt); margin: 0 6px; }

/* POPUPS */
.win-popup {
  position: absolute; top: 50px; right: 6px; background: var(--btn);
  border: 2px solid var(--bdk); box-shadow: 4px 4px 0 #000;
  padding: 12px; display: none; z-index: 1100; min-width: 180px;
}
.win-popup.open { display: block; }

/* SLIDER */
.slider-container { width: 100%; padding: 10px 0; }
.slider-rail { height: 6px; background: var(--bdk); border: 1px solid var(--blt); position: relative; cursor: pointer; }
.slider-thumb {
  width: 14px; height: 20px; background: #f6f1da; border: 1px solid #000;
  position: absolute; top: -8px; transform: translateX(-50%); pointer-events: none;
}

/* MAIN LAYOUT */
.main {
  position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
  display: flex; padding: 10px; gap: 10px;
}

.panel {
  display: flex; flex-direction: column; background: #b5ad9e;
  border-top: 2px solid var(--blt); border-left: 2px solid var(--blt);
  border-right: 2px solid var(--bdk); border-bottom: 2px solid var(--bdk);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2); overflow: hidden;
}

.panel-l { width: 220px; transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1); flex-shrink: 0; }
.panel-l.expanded { width: 550px; }
.panel-r { flex: 1; min-width: 0; }

.p-bar { height: 24px; background: var(--tb); display: flex; align-items: center; padding: 0 8px; flex-shrink: 0; }
.p-bar-t { font-size: 9px; color: #fff; font-weight: bold; letter-spacing: 1px; }

.p-body { flex: 1; background: var(--lbg); position: relative; overflow-y: auto; overflow-x: hidden; }

/* GRAPH AREA */
.graph-view { position: absolute; inset: 0; background: #080705; display: none; z-index: 10; }
.graph-view.active { display: block; }
.graph-overlay {
  position: absolute; bottom: 15px; right: 15px; z-index: 20;
  display: flex; gap: 6px; background: rgba(0,0,0,0.5); padding: 4px; border: 1px solid var(--tdim);
}
.g-btn {
  width: 28px; height: 28px; background: var(--btn); border: 1px solid var(--bdk);
  color: #000; font-family: Fixedsys; cursor: pointer;
}

/* CONTENT */
.r-scroll { flex: 1; overflow-y: auto; padding: 30px; background: #e8e0c4; }
.note-title { font-family: 'Alkhemikal'; font-size: 28px; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.1); }
.note-body { font-size: var(--r-fsize); line-height: 1.8; color: #2a2520; }

.f-row { color: var(--ta); font-family: Fixedsys; padding: 8px 15px; cursor: pointer; font-size: 12px; }
.n-row { color: var(--tdim); font-family: Fixedsys; padding: 4px 25px; cursor: pointer; font-size: 11px; transition: 0.1s; }
.n-row:hover { color: var(--thl); background: rgba(255,255,255,0.05); }

</style>
</head>
<body>

<div class="body-shield"></div>
<canvas id="grain"></canvas>

<header>
  <div class="h-safe"></div>
  <div class="h-strip"><span class="h-strip-text">GARDEN // SYSTEM_READY</span></div>
  <div class="h-pill">
    <span class="pill-title">Digital Garden</span>
    <div style="flex:1"></div>
    
    <div class="btn-case" id="fBtn"><span style="font-family:'Alkhemikal'; font-size:18px;">Aa</span></div>
    <div class="win-popup" id="fPop">
      <div style="font-family:Fixedsys; font-size:9px; margin-bottom:10px;">FONT_SCALE</div>
      <div class="slider-rail" id="fSlider"><div class="slider-thumb" id="fThumb"></div></div>
    </div>

    <div class="btn-divider"></div>
    <div class="btn-case" id="mBtn"><span style="font-family:Fixedsys; font-size:11px;">[ MAP ]</span></div>
    <div class="btn-divider"></div>
    <div class="btn-case" id="nBtn">
      <div style="width:16px; height:12px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="height:2px; background:#000;"></div>
        <div style="height:2px; background:#000;"></div>
        <div style="height:2px; background:#000;"></div>
      </div>
    </div>
  </div>
</header>

<div class="main">
  <div class="panel panel-l" id="winL">
    <div class="p-bar"><div class="p-bar-t">EXPLORER</div></div>
    <div class="p-body">
      <div id="fileList"></div>
      <div class="graph-view" id="graphArea">
        <canvas id="graphCanvas"></canvas>
        <div class="graph-overlay">
          <button class="g-btn" id="zOut">-</button>
          <button class="g-btn" id="zIn">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel panel-r">
    <div class="p-bar"><div class="p-bar-t">VIEWER</div></div>
    <div class="r-scroll" id="viewer">
      <div class="note-title">Welcome, Traveler</div>
      <div class="note-body">Выберите файл в левой панели для чтения. Используйте [MAP] для визуального поиска связей.</div>
    </div>
  </div>
</div>

<script>
// --- КОНТЕНТ (ВОЗВРАЩЕНО) ---
const vault = [
  { folder: "Grimoires", notes: [
      { id:1, title: "The Lesser Key", body: "Lemegeton Clavicula Salomonis. Система вызова 72 духов Гоэтии. Огромный пласт средневековой магии." },
      { id:2, title: "Abramelin", body: "Сложнейший ритуал очищения длиной в полгода. Конечная цель — контакт с личным Ангелом-Хранителем." }
  ]},
  { folder: "Cybernetics", notes: [
      { id:3, title: "Serendipity 1968", body: "Выставка в Лондоне, изменившая всё. Первые попытки компьютеров рисовать и сочинять музыку." },
      { id:4, title: "Vibe Coding", body: "Программирование на кончиках пальцев. Когда ИИ понимает 'вайб', а не просто синтаксис." }
  ]},
  { folder: "Personal", notes: [
      { id:5, title: "Todo", body: "Пропатчить графический движок, добавить больше звезд, дочитать Нейроманта." }
  ]}
];

// --- UI КОРЕ ---
const fPop = document.getElementById('fPop');
const winL = document.getElementById('winL');
const graphArea = document.getElementById('graphArea');
const viewer = document.getElementById('viewer');

// Мутекс (Взаимоисключение)
function closeAll() { fPop.classList.remove('open'); document.getElementById('fBtn').classList.remove('active'); }

document.getElementById('fBtn').onclick = (e) => {
  e.stopPropagation();
  const act = fPop.classList.toggle('open');
  document.getElementById('fBtn').classList.toggle('active', act);
};

document.onclick = () => closeAll();

// --- СЛАЙДЕР РАЗМЕРА ТЕКСТА ---
let fSize = 11;
const fSlider = document.getElementById('fSlider');
const fThumb = document.getElementById('fThumb');

function setFSize(x) {
  const r = fSlider.getBoundingClientRect();
  let t = (x - r.left) / r.width;
  t = Math.max(0, Math.min(1, t));
  fSize = Math.round(9 + t * 9);
  document.documentElement.style.setProperty('--r-fsize', fSize + 'px');
  fThumb.style.left = (t * 100) + '%';
}

fSlider.onmousedown = (e) => {
  setFSize(e.clientX);
  document.onmousemove = (ev) => setFSize(ev.clientX);
  document.onmouseup = () => document.onmousemove = null;
};
fSlider.ontouchstart = (e) => {
  setFSize(e.touches[0].clientX);
  document.ontouchmove = (ev) => setFSize(ev.touches[0].clientX);
  document.ontouchend = () => document.ontouchmove = null;
};

// --- ГРАФ ---
let isGraph = false;
let gZoom = 1.0;
document.getElementById('mBtn').onclick = () => {
  isGraph = !isGraph;
  document.getElementById('mBtn').classList.toggle('active', isGraph);
  winL.classList.toggle('expanded', isGraph);
  graphArea.classList.toggle('active', isGraph);
  if(isGraph) startGraph();
};

function startGraph() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = graphArea.clientWidth; canvas.height = graphArea.clientHeight; };
  window.addEventListener('resize', resize); resize();

  document.getElementById('zIn').onclick = (e) => { e.stopPropagation(); gZoom += 0.2; };
  document.getElementById('zOut').onclick = (e) => { e.stopPropagation(); gZoom = Math.max(0.4, gZoom - 0.2); };

  function loop(t) {
    if(!isGraph) return;
    ctx.fillStyle = '#080705'; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Звезды
    ctx.fillStyle = '#f6f1da';
    for(let i=0; i<40; i++) {
      let x = (Math.abs(Math.sin(i*77)) * canvas.width);
      let y = (Math.abs(Math.cos(i*99)) * canvas.height);
      if(Math.sin(t/400 + i) > 0.6) ctx.fillRect(x, y, 1, 1);
    }

    // Ноды
    vault.forEach((f, i) => {
      let x = canvas.width/2 + Math.cos(i + t/1500) * 120 * gZoom;
      let y = canvas.height/2 + Math.sin(i + t/1500) * 100 * gZoom;
      ctx.fillStyle = '#D6D5A9'; ctx.fillRect(x, y, 6, 6);
      ctx.font = '10px Fixedsys'; ctx.fillStyle = '#7a6a52';
      ctx.fillText(f.folder, x + 10, y + 6);
    });
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// --- РЕНДЕР СПИСКА ---
function render() {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  vault.forEach(f => {
    const fr = document.createElement('div'); fr.className = 'f-row'; fr.textContent = `[ ${f.folder} ]`;
    list.appendChild(fr);
    f.notes.forEach(n => {
      const nr = document.createElement('div'); nr.className = 'n-row'; nr.textContent = n.title;
      nr.onclick = () => {
        viewer.innerHTML = `<div class="note-title">${n.title}</div><div class="note-body">${n.body}</div>`;
      };
      list.appendChild(nr);
    });
  });
}

// --- ЗЕРНО ---
const gr = document.getElementById('grain');
const grx = gr.getContext('2d');
function grainLoop() {
  gr.width = window.innerWidth; gr.height = window.innerHeight;
  const idata = grx.createImageData(gr.width, gr.height);
  for (let i = 0; i < idata.data.length; i += 4) {
    const v = Math.random() * 255;
    idata.data[i] = idata.data[i+1] = idata.data[i+2] = v; idata.data[i+3] = 15;
  }
  grx.putImageData(idata, 0, 0);
  setTimeout(() => requestAnimationFrame(grainLoop), 60);
}
grainLoop();
render();
</script>
</body>
</html>

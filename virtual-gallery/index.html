<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gothic Gallery Mobile Optimized</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: sans-serif; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#roomLabel { position: absolute; top: 2rem; left: 50%; transform: translateX(-50%); font-size: 0.7rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,200,100,0.5); }
#joystick-zone { display: none; position: fixed; bottom: 0; left: 0; width: 50%; height: 50%; z-index: 20; pointer-events: all; }
#joystick-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border-radius: 50%; border: 1px solid rgba(255,200,100,0.3); background: rgba(0,0,0,0.3); }
#joystick-knob { position: absolute; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,200,100,0.4); top: 50%; left: 50%; transform: translate(-50%,-50%); }
#look-zone { display: none; position: fixed; bottom: 0; right: 0; width: 50%; height: 100%; z-index: 20; pointer-events: all; }
body.mobile #joystick-zone, body.mobile #look-zone { display: block; }
</style>
</head>
<body>
<div id="ui"><div id="roomLabel">Main Hall</div></div>
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
<div id="look-zone"></div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1);
if (isMobile) document.body.classList.add('mobile');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x030205, 0.015);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 150);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2)); // Жёсткое ограничение для mobile
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// --- МАТЕРИАЛЫ (Lambert быстрее для mobile) ---
const MAT = {
  wall:    new THREE.MeshLambertMaterial({ color: 0x1a1a1e }),
  rib:     new THREE.MeshLambertMaterial({ color: 0x252528 }),
  floor:   new THREE.MeshLambertMaterial({ color: 0x111113 }),
  window:  new THREE.MeshLambertMaterial({ color: 0x3a2200, emissive: 0x7a4500, emissiveIntensity: 1.2 })
};

// --- ИНСТАНСИНГ ---
const instData = {
  wall: { geo: new THREE.BoxGeometry(1,1,1), mat: MAT.wall, matrices: [] },
  rib:  { geo: new THREE.BoxGeometry(1,1,1), mat: MAT.rib, matrices: [] },
  win:  { geo: new THREE.BoxGeometry(1,1,1), mat: MAT.window, matrices: [] }
};

const colliders = [];
function addObj(type, x, y, z, sx, sy, sz, rx=0, ry=0, rz=0, collide=true) {
  const m = new THREE.Matrix4().compose(
    new THREE.Vector3(x, y, z),
    new THREE.Quaternion().setFromEuler(new THREE.Euler(rx, ry, rz)),
    new THREE.Vector3(sx, sy, sz)
  );
  instData[type].matrices.push(m);
  if (collide) colliders.push(new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(x,y,z), new THREE.Vector3(sx,sy,sz)));
}

// --- СЦЕНА ---
// Пол и потолок
addObj('wall', 0, 0, 0, 40, 0.1, 80, 0, 0, 0, false); 
addObj('wall', 0, 10, 0, 40, 0.1, 80, 0, 0, 0, false);

// Колонны (Ribs)
for(let z = -30; z <= 30; z += 10) {
    addObj('rib', -5, 5, z, 0.5, 10, 0.5);
    addObj('rib', 5, 5, z, 0.5, 10, 0.5);
}

// Окна (Emissive boxes вместо света)
for(let z = -25; z <= 25; z += 10) {
    addObj('win', -5.1, 5, z, 0.1, 4, 2, 0, 0, 0, false);
    addObj('win', 5.1, 5, z, 0.1, 4, 2, 0, 0, 0, false);
}

// Инициализация инстансов
Object.keys(instData).forEach(key => {
    const d = instData[key];
    const imesh = new THREE.InstancedMesh(d.geo, d.mat, d.matrices.length);
    d.matrices.forEach((m, i) => imesh.setMatrixAt(i, m));
    scene.add(imesh);
});

// Свет (всего 2 источника на всю сцену)
scene.add(new THREE.AmbientLight(0x101015, 1.0));
const point = new THREE.PointLight(0x443322, 1.5, 50);
point.position.set(0, 5, 0);
scene.add(point);

// --- УПРАВЛЕНИЕ ---
let euler = new THREE.Euler(0, 0, 0, 'YXZ');
const keys = {};
const joyState = { active: false, dx: 0, dy: 0 };
const lookState = { lx: 0, ly: 0 };

if (!isMobile) {
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
    window.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            euler.y -= e.movementX * 0.002;
            euler.x -= e.movementY * 0.002;
            euler.x = Math.max(-1.5, Math.min(1.5, euler.x));
        }
    });
} else {
    const jz = document.getElementById('joystick-zone');
    const jk = document.getElementById('joystick-knob');
    jz.addEventListener('touchstart', e => { joyState.active = true; });
    jz.addEventListener('touchmove', e => {
        const t = e.touches[0];
        const rect = jz.getBoundingClientRect();
        joyState.dx = ((t.clientX - (rect.left + 40)) / 40);
        joyState.dy = ((t.clientY - (rect.bottom - 40)) / 40);
        jk.style.transform = `translate(calc(-50% + ${joyState.dx*20}px), calc(-50% + ${joyState.dy*20}px))`;
    });
    jz.addEventListener('touchend', () => { joyState.active = false; joyState.dx = 0; joyState.dy = 0; jk.style.transform = 'translate(-50%,-50%)'; });

    const lz = document.getElementById('look-zone');
    lz.addEventListener('touchstart', e => { lookState.lx = e.touches[0].clientX; lookState.ly = e.touches[0].clientY; });
    lz.addEventListener('touchmove', e => {
        const t = e.touches[0];
        euler.y -= (t.clientX - lookState.lx) * 0.005;
        euler.x -= (t.clientY - lookState.ly) * 0.005;
        lookState.lx = t.clientX; lookState.ly = t.clientY;
    });
}

const pBox = new THREE.Box3();
function animate() {
    requestAnimationFrame(animate);
    const dt = 0.16;
    const move = new THREE.Vector3();

    if (keys['KeyW'] || joyState.dy < -0.2) move.z -= 1;
    if (keys['KeyS'] || joyState.dy > 0.2)  move.z += 1;
    if (keys['KeyA'] || joyState.dx < -0.2) move.x -= 1;
    if (keys['KeyD'] || joyState.dx > 0.2)  move.x += 1;

    if (move.lengthSq() > 0) {
        move.normalize().applyEuler(new THREE.Euler(0, euler.y, 0));
        const next = camera.position.clone().addScaledVector(move, 0.15);
        pBox.setFromCenterAndSize(next, new THREE.Vector3(0.6, 1.8, 0.6));
        if (!colliders.some(c => pBox.intersectsBox(c))) {
            camera.position.copy(next);
        }
    }
    camera.quaternion.setFromEuler(euler);
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
